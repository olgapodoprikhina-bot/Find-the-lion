function TogglModal({projects, togglData, onClose, onSynced}){
  const [token,setToken]=useState(()=>loadTogglCfg().token||'');
  const [status,setStatus]=useState('idle'); // idle | syncing | ok | err
  const [errMsg,setErrMsg]=useState('');
  const [lastSync,setLastSync]=useState(()=>{const d=loadTogglData();return d.syncedAt||null;});
  const [matchList,setMatchList]=useState(null);

  async function doSync(){
    if(!token.trim()){setErrMsg('Введи API token');setStatus('err');return;}
    setStatus('syncing');setErrMsg('');
    try{
      const data=await runTogglSync(projects,token.trim());
      saveTogglCfg({token:token.trim()});
      saveTogglData(data);
      setLastSync(data.syncedAt);
      // build match list for display
      const ml=projects.map(p=>({
        name:p.name,
        matched:!!data.projects[p.id],
        togglName:data.projects[p.id]?.togglName||null,
        totalH:data.projects[p.id]?.totalH||0
      }));
      setMatchList(ml);
      setStatus('ok');
      onSynced(data);
    }catch(e){
      setStatus('err');
      setErrMsg(e.message||'Невідома помилка');
    }
  }

  const fmtSyncTime=(iso)=>{
    if(!iso)return null;
    const d=new Date(iso);
    return d.toLocaleString('uk-UA',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  };

  return(
    <div className="toggl-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="toggl-modal-card">
        <h3>⏱ Toggl Track</h3>
        <p style={{fontSize:'.78rem',color:'rgba(245,230,200,.35)',marginBottom:'1.2rem',lineHeight:1.5}}>
          Синхронізація реального часу з Toggl. Знаходить проекти за назвою, вехи — за ключовими словами в описі запису.
        </p>

        <div style={{marginBottom:'1rem'}}>
          <div style={{fontSize:'.68rem',fontWeight:800,color:'rgba(147,108,230,.6)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>
            API Token
          </div>
          <input type="password" value={token} onChange={e=>setToken(e.target.value)}
            placeholder="Вставити token з toggl.com → Profile → API Token"
            style={{width:'100%',background:'rgba(245,230,200,.05)',border:'1px solid rgba(147,108,230,.25)',
              borderRadius:10,color:'var(--dust)',padding:'.6rem .9rem',fontSize:'.88rem',
              fontFamily:'Nunito,sans-serif',outline:'none',boxSizing:'border-box'}}/>
          <div style={{fontSize:'.68rem',color:'rgba(245,230,200,.28)',marginTop:'.35rem',lineHeight:1.5}}>
            toggl.com → Profile Settings → API Token (внизу сторінки)
          </div>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.2rem',flexWrap:'wrap'}}>
          <button className="btn-primary" onClick={doSync} disabled={status==='syncing'}
            style={{padding:'.55rem 1.4rem',fontSize:'.9rem',background:'linear-gradient(135deg,#9c6de0,#7b1fa2)',
              boxShadow:'0 4px 18px rgba(124,56,162,.35)',opacity:status==='syncing'?.7:1}}>
            {status==='syncing'?'⏳ Синхронізую...':'🔄 Синхронізувати'}
          </button>
          {status==='ok'&&<span className="toggl-status-chip tsc-ok">✓ Синхронізовано</span>}
          {status==='err'&&<span className="toggl-status-chip tsc-err">✕ {errMsg}</span>}
          {status==='idle'&&lastSync&&<span className="toggl-status-chip tsc-idle">Остання синхр.: {fmtSyncTime(lastSync)}</span>}
        </div>

        {matchList&&(
          <div style={{marginBottom:'1.2rem'}}>
            <div style={{fontSize:'.68rem',fontWeight:800,color:'rgba(147,108,230,.5)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>

            </div>
            <div style={{borderRadius:12,overflow:'hidden',border:'1px solid rgba(245,230,200,.07)'}}>
              {matchList.map((m,i)=>(
                <div key={i} className="toggl-proj-row">
                  <span style={{color:m.matched?'var(--dust)':'rgba(245,230,200,.35)',fontWeight:m.matched?700:400}}>{m.name}</span>
                  {m.matched

                    :<span className="toggl-proj-nomatch">— не знайдено в Toggl</span>}
                </div>
              ))}
            </div>
            {matchList.some(m=>!m.matched)&&(
              <div style={{fontSize:'.71rem',color:'rgba(245,230,200,.3)',marginTop:'.5rem',lineHeight:1.5}}>
                💡 Щоб проект знайшовся — назва в грі має точно збігатись з назвою проекту в Toggl

            <button className="btn-secondary" onClick={onClose}>Закрити</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TodayModal({projects, onClose, onToggle}){
  const todayStr = new Date().toISOString().slice(0,10);
  const now = new Date();
  const dayName = ['неділя','понеділок','вівторок','середа','четвер','п\'ятниця','субота'][now.getDay()];
  const dateLabel = `${now.getDate()} ${['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'][now.getMonth()]} — ${dayName}`;

  // Collect today + overdue stages across all projects
  const byProject = [];
  let totalEst=0, totalReal=0, doneCount=0, totalCount=0;

  for(const proj of projects){
    const todayStages=[];
    for(const s of proj.stages){
      if(!s.name||!s.name.trim()) continue;
      if(s.done) continue; // пропускаємо виконані прострочені
      const d = isStructured(s.type)
        ? (s.date||msAutoDate(s.type,proj.finalDate,proj.startDate||proj.createdAt))
        : s.date;
      if(d&&d<=todayStr){
        todayStages.push({...s, _effDate:d, _overdue:d<todayStr});
        totalCount++;
        if(s.done) doneCount++;
        if(s.estHours){
          totalEst+=parseFloat(s.estHours)||0;
          totalReal+=(parseFloat(s.estHours)||0)*2;
        }
      }
    }
    if(todayStages.length) byProject.push({proj, stages:todayStages});
  }

  return(
    <div className="today-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="today-card">
        <div className="today-title">📅 Сьогодні</div>
        <div className="today-subtitle">{dateLabel}</div>

        {!byProject.length?(
          <div className="today-empty">
            🎉 На сьогодні задач немає.<br/>
            <span style={{fontSize:'.8rem'}}>Або вони ще не заплановані.</span>
          </div>
        ):(
          <>
            {byProject.map(({proj,stages})=>(
              <div key={proj.id} className="today-project">
                <div className="today-proj-name">🦁 {proj.name}</div>
                {stages.map(s=>{
                  const mt=MS_TYPES[s.type]||MS_TYPES.custom;
                  const rh=realH(s.estHours);
                  return(
                    <div key={s.id} className={`today-stage${s.done?' done':''}`}
                      onClick={()=>onToggle(proj.id,s.id)}>
                      <div className="today-stage-check">
                        {s.done&&<span style={{fontSize:'.65rem',color:'#1a0900',fontWeight:900}}>✓</span>}
                      </div>
                      <div className="today-stage-body">
                        <div className="today-stage-name">{s.name}</div>
                        <div className="today-stage-meta">
                          {s._overdue&&<span className="today-meta-chip" style={{background:'rgba(192,57,43,.15)',color:'#ff8a80',border:'1px solid rgba(192,57,43,.3)'}}>⚠️ {fmtDate(s._effDate)}</span>}
                          {s.type!=='custom'&&<span className="today-meta-chip tmc-type">{mt.icon} {mt.label}</span>}
                          {s.estHours&&<span className="today-meta-chip tmc-est">план: {fmtH(parseFloat(s.estHours))}</span>}
                          {rh&&<span className="today-meta-chip tmc-real">×2: {fmtH(rh)}</span>}
                          {s.done&&<span className="today-meta-chip tmc-done">✓ Виконано</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}

            <div className="today-summary">
              <div className="today-sum-chip">
                <div className="today-sum-val">{doneCount}/{totalCount}</div>
                <div className="today-sum-lbl">Виконано</div>
              </div>
              {totalEst>0&&<div className="today-sum-chip">
                <div className="today-sum-val">{fmtH(totalEst)}</div>
                <div className="today-sum-lbl">Плановий час</div>
              </div>}
              {totalReal>0&&<div className="today-sum-chip" style={{borderColor:'rgba(212,90,26,.3)'}}>
                <div className="today-sum-val" style={{color:'#ff8c42'}}>{fmtH(totalReal)}</div>
                <div className="today-sum-lbl">Реально (×2)</div>
              </div>}
              {totalReal>0&&<div className="today-sum-chip" style={{
                  borderColor:totalReal>=5?'rgba(192,57,43,.4)':'rgba(93,187,126,.3)',
                  background:totalReal>=5?'rgba(192,57,43,.07)':'rgba(93,187,126,.06)'}}>
                <div className="today-sum-val" style={{color:totalReal>=5?'#ff5555':'#5dbb7e'}}>
                  {totalReal>=5?'0г':fmtH(5-totalReal)}
                </div>
                <div className="today-sum-lbl">{totalReal>=5?'День повний':'Ще вільно'}</div>
              </div>}
            </div>
          </>
        )}

        <div className="today-footer">
          <button className="btn-primary" onClick={onClose}
            style={{padding:'.6rem 1.8rem',fontSize:'.9rem'}}>Закрити</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [seen,setSeen]=useState(()=>!!localStorage.getItem(LS_SEEN));
  const [projects,setProjects]=useState(load);
  const [showForm,setShowForm]=useState(false);
  const [deleteId,setDeleteId]=useState(null);
  const [editProject,setEditProject]=useState(null);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [sort,setSort]=useState('urgency');
  const [showToday,setShowToday]=useState(false);
  const [tipIdx,setTipIdx]=useState(()=>new Date().getDate()%TIPS.length);
  // Auto-rotate tips every 18 seconds
  useEffect(()=>{
    const t=setInterval(()=>setTipIdx(i=>(i+1)%TIPS.length),18000);
    return()=>clearInterval(t);
  },[]);
  const [bankImages,setBankImages]=useState([]);
  const [bankLoaded,setBankLoaded]=useState(false);
  const [showBank,setShowBank]=useState(false);
  const [pickProjectId,setPickProjectId]=useState(null);
  const [showArchive,setShowArchive]=useState(false);
  const [archive,setArchive]=useState(loadArchive);
  const [showToggl,setShowToggl]=useState(false);
  const [togglData,setTogglData]=useState(loadTogglData);
  const [activeTab,setActiveTab]=useState('projects');
  const [miniProjects,setMiniProjects]=useState(loadMini);
  const [miniArchive,setMiniArchive]=useState(loadMiniArchive);
  const [tags,setTags]=useState(loadTags);

  function handleAddTag(tag){
    const updated=[...tags,tag];
    setTags(updated);saveTags(updated);
  }

  function handleMiniSave(mp, bankImgs){
    const validTasks=mp.tasks.filter(t=>t.name.trim());
    const n=validTasks.length;
    const existing=miniProjects.find(x=>x.id===mp.id);
    const needNewMap=!mp.shuffleMap||mp.shuffleMap.length!==n;
    if(needNewMap&&existing&&(existing.puzzlePlaced||[]).length>0){
      if(!confirm('Кількість задач змінилась — пазл скинеться. Продовжити?'))return;
    }
    const shuffleMap=needNewMap?generateShuffleMap(n,hashStr(String(mp.id))):mp.shuffleMap;
    const puzzlePlaced=needNewMap?[]:(mp.puzzlePlaced||[]);
    const imgs=bankImgs||bankImages;
    const imageId=mp.imageId||(imgs.length>0?imgs[Math.floor(Math.random()*imgs.length)].id:null);
    const finalMp={...mp,tasks:validTasks,shuffleMap,puzzlePlaced,imageId,wimmelSeed:mp.wimmelSeed||Math.floor(Math.random()*9999)};
    const updated=existing?miniProjects.map(x=>x.id===finalMp.id?finalMp:x):[finalMp,...miniProjects];
    setMiniProjects(updated);saveMini(updated);
  }
  function handleMiniToggle(mpId,taskId){
    const updated=miniProjects.map(mp=>{
      if(mp.id!==mpId)return mp;
      const tasks=mp.tasks.map(t=>t.id===taskId?{...t,done:!t.done}:t);
      const wasAllDone=mp.tasks.every(t=>t.done);
      const isAllDone=tasks.every(t=>t.done);
      if(!wasAllDone&&isAllDone&&tasks.length>0)spawnConfetti();
      return{...mp,tasks};
    });
    setMiniProjects(updated);saveMini(updated);
  }
  function handleMiniPuzzlePlace(mpId,trayIdx){
    const updated=miniProjects.map(mp=>{
      if(mp.id!==mpId)return mp;
      return{...mp,puzzlePlaced:[...(mp.puzzlePlaced||[]),trayIdx]};
    });
    setMiniProjects(updated);saveMini(updated);
  }
  function handleMiniNewImage(mpId){
    const updated=miniProjects.map(mp=>mp.id===mpId?{...mp,wimmelSeed:((mp.wimmelSeed||0)+1)}:mp);
    setMiniProjects(updated);saveMini(updated);
  }
  function handleMiniPickImage(mpId,imgId){
    const updated=miniProjects.map(mp=>mp.id===mpId?{...mp,imageId:imgId||null}:mp);
    setMiniProjects(updated);saveMini(updated);
  }
  function handleMiniArchive(id){
    const mp=miniProjects.find(x=>x.id===id);
    if(!mp)return;
    const newArchive=[{...mp,archivedAt:new Date().toISOString()},...miniArchive];
    const newProjects=miniProjects.filter(x=>x.id!==id);
    setMiniArchive(newArchive);saveMiniArchive(newArchive);
    setMiniProjects(newProjects);saveMini(newProjects);
  }
  function handleMiniRestore(id){
    const mp=miniArchive.find(x=>x.id===id);
    if(!mp)return;
    const{archivedAt,...restored}=mp;
    setMiniProjects(prev=>{const n=[restored,...prev];saveMini(n);return n;});
    setMiniArchive(prev=>{const n=prev.filter(x=>x.id!==id);saveMiniArchive(n);return n;});
  }
  function handleMiniArchiveDelete(id){
    const n=miniArchive.filter(x=>x.id!==id);
    setMiniArchive(n);saveMiniArchive(n);
  }
  function handleMiniDelete(id){
    const n=miniProjects.filter(x=>x.id!==id);
    setMiniProjects(n);saveMini(n);
  }
  function handleMiniUpdateTask(mpId, taskId, updates){
    const updated=miniProjects.map(mp=>{
      if(mp.id!==mpId)return mp;
      const tasks=mp.tasks.map(t=>t.id===taskId?{...t,...updates}:t);
      return{...mp,tasks};
    });
    setMiniProjects(updated);saveMini(updated);
  }

  function handleMiniPostpone(id){
    const mp=miniProjects.find(x=>x.id===id);
    if(!mp)return;
    const today=new Date().toISOString().slice(0,10);
    const base=mp.startDate&&mp.startDate>=today?mp.startDate:today;
    const[y,m,d]=base.split('-').map(Number);
    const next=new Date(y,m-1,d+1);
    const newDate=`${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
    const updated=miniProjects.map(x=>x.id===id?{...x,startDate:newDate}:x);
    setMiniProjects(updated);saveMini(updated);
  }

  // Auto-sync on mount if token exists and data is older than 5 min
  useEffect(()=>{
    const cfg=loadTogglCfg();
    if(!cfg.token)return;
    const d=loadTogglData();
    if(!d.syncedAt)return;
    const age=(Date.now()-new Date(d.syncedAt).getTime())/60000;
    if(age>5){
      runTogglSync(projects,cfg.token).then(data=>{saveTogglData(data);setTogglData(data);}).catch(()=>{});
    }
  },[]);

  // Load images from IndexedDB on mount
  useEffect(()=>{
    idbGetAll().then(imgs=>{setBankImages(imgs);setBankLoaded(true);});
  },[]);

  const dragProjId=useRef(null);
  const [dragOverId,setDragOverId]=useState(null);
  const projsRef=useRef(projects);
  projsRef.current=projects;

  function onProjDragStart(e,id){dragProjId.current=id;e.dataTransfer.effectAllowed='move';}
  function onProjDragOver(e,id){
    e.preventDefault();
    if(dragProjId.current===id)return;
    setDragOverId(id);
    setProjects(prev=>{
      const fr=prev.findIndex(p=>p.id===dragProjId.current);
      const to=prev.findIndex(p=>p.id===id);
      if(fr<0||to<0||fr===to)return prev;
      const n=[...prev];n.splice(to,0,n.splice(fr,1)[0]);return n;
    });
  }
  function onProjDragEnd(){dragProjId.current=null;setDragOverId(null);save(projsRef.current);}

  // Safety net: clear drag state if mouse released anywhere
  useEffect(()=>{
    const clear=()=>{if(dragProjId.current){dragProjId.current=null;setDragOverId(null);}};
    document.addEventListener('mouseup',clear);
    document.addEventListener('dragend',clear);
    return()=>{document.removeEventListener('mouseup',clear);document.removeEventListener('dragend',clear);};
  },[]);

  function handleStart(){localStorage.setItem(LS_SEEN,'1');setSeen(true);}

  function handleSave(project){
    const leavesForMap=getLeaves(project.stages);
    const n=leavesForMap.length;
    // Preserve done states from existing project by matching stage ids
    const existingProject=projects.find(p=>p.id===project.id);
    const existingDoneIds=existingProject
      ?new Set(existingProject.stages.filter(s=>s.done).map(s=>s.id))
      :new Set();
    const stagesWithDone=project.stages.map(s=>({
      ...s,
      done: existingDoneIds.has(s.id)?true:s.done
    }));
    const projectWithDone={...project,stages:stagesWithDone};

    const needNewMap=!project.shuffleMap||project.shuffleMap.length!==n;
    // Warn if stages count changed and puzzle was in progress
    if(needNewMap&&project.id&&(project.puzzlePlaced||[]).length>0){
      if(!confirm(`Кількість вех змінилась — пазл скинеться (прогрес вех збережеться).\n\nПродовжити?`))return;
    }
    const shuffleMap=needNewMap
      ?generateShuffleMap(n,hashStr(String(project.id||Date.now())))
      :project.shuffleMap;
    const puzzlePlaced=needNewMap?[]:(project.puzzlePlaced||[]);
    const baseProject={...projectWithDone,shuffleMap,puzzlePlaced};
    const finalProject=(!baseProject.imageId&&bankImages.length>0)
      ?{...baseProject,imageId:bankImages[Math.floor(Math.random()*bankImages.length)].id}
      :baseProject;
    const updated=[finalProject,...projects.filter(p=>p.id!==finalProject.id)];
    setProjects(updated);save(updated);setShowForm(false);setEditProject(null);
  }

  function handleUpdateStage(projectId, stageId, updates){
    const updated=projects.map(p=>{
      if(p.id!==projectId)return p;
      const stages=p.stages.map(s=>s.id===stageId?{...s,...updates}:s);
      return{...p,stages};
    });
    setProjects(updated);save(updated);
  }

  function handlePuzzlePlace(projectId,trayIdx){
    setProjects(prev=>{
      const updated=prev.map(p=>{
        if(p.id!==projectId)return p;
        const placed=[...(p.puzzlePlaced||[]),trayIdx];
        return{...p,puzzlePlaced:placed};
      });
      save(updated);return updated;
    });
  }

  function handlePuzzlePlaceAll(projectId){
    setProjects(prev=>{
      const updated=prev.map(p=>{
        if(p.id!==projectId)return p;
        const leaves=getLeaves(p.stages);
        // Тільки виконані вехи
        const doneIdxs=leaves.map((l,i)=>l.done?i:-1).filter(x=>x>=0);
        return{...p,puzzlePlaced:doneIdxs};
      });
      save(updated);return updated;
    });
  }

  function handleToggle(projectId,stageId,subOrFrom,reorderTo){
    if(stageId==='__reorder__'){
      setProjects(prev=>{
        const updated=prev.map(p=>{
          if(p.id!==projectId)return p;
          const fr=p.stages.findIndex(s=>s.id===subOrFrom);
          const to=p.stages.findIndex(s=>s.id===reorderTo);
          if(fr<0||to<0||fr===to)return p;
          const n=[...p.stages];n.splice(to,0,n.splice(fr,1)[0]);
          return{...p,stages:n};
        });
        save(updated);return updated;
      });
      return;
    }
    const updated=projects.map(p=>{
      if(p.id!==projectId)return p;
      const stages=p.stages.map(s=>{
        if(s.id!==stageId)return s;
        return{...s,done:!s.done};
      });
      const wasAllDone=getLeaves(p.stages).every(l=>l.done);
      const isAllDone=getLeaves(stages).every(l=>l.done);
      if(!wasAllDone&&isAllDone&&getLeaves(stages).length>0)spawnConfetti();
      return{...p,stages};
    });
    setProjects(updated);save(updated);
  }

  function confirmDelete(){
    const updated=projects.filter(p=>p.id!==deleteId);
    setProjects(updated);save(updated);setDeleteId(null);
  }

  // Archive
  function handleArchive(projectId){
    const proj=projects.find(p=>p.id===projectId);
    if(!proj)return;
    const archivedProj={...proj,archivedAt:new Date().toISOString()};
    const newArchive=[archivedProj,...archive];
    const newProjects=projects.filter(p=>p.id!==projectId);
    setArchive(newArchive);saveArchive(newArchive);
    setProjects(newProjects);save(newProjects);
  }
  function handleRestore(projectId){
    const proj=archive.find(p=>p.id===projectId);
    if(!proj)return;
    const {archivedAt,...restored}=proj;
    const newProjects=[restored,...projects];
    const newArchive=archive.filter(p=>p.id!==projectId);
    setProjects(newProjects);save(newProjects);
    setArchive(newArchive);saveArchive(newArchive);
  }
  function handleArchiveDelete(projectId){
    const newArchive=archive.filter(p=>p.id!==projectId);
    setArchive(newArchive);saveArchive(newArchive);
  }

  function handleNewImage(projectId){
    const updated=projects.map(p=>p.id===projectId?{...p,wimmelSeed:((p.wimmelSeed||0)+1)}:p);
    setProjects(updated);save(updated);
  }
  async function handleAddBankImage(img){
    await idbPut(img);
    setBankImages(prev=>[...prev,img]);
  }
  async function handleDeleteBankImage(imgId){
    await idbDelete(imgId);
    setBankImages(prev=>prev.filter(i=>i.id!==imgId));
    const up=projects.map(p=>p.imageId===imgId?{...p,imageId:null}:p);setProjects(up);save(up);
  }
  function handlePickImage(imgId){
    if(!pickProjectId)return;
    const up=projects.map(p=>p.id===pickProjectId?{...p,imageId:imgId||null}:p);
    setProjects(up);save(up);setShowBank(false);setPickProjectId(null);
  }
  function openPickMode(projectId){setPickProjectId(projectId);setShowBank(true);}

  const totalP=projects.length;
  const doneP=projects.filter(p=>projLevel(p.stages)==='done').length;
  const dangerP=projects.filter(p=>projLevel(p.stages)==='danger').length;
  const totalL=projects.reduce((a,p)=>a+getLeaves(p.stages).length,0);
  const doneL=projects.reduce((a,p)=>a+getLeaves(p.stages).filter(l=>l.done).length,0);
  const miniCount=miniProjects.length;
  const miniTodayCount=miniProjects.filter(m=>m.startDate===new Date().toISOString().slice(0,10)).length;

  let disp=projects;
  if(search.trim()){const q=search.toLowerCase();disp=disp.filter(p=>p.name.toLowerCase().includes(q)||(p.notes||'').toLowerCase().includes(q)||p.stages.some(s=>s.name.toLowerCase().includes(q)));}
  if(filter==='active')disp=disp.filter(p=>projLevel(p.stages)!=='done');
  if(filter==='done')disp=disp.filter(p=>projLevel(p.stages)==='done');
  if(filter==='danger')disp=disp.filter(p=>['danger','close'].includes(projLevel(p.stages)));
  if(!dragProjId.current){
    if(sort==='urgency')disp=[...disp].sort((a,b)=>projUrgency(a)-projUrgency(b));
    if(sort==='newest')disp=[...disp].sort((a,b)=>b.id-a.id);
    if(sort==='name')disp=[...disp].sort((a,b)=>a.name.localeCompare(b.name,'uk'));
    if(sort==='progress')disp=[...disp].sort((a,b)=>projProgress(b.stages)-projProgress(a.stages));
  }

  const ptd=projects.find(p=>p.id===deleteId);
  if(!seen)return<Onboarding onStart={handleStart}/>;

  return(<div className="app">
    <div className="app-header">
      <h1>🦁 Знайди Лева</h1>
      <div className="header-actions">
        <button className="btn-ghost" onClick={()=>setShowToday(true)}
          style={{fontSize:'.82rem',color:'rgba(232,160,32,.85)',borderColor:'rgba(232,160,32,.3)'}}>
          📅 Сьогодні
        </button>
        <button className="btn-ghost" onClick={()=>setShowToggl(true)}
          style={{fontSize:'.82rem',color:loadTogglCfg().token?'rgba(147,108,230,.85)':'rgba(245,230,200,.5)',
            borderColor:loadTogglCfg().token?'rgba(147,108,230,.35)':'rgba(245,230,200,.15)'}}>
          {loadTogglCfg().token?'⏱ Toggl ✓':'⏱ Toggl'}
        </button>
        <button className="btn-ghost" onClick={()=>{setPickProjectId(null);setShowBank(true);}} style={{fontSize:'.82rem'}}>🖼 Банк</button>
        <button className="btn-ghost" onClick={()=>setShowArchive(true)}
          style={{fontSize:'.82rem',color:archive.length?'rgba(200,160,80,.8)':'rgba(245,230,200,.6)'}}>
          📦 Архів{archive.length>0?` (${archive.length})`:''}
        </button>
        <select className="sort-select" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="urgency">За терміновістю</option>
          <option value="newest">За датою</option>
          <option value="name">За назвою</option>
          <option value="progress">За прогресом</option>
        </select>
        <button className="btn-ghost" onClick={()=>{localStorage.removeItem(LS_SEEN);setSeen(false);}}>
          Як це працює?
        </button>
      </div>
    </div>

    {projects.length>0&&(
      <div className="stats-bar">
        <div className="stat-chip">🦁 Проектів: <strong>{totalP}</strong></div>
        <div className="stat-chip">✅ Завершено: <strong>{doneP}</strong></div>
        {dangerP>0&&<div className="stat-chip" style={{borderColor:'rgba(255,85,85,.3)',color:'#ff5555'}}>🔥 Горить: <strong>{dangerP}</strong></div>}
        {totalL>0&&<div className="stat-chip">🧩 Фрагментів: <strong>{doneL}/{totalL}</strong></div>}
        {archive.length>0&&<div className="stat-chip" style={{cursor:'pointer'}} onClick={()=>setShowArchive(true)}>📦 В архіві: <strong>{archive.length}</strong></div>}
      </div>
    )}

    {(()=>{
      const raw=TIPS[tipIdx];
      const emojiMatch=raw.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)/u);
      const emoji=emojiMatch?emojiMatch[0]:'💡';
      const text=emojiMatch?raw.slice(emoji.length).trim():raw;
      return(
        <div className="tip-card">
          <div className="tip-card-top">
            <span className="tip-card-label">💡 Порада для СДВГ-мозку</span>
            <span className="tip-card-counter">{tipIdx+1}/{TIPS.length}</span>
          </div>
          <div className="tip-card-body">
            <span className="tip-card-emoji">{emoji}</span>
            <span className="tip-card-text">{text}</span>
          </div>
          <div className="tip-card-nav">
            <button className="tip-nav-btn" onClick={()=>setTipIdx(i=>(i-1+TIPS.length)%TIPS.length)}>‹ Назад</button>
            <div className="tip-dots">
              {TIPS.map((_,i)=>(
                <div key={i} className={`tip-dot${i===tipIdx?' active':''}`} onClick={()=>setTipIdx(i)}/>
              ))}
            </div>
            <button className="tip-nav-btn" onClick={()=>setTipIdx(i=>(i+1)%TIPS.length)}>Далі ›</button>
          </div>
        </div>
      );
    })()}

    <div className="tab-switcher">
      <button className={`tab-btn${activeTab==='projects'?' active':''}`} onClick={()=>setActiveTab('projects')}>
        🦁 Проекти
        {totalP>0&&<span className={`tab-badge${dangerP>0?' ':''}${dangerP>0?'':''}`}
          style={{background:dangerP>0?'rgba(255,85,85,.2)':'rgba(232,160,32,.18)',
            color:dangerP>0?'#ff8a80':'var(--amber)'}}>{totalP}</span>}
      </button>
      <button className={`tab-btn${activeTab==='mini'?' active':''}`} onClick={()=>setActiveTab('mini')}>
        ⚡ Міні
        {miniCount>0&&<span className="tab-badge green">{miniTodayCount>0?`${miniTodayCount} сьогодні`:miniCount}</span>}
      </button>
      <button className={`tab-btn${activeTab==='analytics'?' active':''}`} onClick={()=>setActiveTab('analytics')}>
        📊 Аналітика
      </button>
    </div>

    {activeTab==='analytics'&&<AnalyticsTab projects={projects} miniProjects={miniProjects} tags={tags}/>}

    {activeTab==='mini'&&<MiniProjectsTab
      miniProjects={miniProjects}
      miniArchive={miniArchive}
      bankImages={bankImages}
      tags={tags}
      onAddTag={handleAddTag}
      onSave={handleMiniSave}
      onToggle={handleMiniToggle}
      onArchive={handleMiniArchive}
      onRestore={handleMiniRestore}
      onArchiveDelete={handleMiniArchiveDelete}
      onDelete={handleMiniDelete}
      onPostpone={handleMiniPostpone}
      onPuzzlePlace={handleMiniPuzzlePlace}
      onNewImage={handleMiniNewImage}
      onPickImage={handleMiniPickImage}
      onAddBankImage={handleAddBankImage}
      onUpdateTask={handleMiniUpdateTask}
    />}

    {activeTab==='projects'&&<>
      {!showForm&&(
        <button className="btn-primary" onClick={()=>setShowForm(true)}
          style={{width:'100%',marginBottom:'1.2rem',borderRadius:14,fontSize:'1rem'}}>
          + Новий проект
        </button>
      )}
      {showForm&&<ProjectForm onSave={handleSave} onCancel={()=>setShowForm(false)} allProjects={projects}/>}

    {projects.length>0&&(<>
      <div className="search-wrap">
        <span className="search-icon">🔍</span>
        <input className="search-input" placeholder="Пошук проектів та етапів..."
          value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div className="filter-tabs">
        {[['all','Всі'],['active','Активні'],['danger','🔥 Горять'],['done','✅ Готові']].map(([k,l])=>(
          <button key={k} className={`filter-tab${filter===k?' active':''}`} onClick={()=>setFilter(k)}>{l}</button>
        ))}
      </div>
    </>)}

    {!projects.length&&!showForm&&(
      <div className="empty-state"><div className="e-lion">🦁</div>
        <p>Левів ще немає.<br/>Додай перший проект — і знайди свого лева.</p>
      </div>
    )}
    {projects.length>0&&!disp.length&&(
      <div className="empty-state"><div className="e-lion" style={{fontSize:'2.5rem'}}>🔍</div><p>Нічого не знайдено.</p></div>
    )}

    <div className="projects-grid">
      {disp.map(p=>(
        <ProjectCard key={p.id} project={p}
          onToggle={handleToggle}
          onDelete={setDeleteId}
          onArchive={handleArchive}
          onEdit={setEditProject}
          onUpdateStage={handleUpdateStage}
          tags={tags}
          onAddTag={handleAddTag}
          onProjDragStart={onProjDragStart}
          onProjDragOver={onProjDragOver}
          onProjDragEnd={onProjDragEnd}
          isDragging={dragProjId.current===p.id}
          isDragOver={dragOverId===p.id&&dragProjId.current!==p.id}
          onNewImage={handleNewImage}
          onPickImage={openPickMode}
          onPuzzlePlace={handlePuzzlePlace}
          onPuzzlePlaceAll={handlePuzzlePlaceAll}
          customImage={p.imageId?bankImages.find(i=>i.id===p.imageId)?.data||null:null}
          allProjects={projects}
          togglProjData={togglData.projects?togglData.projects[p.id]||null:null}
        />
      ))}
    </div>
    </>}

    {showToday&&<TodayModal projects={projects} onClose={()=>setShowToday(false)} onToggle={handleToggle}/>}
    {showToggl&&<TogglModal projects={projects} togglData={togglData} onClose={()=>setShowToggl(false)} onSynced={data=>{setTogglData(data);}}/>}
    {deleteId&&ptd&&<DeleteConfirm name={ptd.name} onConfirm={confirmDelete} onCancel={()=>setDeleteId(null)}/>}
    {editProject&&<EditOverlay project={editProject} onSave={handleSave} onCancel={()=>setEditProject(null)} allProjects={projects}/>}
    {showBank&&bankLoaded&&(
      <ImageBankModal
        bankImages={bankImages}
        onClose={()=>{setShowBank(false);setPickProjectId(null);}}
        onAddImage={handleAddBankImage}
        onDeleteImage={handleDeleteBankImage}
        pickMode={!!pickProjectId}
        currentImageId={pickProjectId?projects.find(p=>p.id===pickProjectId)?.imageId||null:null}
        onPick={handlePickImage}
      />
    )}
    {showArchive&&(
      <ArchiveModal
        archive={archive}
        projects={projects}
        bankImages={bankImages}
        onClose={()=>setShowArchive(false)}
        onRestore={handleRestore}
        onDeletePermanently={handleArchiveDelete}
        onExport={()=>exportBackup(projects,archive,miniProjects,miniArchive)}
        onImportFile={null}
      />
    )}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
