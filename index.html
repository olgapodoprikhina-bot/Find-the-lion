<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Знайди Лева — Puzzle</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--savanna:#130e05;--dust:#f5e6c8;--amber:#e8a020;--flame:#d45a1a;--border:rgba(232,160,32,.22);--border-bright:rgba(232,160,32,.5);--card:rgba(30,21,8,.88);--ghost:rgba(245,230,200,.05);}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--savanna);color:var(--dust);font-family:'Nunito',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 90% 50% at 50% 110%,rgba(45,58,26,.5) 0%,transparent 70%),radial-gradient(ellipse 60% 30% at 10% 90%,rgba(139,69,19,.12) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 8% 12%,rgba(245,230,200,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 48% 10%,rgba(245,230,200,.6) 0%,transparent 100%),radial-gradient(1px 1px at 85% 16%,rgba(245,230,200,.45) 0%,transparent 100%);pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.app-header h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--amber);font-weight:900}
.btn{border:none;border-radius:50px;padding:.65rem 1.5rem;font-size:.9rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:.4rem}
.btn-primary{background:linear-gradient(135deg,var(--amber),var(--flame));color:#0d0900;box-shadow:0 4px 18px rgba(212,90,26,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(212,90,26,.5)}
.btn-primary:disabled{opacity:.5;cursor:default;transform:none}
.btn-ghost{background:var(--ghost);border:1px solid var(--border);color:rgba(245,230,200,.7);border-radius:10px;padding:.5rem 1rem;font-size:.84rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:.35rem}
.btn-ghost:hover{background:rgba(245,230,200,.1)}
.btn-ghost:disabled{opacity:.4;cursor:default}
.btn-sm{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.28);border-radius:8px;color:var(--amber);padding:.32rem .7rem;font-size:.76rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-sm:hover{background:rgba(232,160,32,.2)}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:1.5rem;margin-bottom:1.8rem;backdrop-filter:blur(8px);animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.project-card h2{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--dust)}
.project-meta{font-size:.73rem;color:rgba(245,230,200,.32);margin:.2rem 0 .9rem}
.puzzle-wrap{width:100%;aspect-ratio:16/9;background:#050300;border-radius:14px;overflow:hidden;border:1.5px solid var(--border);display:grid;gap:2px;margin-bottom:1.1rem}
.puzzle-piece{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1)}
.puzzle-piece.revealed{transform:rotateY(180deg)}
.piece-front,.piece-back{position:absolute;inset:0;backface-visibility:hidden}
.piece-front{background:linear-gradient(135deg,#2a1f0d,#130e05);display:flex;align-items:center;justify-content:center}
.piece-front::after{content:'🦁';opacity:.15;font-size:1.1rem}
.piece-back{transform:rotateY(180deg);background-size:cover;background-repeat:no-repeat}
.puzzle-no-img{width:100%;aspect-ratio:16/9;background:rgba(232,160,32,.04);border:1.5px dashed rgba(232,160,32,.22);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;margin-bottom:1.1rem;color:rgba(245,230,200,.28);font-size:.83rem;text-align:center;cursor:pointer;transition:background .2s}
.puzzle-no-img:hover{background:rgba(232,160,32,.08)}
.puzzle-no-img span{font-size:2.2rem}
.stage-item{display:flex;align-items:center;gap:.85rem;padding:.72rem .9rem;background:rgba(255,255,255,.04);margin-bottom:.45rem;border-radius:12px;cursor:pointer;transition:background .12s}
.stage-item:hover{background:rgba(245,230,200,.07)}
.stage-item.done{opacity:.42}
.stage-item.done .stage-text{text-decoration:line-through}
.stage-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(232,160,32,.32);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.stage-item.done .stage-check{background:var(--amber);border-color:var(--amber)}
.stage-check-inner{font-size:.62rem;color:#0d0900;font-weight:900}
.stage-text{font-size:.87rem;font-weight:600;flex:1}
.prog-bar-wrap{height:4px;background:rgba(245,230,200,.07);border-radius:2px;margin-bottom:.9rem;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--amber),var(--flame));border-radius:2px;transition:width .5s ease}
.lib-overlay{position:fixed;inset:0;background:rgba(5,3,1,.9);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem;overflow-y:auto;backdrop-filter:blur(6px);animation:fadeOv .18s ease}
@keyframes fadeOv{from{opacity:0}to{opacity:1}}
.lib-panel{background:#1a1005;border:1px solid var(--border-bright);border-radius:24px;padding:1.8rem;max-width:700px;width:100%;margin:auto;box-shadow:0 24px 70px rgba(0,0,0,.75);animation:popUp .22s ease}
@keyframes popUp{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.lib-panel h2{font-family:'Playfair Display',serif;color:var(--amber);font-size:1.3rem;margin-bottom:.3rem}
.lib-desc{font-size:.8rem;color:rgba(245,230,200,.38);margin-bottom:1.2rem;line-height:1.5}
.lib-tabs{display:flex;gap:.4rem;margin-bottom:1.2rem;flex-wrap:wrap}
.lib-tab{background:transparent;border:1px solid var(--border);border-radius:8px;color:rgba(245,230,200,.45);padding:.32rem .8rem;font-size:.78rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.lib-tab:hover{border-color:var(--border-bright);color:var(--dust)}
.lib-tab.active{background:rgba(232,160,32,.14);border-color:var(--border-bright);color:var(--amber)}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.75rem;max-height:52vh;overflow-y:auto;padding-right:.25rem;margin-bottom:1.2rem}
.lib-thumb{position:relative;aspect-ratio:16/9;border-radius:10px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:border-color .2s,transform .15s;background:#0a0600}
.lib-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.lib-thumb:hover{border-color:rgba(232,160,32,.5);transform:scale(1.03)}
.lib-thumb.selected{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,160,32,.22)}
.lib-thumb .t-del{position:absolute;top:.3rem;right:.3rem;background:rgba(8,5,2,.85);border:none;border-radius:6px;color:#ff8a80;font-size:.7rem;padding:.22rem .42rem;cursor:pointer;opacity:0;transition:opacity .15s;font-family:'Nunito',sans-serif;font-weight:800}
.lib-thumb:hover .t-del{opacity:1}
.lib-thumb .t-lbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);font-size:.63rem;color:rgba(245,230,200,.85);padding:.32rem .45rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-thumb .t-err{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:rgba(245,230,200,.2)}
.lib-empty{text-align:center;padding:2.5rem 1rem;color:rgba(245,230,200,.22);font-size:.85rem;line-height:1.7}
.add-form{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.2rem}
.lib-input{background:rgba(245,230,200,.05);border:1px solid rgba(232,160,32,.22);border-radius:10px;color:var(--dust);padding:.65rem .95rem;font-size:.9rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;width:100%}
.lib-input:focus{border-color:var(--amber)}
.lib-input::placeholder{color:rgba(245,230,200,.22)}
.add-row{display:flex;gap:.6rem}
.add-row .lib-input{flex:1}
.hint-box{background:rgba(232,160,32,.05);border:1px solid rgba(232,160,32,.15);border-radius:12px;padding:.9rem 1rem;font-size:.77rem;color:rgba(245,230,200,.42);line-height:1.8}
.hint-box code{background:rgba(0,0,0,.3);padding:.1rem .4rem;border-radius:4px;font-size:.72rem;word-break:break-all}
.lib-footer{display:flex;gap:.7rem;justify-content:flex-end;border-top:1px solid var(--border);padding-top:1rem;align-items:center;flex-wrap:wrap}
.lib-footer-note{font-size:.73rem;color:rgba(245,230,200,.25);flex:1;min-width:80px}
.form-input{background:rgba(245,230,200,.05);border:1px solid rgba(232,160,32,.22);border-radius:10px;color:var(--dust);padding:.65rem .95rem;font-size:.92rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;width:100%}
.form-input:focus{border-color:var(--amber)}
.form-input::placeholder{color:rgba(245,230,200,.22)}
.confetti-piece{position:fixed;width:9px;height:9px;border-radius:2px;animation:cfetti 1.6s ease-out forwards;pointer-events:none;z-index:300}
@keyframes cfetti{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(95vh) rotate(720deg) scale(.4);opacity:0}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(232,160,32,.2);border-radius:3px}
@media(max-width:500px){.lib-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}.add-row{flex-direction:column}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState } = React;
const LS_PROJ='znleva_proj_v1', LS_IMGS='znleva_imgs_v1';
function loadJ(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}}
function saveJ(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const DEFAULT_IMAGES=[
  {id:'di1',label:'Лев у савані',   url:'https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&q=80&w=1200'},
  {id:'di2',label:'Осінній ліс',    url:'https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=1200'},
  {id:'di3',label:'Гірське озеро',  url:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1200'},
  {id:'di4',label:'Тропічний пляж', url:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=1200'},
  {id:'di5',label:'Зоряне небо',    url:'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&q=80&w=1200'},
  {id:'di6',label:'Квіти',          url:'https://images.unsplash.com/photo-1490750967868-88df5691166a?auto=format&fit=crop&q=80&w=1200'},
];

function pickRandom(arr){if(!arr.length)return null;return arr[Math.floor(Math.random()*arr.length)];}

function spawnConfetti(){
  const cols=['#e8a020','#d45a1a','#7fc47a','#f5e6c8','#ff8c42','#ffd700'];
  for(let i=0;i<42;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    const sz=5+Math.random()*8;
    el.style.cssText=`left:${10+Math.random()*80}vw;top:0;background:${cols[~~(Math.random()*cols.length)]};animation-delay:${Math.random()*.65}s;width:${sz}px;height:${sz}px`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
  }
}

function Puzzle({stages,imageUrl,onClickEmpty}){
  const total=stages.length;
  if(!total)return null;
  const cols=Math.ceil(Math.sqrt(total*1.77));
  const rows=Math.ceil(total/cols);
  if(!imageUrl)return(
    <div className="puzzle-no-img" onClick={onClickEmpty}>
      <span>🖼️</span>Натисни, щоб вибрати картинку для пазлу
    </div>
  );
  return(
    <div className="puzzle-wrap" style={{gridTemplateColumns:`repeat(${cols},1fr)`,gridTemplateRows:`repeat(${rows},1fr)`}}>
      {Array.from({length:total}).map((_,idx)=>{
        const revealed=stages[idx]?.done;
        const r=Math.floor(idx/cols),c=idx%cols;
        const px=cols>1?(c/(cols-1))*100:0,py=rows>1?(r/(rows-1))*100:0;
        return(
          <div key={idx} className={`puzzle-piece${revealed?' revealed':''}`}>
            <div className="piece-front"/>
            <div className="piece-back" style={{backgroundImage:`url(${imageUrl})`,backgroundPosition:`${px}% ${py}%`,backgroundSize:`${cols*100}% ${rows*100}%`}}/>
          </div>
        );
      })}
    </div>
  );
}

function Thumb({img,selected,onSelect,onDelete}){
  const [err,setErr]=useState(false);
  return(
    <div className={`lib-thumb${selected?' selected':''}`} onClick={()=>!err&&onSelect(img)}>
      {err?<div className="t-err">🚫</div>:<img src={img.url} alt={img.label} onError={()=>setErr(true)} loading="lazy"/>}
      <div className="t-lbl">{img.label||'без назви'}</div>
      <button className="t-del" onClick={e=>{e.stopPropagation();onDelete(img.id);}}>✕</button>
    </div>
  );
}

function ImageLibrary({currentId,onClose,onPick}){
  const [images,setImages]=useState(()=>loadJ(LS_IMGS,DEFAULT_IMAGES));
  const [tab,setTab]=useState('library');
  const [selected,setSel]=useState(currentId||null);
  const [url,setUrl]=useState('');
  const [label,setLabel]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');

  function persist(imgs){setImages(imgs);saveJ(LS_IMGS,imgs);}

  function guessLabel(u){
    try{const p=new URL(u).pathname.split('/').pop().replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');return p.slice(0,35)||'зображення';}catch{return'зображення';}
  }

  function addUrl(){
    const u=url.trim();
    if(!u){setMsg('Введи URL');return;}
    setBusy(true);setMsg('Перевіряю...');
    function finish(){
      const nm={id:Date.now()+'',url:u,label:label.trim()||guessLabel(u)};
      const upd=[...images,nm];persist(upd);setSel(nm.id);
      setUrl('');setLabel('');setBusy(false);setMsg('✓ Додано!');setTab('library');
    }
    const im=new Image();im.onload=finish;im.onerror=finish;im.src=u;
  }

  function deleteImg(id){persist(images.filter(i=>i.id!==id));if(selected===id)setSel(null);}

  return(
    <div className="lib-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="lib-panel">
        <h2>🖼️ Бібліотека картинок</h2>
        <p className="lib-desc">Картинки зберігаються у браузері. Додавай зображення з інтернету — і вони залишаться тут назавжди.</p>

        <div className="lib-tabs">
          {[['library','📚 Бібліотека'],['add','➕ Додати URL'],['gdrive','📁 Google Drive']].map(([k,l])=>(
            <button key={k} className={`lib-tab${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {tab==='library'&&(
          images.length===0
            ?<div className="lib-empty">Бібліотека порожня 🦁<br/>Перейди на вкладку «Додати URL»</div>
            :<div className="lib-grid">
              {images.map(img=>(
                <Thumb key={img.id} img={img} selected={selected===img.id} onSelect={i=>setSel(i.id)} onDelete={deleteImg}/>
              ))}
            </div>
        )}

        {tab==='add'&&(
          <div className="add-form">
            <div className="hint-box">
              💡 Вставляй прямі посилання на зображення (JPG, PNG, WebP).<br/>
              Unsplash, Pinterest, будь-який сайт.<br/>
              <strong style={{color:'rgba(232,160,32,.8)'}}>Google Drive:</strong> формат посилання — нижче на вкладці «Google Drive».
            </div>
            <div className="add-row">
              <input className="lib-input" placeholder="https://... (URL зображення)"
                value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!busy&&addUrl()}/>
            </div>
            <div className="add-row">
              <input className="lib-input" placeholder="Назва (необов'язково)"
                value={label} onChange={e=>setLabel(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!busy&&addUrl()}/>
              <button className="btn btn-primary" onClick={addUrl} disabled={!url.trim()||busy}
                style={{borderRadius:10,padding:'.65rem 1.3rem',flexShrink:0,whiteSpace:'nowrap'}}>
                {busy?'…':'Додати'}
              </button>
            </div>
            {msg&&<div style={{fontSize:'.8rem',color:'rgba(232,160,32,.8)'}}>{msg}</div>}
          </div>
        )}

        {tab==='gdrive'&&(
          <div className="hint-box" style={{lineHeight:2,marginBottom:'1rem'}}>
            <strong style={{color:'rgba(232,160,32,.9)',fontSize:'.85rem'}}>Як додати картинку з Google Drive:</strong><br/>
            1. Правий клік на файл → <strong>Поділитися → Копіювати посилання</strong><br/>
            2. З посилання виріж ID між <code>/d/</code> і <code>/view</code>:<br/>
            &nbsp;&nbsp;&nbsp;<code>drive.google.com/file/d/<strong style={{color:'#ff8c42'}}>1abc2XYZ</strong>/view</code><br/>
            3. Склади посилання і додай на вкладці «Додати URL»:<br/>
            <code>https://drive.google.com/uc?export=view&id=<strong style={{color:'#ff8c42'}}>1abc2XYZ</strong></code><br/><br/>
            <strong style={{color:'rgba(255,140,66,.8)'}}>⚠️</strong> Файл має мати доступ <strong>«Усі з посиланням — Переглядач»</strong>
          </div>
        )}

        <div className="lib-footer">
          <span className="lib-footer-note">{images.length} зображ.</span>
          <button className="btn-ghost" onClick={onClose}>Скасувати</button>
          <button className="btn-ghost" onClick={()=>{const img=pickRandom(images);if(img)onPick(img);}} disabled={!images.length}>🎲 Рандом</button>
          <button className="btn btn-primary" onClick={()=>{const img=images.find(i=>i.id===selected);if(img)onPick(img);else onClose();}} disabled={!selected} style={{borderRadius:10,padding:'.65rem 1.3rem'}}>
            Вибрати ✓
          </button>
        </div>
      </div>
    </div>
  );
}

function AddProjectForm({onSave,onCancel}){
  const [name,setName]=useState('');
  const [stagesRaw,setStages]=useState('');
  const [chosenImg,setChosen]=useState(null);
  const [showLib,setShowLib]=useState(false);

  function save(){
    if(!name.trim())return;
    const lines=stagesRaw.split('\n').map(l=>l.trim()).filter(Boolean);
    const stages=lines.length?lines.map((t,i)=>({id:Date.now()+i,text:t,done:false})):[{id:Date.now(),text:'Крок 1',done:false}];
    let img=chosenImg;
    if(!img){const lib=loadJ(LS_IMGS,DEFAULT_IMAGES);img=pickRandom(lib);}
    onSave({id:Date.now(),name:name.trim(),imageUrl:img?.url||null,imageId:img?.id||null,stages});
  }

  return(<>
    <div className="project-card" style={{border:'1px solid rgba(232,160,32,.4)',marginBottom:'1.8rem'}}>
      <h2 style={{color:'var(--amber)',marginBottom:'1rem'}}>🦁 Новий проект</h2>
      <div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
        <input className="form-input" placeholder="Назва проекту" value={name} onChange={e=>setName(e.target.value)}/>
        <textarea className="form-input" style={{resize:'vertical',minHeight:90}}
          placeholder={"Кроки (кожен з нового рядка):\nУзгодження з клієнтом\nВикрійка\nРозкрій\n..."}
          value={stagesRaw} onChange={e=>setStages(e.target.value)}/>
        <div style={{display:'flex',alignItems:'center',gap:'.75rem',flexWrap:'wrap'}}>
          <button className="btn-sm" onClick={()=>setShowLib(true)}>
            {chosenImg?'🖼️ Змінити картинку':'🖼️ Вибрати картинку'}
          </button>
          {chosenImg
            ?<span style={{fontSize:'.77rem',color:'rgba(232,160,32,.7)'}}>✓ {chosenImg.label}</span>
            :<span style={{fontSize:'.75rem',color:'rgba(245,230,200,.25)'}}>або буде рандомна з бібліотеки</span>
          }
        </div>
        {chosenImg&&(
          <div style={{width:'100%',aspectRatio:'16/9',borderRadius:10,overflow:'hidden',border:'1px solid var(--border)'}}>
            <img src={chosenImg.url} alt={chosenImg.label} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>
          </div>
        )}
        <div style={{display:'flex',gap:'.6rem',justifyContent:'flex-end',paddingTop:'.2rem'}}>
          <button className="btn-ghost" onClick={onCancel}>Скасувати</button>
          <button className="btn btn-primary" onClick={save} style={{borderRadius:10}}>Запустити лева →</button>
        </div>
      </div>
    </div>
    {showLib&&<ImageLibrary currentId={chosenImg?.id||null} onClose={()=>setShowLib(false)} onPick={img=>{setChosen(img);setShowLib(false);}}/>}
  </>);
}

function ProjectCard({project,onToggle,onChangeImage}){
  const done=project.stages.filter(s=>s.done).length,total=project.stages.length;
  const pct=total?Math.round(done/total*100):0;
  return(
    <div className="project-card">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'1rem',marginBottom:'.2rem'}}>
        <h2>{project.name}</h2>
        <button className="btn-sm" onClick={()=>onChangeImage(project.id)}>🖼️ Картинка</button>
      </div>
      <div className="project-meta">{done}/{total} кроків · {pct}%</div>
      <div className="prog-bar-wrap"><div className="prog-bar" style={{width:pct+'%'}}/></div>
      <Puzzle stages={project.stages} imageUrl={project.imageUrl} onClickEmpty={()=>onChangeImage(project.id)}/>
      {project.stages.map(s=>(
        <div key={s.id} className={`stage-item${s.done?' done':''}`} onClick={()=>onToggle(project.id,s.id)}>
          <div className="stage-check">{s.done&&<span className="stage-check-inner">✓</span>}</div>
          <span className="stage-text">{s.text||s.name||'—'}</span>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [projects,setProjects]=useState(()=>loadJ(LS_PROJ,[]));
  const [showForm,setShowForm]=useState(false);
  const [libForId,setLibForId]=useState(null);

  function saveP(p){setProjects(p);saveJ(LS_PROJ,p);}

  function handleAdd(project){saveP([project,...projects]);setShowForm(false);}

  function handleToggle(projId,stageId){
    const updated=projects.map(p=>{
      if(p.id!==projId)return p;
      const stages=p.stages.map(s=>s.id===stageId?{...s,done:!s.done}:s);
      if(!p.stages.every(s=>s.done)&&stages.every(s=>s.done))spawnConfetti();
      return{...p,stages};
    });
    saveP(updated);
  }

  function handleImagePick(img){
    saveP(projects.map(p=>p.id===libForId?{...p,imageUrl:img.url,imageId:img.id}:p));
    setLibForId(null);
  }

  return(<>
    <div className="app">
      <div className="app-header">
        <h1>🦁 Знайди Лева</h1>
        {!showForm&&<button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ Новий проект</button>}
      </div>
      {showForm&&<AddProjectForm onSave={handleAdd} onCancel={()=>setShowForm(false)}/>}
      {!projects.length&&!showForm&&(
        <div style={{textAlign:'center',padding:'4rem 1rem',color:'rgba(245,230,200,.28)'}}>
          <div style={{fontSize:'3.5rem',marginBottom:'1rem',opacity:.35}}>🦁</div>
          <p style={{fontSize:'.95rem',lineHeight:1.7}}>Левів ще немає.<br/>Додай перший проект!</p>
        </div>
      )}
      {projects.map(p=><ProjectCard key={p.id} project={p} onToggle={handleToggle} onChangeImage={setLibForId}/>)}
    </div>
    {libForId!=null&&<ImageLibrary currentId={projects.find(p=>p.id===libForId)?.imageId||null} onClose={()=>setLibForId(null)} onPick={handleImagePick}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
