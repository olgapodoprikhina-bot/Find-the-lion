<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Знайди Лева 🦁</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Знайди Лева"/>
<meta name="theme-color" content="#e8a020"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --savanna:#130e05;--dust:#f5e6c8;
  --amber:#e8a020;--amber-dim:rgba(232,160,32,.18);--flame:#d45a1a;
  --ghost:rgba(245,230,200,.06);--card:rgba(30,21,8,.85);
  --border:rgba(232,160,32,.22);--border-bright:rgba(232,160,32,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--savanna);color:var(--dust);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 90% 50% at 50% 110%,rgba(45,58,26,.5) 0%,transparent 70%),
  radial-gradient(ellipse 60% 30% at 10% 90%,rgba(139,69,19,.12) 0%,transparent 60%);
  pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:
  radial-gradient(1px 1px at 8% 12%,rgba(245,230,200,.5) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 48% 10%,rgba(245,230,200,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 85% 16%,rgba(245,230,200,.45) 0%,transparent 100%),
  radial-gradient(1px 1px at 22% 6%,rgba(245,230,200,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 60% 18%,rgba(245,230,200,.35) 0%,transparent 100%);
  pointer-events:none;z-index:0;animation:twinkle 6s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.7}100%{opacity:1}}
#root{position:relative;z-index:1}

.onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center}
.onboard-lion{font-size:5rem;animation:breathe 3s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(232,160,32,.6));margin-bottom:1.5rem}
@keyframes breathe{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.1) rotate(2deg)}}
.onboard h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,6vw,3.8rem);font-weight:900;color:var(--amber);line-height:1.1;margin-bottom:.5rem}
.onboard-subtitle{font-size:.95rem;color:rgba(245,230,200,.5);margin-bottom:2.5rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.theory-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:.9rem;max-width:880px;width:100%;margin-bottom:2.5rem}
.theory-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:18px;padding:1.4rem 1.2rem;text-align:left;backdrop-filter:blur(10px);transition:border-color .2s,transform .2s}
.theory-card:hover{border-color:var(--border-bright);transform:translateY(-2px)}
.theory-card .icon{font-size:1.8rem;margin-bottom:.6rem}
.theory-card h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--amber);margin-bottom:.4rem}
.theory-card p{font-size:.85rem;line-height:1.65;color:rgba(245,230,200,.7)}

.btn-primary{background:linear-gradient(135deg,var(--amber),var(--flame));color:var(--savanna);border:none;border-radius:50px;padding:.9rem 2.5rem;font-size:1.05rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 24px rgba(212,90,26,.45)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,90,26,.55)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--ghost);border:1px solid var(--border);border-radius:10px;color:rgba(245,230,200,.7);padding:.5rem 1rem;font-size:.85rem;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .15s}
.btn-ghost:hover{background:rgba(245,230,200,.1)}
.btn-secondary{background:transparent;border:1px solid var(--border);border-radius:10px;color:rgba(245,230,200,.6);padding:.6rem 1.3rem;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;transition:background .15s}
.btn-secondary:hover{background:rgba(245,230,200,.06)}
.btn-icon{background:transparent;border:1px solid rgba(212,90,26,.3);border-radius:7px;color:var(--flame);width:30px;height:30px;cursor:pointer;font-size:.88rem;transition:background .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-icon:hover{background:rgba(212,90,26,.15)}
.btn-danger{background:rgba(192,57,43,.85);border:none;border-radius:10px;color:#fff;padding:.6rem 1.4rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:background .15s}
.btn-danger:hover{background:#c0392b}

.app{max-width:1020px;margin:0 auto;padding:1.5rem 1.2rem 4rem}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.app-header h1{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--amber);font-weight:900}
.header-actions{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.stats-bar{display:flex;gap:.7rem;margin-bottom:1.4rem;flex-wrap:wrap}
.stat-chip{background:var(--ghost);border:1px solid var(--border);border-radius:10px;padding:.5rem .9rem;font-size:.8rem;display:flex;align-items:center;gap:.4rem;color:rgba(245,230,200,.65)}
.stat-chip strong{color:var(--amber);font-weight:800;font-size:1rem}
.search-wrap{position:relative;margin-bottom:1rem}
.search-input{width:100%;background:rgba(245,230,200,.05);border:1px solid var(--border);border-radius:12px;color:var(--dust);padding:.7rem 1rem .7rem 2.6rem;font-size:.95rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--amber)}
.search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.4;pointer-events:none}
.filter-tabs{display:flex;gap:.4rem;margin-bottom:1.4rem;flex-wrap:wrap}
.filter-tab{background:transparent;border:1px solid var(--border);border-radius:8px;color:rgba(245,230,200,.5);padding:.35rem .85rem;font-size:.8rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.filter-tab:hover{border-color:var(--border-bright);color:var(--dust)}
.filter-tab.active{background:var(--amber-dim);border-color:var(--border-bright);color:var(--amber)}
.sort-select{background:rgba(245,230,200,.05);border:1px solid var(--border);border-radius:9px;color:rgba(245,230,200,.65);padding:.38rem .7rem;font-size:.8rem;font-family:'Nunito',sans-serif;outline:none;cursor:pointer}
/* TIP CARD */
.tip-card{background:linear-gradient(135deg,rgba(232,160,32,.07) 0%,rgba(212,90,26,.05) 100%);border:1px solid rgba(232,160,32,.2);border-radius:18px;padding:1.1rem 1.3rem 1rem;margin-bottom:1.3rem;position:relative;overflow:hidden}
.tip-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(232,160,32,.05),transparent);pointer-events:none}
.tip-card-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.55rem}
.tip-card-label{font-size:.62rem;font-weight:800;color:rgba(232,160,32,.5);text-transform:uppercase;letter-spacing:.1em}
.tip-card-counter{font-size:.6rem;color:rgba(245,230,200,.22);margin-left:auto;font-weight:700}
.tip-card-body{display:flex;align-items:flex-start;gap:.85rem}
.tip-card-emoji{font-size:1.8rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(232,160,32,.3))}
.tip-card-text{font-size:.9rem;line-height:1.6;color:rgba(245,230,200,.82);font-weight:600;flex:1}
.tip-card-text em{font-style:normal;color:var(--amber)}
.tip-card-nav{display:flex;align-items:center;justify-content:space-between;margin-top:.8rem;padding-top:.7rem;border-top:1px solid rgba(232,160,32,.08)}
.tip-nav-btn{background:none;border:1px solid rgba(232,160,32,.18);border-radius:8px;color:rgba(232,160,32,.45);cursor:pointer;font-size:.85rem;padding:.25rem .65rem;font-family:'Nunito',sans-serif;transition:all .15s;line-height:1}
.tip-nav-btn:hover{background:rgba(232,160,32,.1);color:var(--amber);border-color:rgba(232,160,32,.4)}
.tip-dots{display:flex;gap:.35rem;align-items:center}
.tip-dot{width:6px;height:6px;border-radius:50%;background:rgba(232,160,32,.18);transition:all .25s;cursor:pointer}
.tip-dot.active{background:rgba(232,160,32,.75);width:18px;border-radius:3px}
.tip-dot:hover{background:rgba(232,160,32,.45)}

/* FORM */
.new-project-card{background:var(--card);border:1px solid var(--border-bright);border-radius:22px;padding:1.8rem;margin-bottom:2rem;backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(0,0,0,.4);animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.new-project-card h2,.edit-overlay-card h2{font-family:'Playfair Display',serif;color:var(--amber);margin-bottom:1.3rem;font-size:1.25rem}
.form-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:160px}
label{font-size:.75rem;color:rgba(245,230,200,.5);text-transform:uppercase;letter-spacing:.06em;font-weight:800}
input[type="text"],input[type="date"],input[type="number"],textarea{background:rgba(245,230,200,.05);border:1px solid rgba(232,160,32,.2);border-radius:10px;color:var(--dust);padding:.65rem .95rem;font-size:.95rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;width:100%}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-inner-spin-button{opacity:.5}
textarea{resize:vertical;min-height:70px}
input:focus,textarea:focus{border-color:var(--amber)}
input[type="date"]{color-scheme:dark}
.btn-add-stage{background:transparent;border:1px dashed rgba(232,160,32,.3);border-radius:10px;color:rgba(232,160,32,.55);padding:.5rem 1rem;font-size:.85rem;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;margin-bottom:1rem;transition:all .15s}
.btn-add-stage:hover{border-color:var(--amber);color:var(--amber)}
.form-actions{display:flex;gap:.8rem;justify-content:flex-end;flex-wrap:wrap}
.stages-title{font-size:.75rem;color:rgba(245,230,200,.5);text-transform:uppercase;letter-spacing:.06em;font-weight:800;margin-bottom:.7rem}
.stage-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:nowrap}

/* TIME */
.time-inp{width:66px!important;min-width:0!important;padding:.5rem .4rem!important;text-align:center;font-size:.85rem!important}
.time-col{display:flex;flex-direction:column;gap:1px;align-items:center;flex-shrink:0}
.time-lbl{font-size:.56rem;color:rgba(245,230,200,.3);text-transform:uppercase;letter-spacing:.04em;font-weight:800}
.time-real-lbl{font-size:.6rem;color:rgba(232,160,32,.6);font-weight:800}

/* DAY WARNINGS IN FORM */
.day-warnings{margin:.2rem 0 .8rem;display:flex;flex-direction:column;gap:.4rem}
.day-warn{background:rgba(192,57,43,.13);border:1px solid rgba(192,57,43,.38);border-radius:10px;padding:.5rem .85rem;font-size:.79rem;color:#ff8a80;display:flex;align-items:flex-start;gap:.45rem;line-height:1.45}
.day-conflict-tip{background:rgba(232,160,32,.08);border:1px solid rgba(232,160,32,.28);border-radius:9px;padding:.42rem .75rem;font-size:.74rem;color:rgba(232,160,32,.85);margin-top:.45rem;line-height:1.5;display:flex;flex-direction:column;gap:.18rem;width:100%}
.day-conflict-item{color:rgba(245,230,200,.6);font-size:.71rem;padding-left:.5rem;border-left:2px solid rgba(232,160,32,.3)}

/* PROJECTS */
.projects-grid{display:flex;flex-direction:column;gap:1.4rem}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:22px;overflow:hidden;backdrop-filter:blur(8px);transition:box-shadow .25s,border-color .25s;animation:fadeInUp .3s ease;position:relative}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.project-card:hover{box-shadow:0 10px 50px rgba(232,160,32,.12);border-color:rgba(232,160,32,.32)}
.project-card.collapsed .project-body{display:none}
.project-card.dragging{opacity:.4;border:2px dashed var(--amber)!important;transform:scale(.99)}
.project-card.drag-over{border:2px dashed rgba(232,160,32,.8)!important;box-shadow:0 0 0 3px rgba(232,160,32,.12)}

.drag-handle{cursor:grab;color:rgba(245,230,200,.2);font-size:1.1rem;padding:0 .15rem;flex-shrink:0;user-select:none;transition:color .15s;line-height:1;margin-top:.15rem}
.drag-handle:hover{color:rgba(245,230,200,.5)}
.drag-handle:active{cursor:grabbing}
.stage-drag-handle{cursor:grab;color:rgba(245,230,200,.15);font-size:.9rem;flex-shrink:0;user-select:none;transition:color .15s;padding:0 .05rem}
.stage-drag-handle:hover{color:rgba(245,230,200,.45)}
.stage-drag-handle:active{cursor:grabbing}

.project-header{padding:1.1rem 1.4rem 1.1rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.7rem;border-bottom:1px solid rgba(232,160,32,.08);transition:background .15s}
.project-header-click{flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;gap:.15rem}
.project-header-click:hover h2{color:var(--amber)}
.project-info h2{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--dust);font-weight:700;transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-meta{font-size:.77rem;color:rgba(245,230,200,.4);display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.project-meta-tag{background:rgba(245,230,200,.05);border:1px solid rgba(245,230,200,.1);border-radius:6px;padding:.1rem .5rem;font-size:.71rem;color:rgba(245,230,200,.5)}
.project-lion-zone{display:flex;align-items:center;gap:.35rem;flex-shrink:0}
.project-actions{display:flex;gap:.25rem}
.lion-badge{display:flex;flex-direction:column;align-items:center;padding:.4rem .7rem;border-radius:12px;font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;transition:all .3s}
.lion-badge .lion-emoji{font-size:1.45rem;line-height:1;margin-bottom:.1rem}
.lion-safe  {background:rgba(39,174,96,.15); color:#5dbb7e;border:1px solid rgba(93,187,126,.3)}
.lion-watch {background:rgba(230,126,34,.15);color:var(--amber);border:1px solid rgba(232,160,32,.3)}
.lion-close {background:rgba(211,84,0,.2);   color:#ff8c42;border:1px solid rgba(255,140,66,.35)}
.lion-danger{background:rgba(192,57,43,.25); color:#ff5555;border:1px solid rgba(255,85,85,.4);animation:pdanger 1.5s ease-in-out infinite}
.lion-done  {background:rgba(232,160,32,.12);color:var(--amber);border:1px solid var(--border)}
@keyframes pdanger{0%,100%{border-color:rgba(255,85,85,.4)}50%{border-color:rgba(255,85,85,.85)}}

.project-body{animation:fadeInUp .2s ease}
.project-body-inner{display:grid;grid-template-columns:1fr auto;align-items:start}
.stages-col{min-width:0}
.project-progress{padding:.85rem 1.4rem;border-bottom:1px solid rgba(232,160,32,.07)}
.progress-label{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(245,230,200,.4);margin-bottom:.4rem}
.progress-track{height:5px;background:rgba(245,230,200,.07);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--amber),var(--flame));transition:width .5s ease}
.project-notes{padding:.65rem 1.4rem;border-bottom:1px solid rgba(232,160,32,.07);font-size:.81rem;color:rgba(245,230,200,.5);line-height:1.55;font-style:italic}
.project-notes-label{font-style:normal;font-weight:800;color:rgba(245,230,200,.3);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}

/* CARD WARNINGS */
.card-warnings{padding:.5rem 1.4rem;border-bottom:1px solid rgba(192,57,43,.15)}
.card-warn-item{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.32);border-radius:9px;padding:.42rem .75rem;font-size:.75rem;color:#ff8a80;margin-bottom:.3rem;line-height:1.4;display:flex;align-items:flex-start;gap:.4rem}
.card-warn-item:last-child{margin-bottom:0}

/* STAGES */
.stages-list{padding:.55rem 1.4rem 1.1rem}
.stage-item{display:flex;align-items:center;gap:.7rem;padding:.52rem .5rem;border-bottom:1px solid rgba(245,230,200,.05);border-radius:10px;transition:background .12s;position:relative}
.stage-item:hover{background:rgba(245,230,200,.04)}
.stage-item:last-child{border-bottom:none}
.stage-item.overdue:not(.done) .stage-name{color:rgba(255,85,85,.85)}
.stage-item.stage-drag-over{border-top:2px solid rgba(232,160,32,.55)}
.stage-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(232,160,32,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer}
.stage-item.done .stage-check{background:var(--amber);border-color:var(--amber);animation:popCheck .2s ease}
@keyframes popCheck{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.stage-check-inner{font-size:.65rem;color:var(--savanna);font-weight:900}
.stage-content{flex:1;min-width:0}
.stage-name{font-size:.87rem;font-weight:600;color:var(--dust);transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-item.done .stage-name{color:rgba(245,230,200,.35);text-decoration:line-through}
.stage-meta{font-size:.68rem;color:rgba(245,230,200,.32);margin-top:.06rem;display:flex;gap:.45rem;flex-wrap:wrap;align-items:center}
.tbadge{font-size:.66rem;font-weight:800;padding:.1rem .4rem;border-radius:5px;white-space:nowrap}
.tbadge-est{background:rgba(232,160,32,.1);color:rgba(232,160,32,.75);border:1px solid rgba(232,160,32,.2)}
.tbadge-real{background:rgba(211,84,0,.15);color:#ff8c42;border:1px solid rgba(255,140,66,.22)}
.stage-countdown{font-size:.69rem;font-weight:800;padding:.18rem .5rem;border-radius:7px;white-space:nowrap;flex-shrink:0}
.countdown-safe   {background:rgba(39,174,96,.15); color:#5dbb7e}
.countdown-watch  {background:rgba(230,126,34,.15);color:var(--amber)}
.countdown-close  {background:rgba(211,84,0,.2);   color:#ff8c42}
.countdown-overdue{background:rgba(192,57,43,.2);  color:#ff5555}
.countdown-done   {background:rgba(245,230,200,.05);color:rgba(245,230,200,.3)}

/* PUZZLE */
.puzzle-panel{padding:.85rem .75rem .85rem 0;display:flex;flex-direction:column;align-items:center;gap:.45rem;min-width:205px;width:210px}
.puzzle-label{font-size:.66rem;color:rgba(245,230,200,.32);text-transform:uppercase;letter-spacing:.07em;font-weight:800;text-align:center}
.puzzle-count{font-size:.72rem;color:rgba(232,160,32,.7);font-weight:800;text-align:center}
.puzzle-done-msg{font-size:.78rem;color:var(--amber);font-weight:800;text-align:center;animation:glowp 1.5s ease-in-out infinite}
@keyframes glowp{0%,100%{text-shadow:0 0 6px rgba(232,160,32,.3)}50%{text-shadow:0 0 18px rgba(232,160,32,.9)}}
.puzzle-empty{font-size:.8rem;color:rgba(245,230,200,.22);text-align:center;padding:1rem .5rem;line-height:1.6;width:190px}
.piece-ov{transition:opacity .6s ease}
.puzzle-regen-btn{background:none;border:1px solid rgba(232,160,32,.25);border-radius:7px;color:rgba(232,160,32,.55);font-size:.65rem;padding:.22rem .6rem;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;margin-top:.15rem}
.puzzle-regen-btn:hover{background:rgba(232,160,32,.12);color:rgba(232,160,32,.95);border-color:rgba(232,160,32,.55)}
.puzzle-mystery{font-size:.62rem;color:rgba(232,160,32,.4);text-align:center;font-style:italic;margin-top:.18rem;animation:mystPulse 3s ease-in-out infinite}
@keyframes mystPulse{0%,100%{opacity:.3}50%{opacity:.8}}
.puzzle-btns{display:flex;flex-direction:column;gap:.28rem;align-items:center;margin-top:.12rem}
/* IMAGE BANK */
.bank-overlay{position:fixed;inset:0;background:rgba(8,5,2,.9);display:flex;align-items:flex-start;justify-content:center;z-index:150;padding:1.5rem;backdrop-filter:blur(6px);overflow-y:auto;animation:fadeOv .15s ease}
.bank-card{background:#140e04;border:1px solid var(--border-bright);border-radius:22px;padding:1.8rem;max-width:800px;width:100%;margin:auto;animation:popUp .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.75)}
.bank-card h2{font-family:'Playfair Display',serif;color:var(--amber);margin-bottom:.25rem;font-size:1.25rem}
.bank-subtitle{font-size:.78rem;color:rgba(245,230,200,.38);margin-bottom:1.3rem;line-height:1.55}
.bank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.8rem;margin-bottom:1.2rem}
.bank-thumb{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;transition:border-color .18s,transform .15s;aspect-ratio:1;background:#0c0802}
.bank-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.bank-thumb:hover{border-color:rgba(232,160,32,.55);transform:scale(1.04)}
.bank-thumb.selected{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,160,32,.28)}
.bank-thumb-del{position:absolute;top:5px;right:5px;background:rgba(10,5,0,.8);border:none;border-radius:50%;width:24px;height:24px;font-size:.72rem;cursor:pointer;color:rgba(245,230,200,.65);display:flex;align-items:center;justify-content:center;transition:background .15s}
.bank-thumb-del:hover{background:rgba(192,57,43,.85);color:#fff}
.bank-thumb-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.72));font-size:.62rem;padding:.4rem .35rem .25rem;color:rgba(245,230,200,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bank-thumb-check{position:absolute;top:5px;left:5px;background:var(--amber);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:#000;font-weight:900}
.bank-empty{text-align:center;padding:3rem 1rem;color:rgba(245,230,200,.25);font-size:.9rem;line-height:1.8}
.bank-upload-label{display:inline-flex;align-items:center;gap:.5rem;background:rgba(232,160,32,.1);border:1.5px dashed rgba(232,160,32,.38);border-radius:12px;padding:.65rem 1.3rem;font-size:.85rem;color:rgba(232,160,32,.8);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.bank-upload-label:hover{background:rgba(232,160,32,.2);border-color:rgba(232,160,32,.65);color:var(--amber)}
.bank-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(232,160,32,.1)}
.bank-pick-hint{font-size:.73rem;color:rgba(245,230,200,.32);font-style:italic;text-align:center;margin-top:.5rem}
.puzzle-tray{width:100%;margin-top:.55rem;padding-top:.5rem;border-top:1px solid rgba(232,160,32,.1)}
.puzzle-tray-label{font-size:.54rem;color:rgba(232,160,32,.45);text-transform:uppercase;letter-spacing:.07em;font-weight:800;text-align:center;margin-bottom:.4rem}
.puzzle-tray-pieces{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.puzzle-tray-piece{cursor:grab;border-radius:5px;overflow:hidden;border:1.5px solid rgba(232,160,32,.35);transition:transform .15s,box-shadow .15s,opacity .2s;flex-shrink:0;user-select:none;background:#0d0802}
.puzzle-tray-piece:hover{transform:scale(1.1);box-shadow:0 4px 18px rgba(232,160,32,.45);border-color:rgba(232,160,32,.75);z-index:10;position:relative}
.puzzle-tray-piece:active{cursor:grabbing}
.puzzle-tray-piece.is-dragging{opacity:.3;transform:scale(.95)}
.puzzle-tray-empty{font-size:.66rem;color:rgba(245,230,200,.2);text-align:center;padding:.5rem .3rem;line-height:1.6}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.puzzle-slot-wrong{animation:wrongShake .45s ease}

/* MINI CALENDAR */
.mini-cal{width:100%;margin-top:.65rem;background:rgba(245,230,200,.025);border:1px solid rgba(232,160,32,.11);border-radius:11px;padding:.5rem .5rem .5rem;box-sizing:border-box}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem;gap:.2rem}
.mini-cal-title{font-size:.65rem;font-weight:800;color:rgba(232,160,32,.65);letter-spacing:.04em;text-transform:uppercase;text-align:center;flex:1}
.mini-cal-nav{background:none;border:none;color:rgba(232,160,32,.4);cursor:pointer;font-size:1rem;padding:0 .18rem;line-height:1;transition:color .12s;flex-shrink:0}
.mini-cal-nav:hover{color:var(--amber)}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mini-cal-dow{font-size:.5rem;color:rgba(245,230,200,.2);text-align:center;padding-bottom:.2rem;font-weight:800;letter-spacing:.02em}
.mini-cal-cell{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:.14rem 0 .1rem;border-radius:4px;min-height:20px;cursor:default;transition:background .1s}
.mini-cal-cell:not(.empty):hover{background:rgba(245,230,200,.06)}
.mini-cal-cell.today{background:rgba(232,160,32,.1);outline:1px solid rgba(232,160,32,.3)}
.mini-cal-cell.final-date{background:rgba(212,90,26,.13);outline:1px solid rgba(212,90,26,.5)}
.mini-cal-cell.has-item{cursor:default}
.mini-cal-day{font-size:.58rem;color:rgba(245,230,200,.45);line-height:1.25;font-weight:600}
.mini-cal-cell.today .mini-cal-day{color:var(--amber);font-weight:900}
.mini-cal-cell.final-date .mini-cal-day{color:#ff8c42;font-weight:900}
.mini-cal-cell.has-item .mini-cal-day{color:rgba(245,230,200,.7)}
.mini-cal-dots{display:flex;gap:1.5px;justify-content:center;margin-top:1.5px;flex-wrap:wrap;max-width:18px}
.mini-cal-dot{width:4.5px;height:4.5px;border-radius:50%;flex-shrink:0}
.dot-plan{background:rgba(232,160,32,.9)}
.dot-done{background:rgba(93,187,126,.95)}
.dot-over{background:rgba(255,85,85,.9)}
.dot-dead{background:rgba(212,90,26,.75)}
.mini-cal-legend{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.45rem;padding-top:.4rem;border-top:1px solid rgba(245,230,200,.05);justify-content:center}
.mini-cal-leg-item{display:flex;align-items:center;gap:.28rem;font-size:.5rem;color:rgba(245,230,200,.3);letter-spacing:.02em}
.mini-cal-leg-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ARCHIVE MODAL */
.arch-modal{position:fixed;inset:0;background:rgba(8,5,2,.88);display:flex;align-items:flex-start;justify-content:center;z-index:150;padding:1.5rem;backdrop-filter:blur(5px);overflow-y:auto;animation:fadeOv .15s ease}
.arch-card{background:#140e04;border:1px solid var(--border-bright);border-radius:22px;padding:1.8rem;max-width:700px;width:100%;margin:auto;animation:popUp .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.75)}
.arch-card h2{font-family:'Playfair Display',serif;color:var(--amber);margin-bottom:.3rem;font-size:1.2rem}
.arch-subtitle{font-size:.78rem;color:rgba(245,230,200,.35);margin-bottom:1.2rem;line-height:1.5}
.arch-list{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.2rem;max-height:55vh;overflow-y:auto}
.arch-item{background:rgba(245,230,200,.04);border:1px solid rgba(232,160,32,.15);border-radius:14px;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.arch-item-info{flex:1;min-width:0}
.arch-item-name{font-weight:700;font-size:.92rem;color:var(--dust);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arch-item-meta{font-size:.72rem;color:rgba(245,230,200,.35);margin-top:.18rem;display:flex;gap:.5rem;flex-wrap:wrap}
.arch-item-actions{display:flex;gap:.4rem;flex-shrink:0}
.arch-empty{text-align:center;padding:2.5rem 1rem;color:rgba(245,230,200,.25);font-size:.9rem;line-height:1.7}
.arch-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;padding-top:1rem;border-top:1px solid rgba(232,160,32,.1)}
/* BACKUP */
.backup-bar{background:rgba(232,160,32,.05);border:1px solid rgba(232,160,32,.14);border-radius:12px;padding:.6rem 1rem;font-size:.78rem;color:rgba(245,230,200,.5);display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:1.3rem}
.backup-bar strong{color:rgba(232,160,32,.8)}
/* MODALS */
.empty-state{text-align:center;padding:4rem 1.5rem;color:rgba(245,230,200,.3)}
.empty-state .e-lion{font-size:4rem;margin-bottom:1rem;opacity:.4;animation:breathe 4s ease-in-out infinite}
.empty-state p{font-size:.95rem;line-height:1.7;margin-bottom:1.5rem}
.overlay{position:fixed;inset:0;background:rgba(8,5,2,.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:1.5rem;backdrop-filter:blur(4px);animation:fadeOv .15s ease}
@keyframes fadeOv{from{opacity:0}to{opacity:1}}
.overlay-card{background:#1a1005;border:1px solid var(--border-bright);border-radius:22px;padding:2.2rem;max-width:380px;width:100%;text-align:center;animation:popUp .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.6)}
@keyframes popUp{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.overlay-card h3{font-family:'Playfair Display',serif;color:var(--amber);margin-bottom:.8rem;font-size:1.2rem}
.overlay-card p{font-size:.9rem;color:rgba(245,230,200,.65);margin-bottom:1.6rem;line-height:1.55}
.overlay-actions{display:flex;gap:.8rem;justify-content:center}
.edit-overlay{position:fixed;inset:0;background:rgba(8,5,2,.82);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:1.5rem;backdrop-filter:blur(4px);overflow-y:auto;animation:fadeOv .15s ease}
.edit-overlay-card{background:#1a1005;border:1px solid var(--border-bright);border-radius:22px;padding:1.8rem;max-width:920px;width:100%;margin:auto;animation:popUp .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.form-stages-puzzle{display:grid;grid-template-columns:1fr 210px;gap:1.2rem;align-items:start}
.form-puzzle-col{position:sticky;top:1.5rem;display:flex;flex-direction:column;align-items:center;gap:.6rem}
.confetti-piece{position:fixed;width:9px;height:9px;border-radius:2px;animation:cfetti 1.6s ease-out forwards;pointer-events:none;z-index:300}
@keyframes cfetti{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}80%{opacity:1}100%{transform:translateY(95vh) rotate(800deg) scale(.5);opacity:0}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(232,160,32,.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(232,160,32,.4)}
@media(max-width:720px){
  .form-stages-puzzle{grid-template-columns:1fr}
  .form-puzzle-col{position:static;flex-direction:row;flex-wrap:wrap;justify-content:center;border-top:1px solid var(--border);padding-top:1rem;margin-top:.5rem}
  .project-body-inner{grid-template-columns:1fr}
  .puzzle-panel{padding:.7rem 1rem;min-width:0;flex-direction:row;justify-content:center;flex-wrap:wrap}
}
@media(max-width:540px){.theory-cards{grid-template-columns:1fr}.form-row{flex-direction:column}.project-lion-zone{flex-wrap:wrap}.lion-badge{font-size:.6rem}.stage-row{flex-wrap:wrap}}

/* ── STRUCTURED MILESTONES FORM ── */
.ms-block{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1rem}
.ms-card{border-radius:14px;overflow:hidden;transition:box-shadow .2s}
.ms-card.type-deadline{border:1px solid rgba(232,160,32,.45);background:rgba(232,160,32,.07)}
.ms-card.type-two_days{border:1px solid rgba(212,90,26,.4);background:rgba(212,90,26,.06)}
.ms-card.type-one_week{border:1px solid rgba(211,84,0,.35);background:rgba(211,84,0,.05)}
.ms-card.type-midpoint{border:1px solid rgba(93,187,126,.35);background:rgba(39,174,96,.06)}
.ms-card.type-custom{border:1px solid rgba(245,230,200,.12);background:rgba(245,230,200,.03)}
.ms-header{padding:.5rem .7rem .35rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.ms-drag-handle{cursor:grab;color:rgba(245,230,200,.2);font-size:1rem;flex-shrink:0;user-select:none;transition:color .15s;line-height:1}
.ms-drag-handle:hover{color:rgba(245,230,200,.6)}
.ms-drag-handle:active{cursor:grabbing}
.ms-badge{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:.18rem .55rem;border-radius:6px;flex-shrink:0}
.ms-badge.type-deadline{background:rgba(232,160,32,.18);color:var(--amber)}
.ms-badge.type-two_days{background:rgba(212,90,26,.2);color:#ff8c42}
.ms-badge.type-one_week{background:rgba(211,84,0,.18);color:#ff9955}
.ms-badge.type-midpoint{background:rgba(39,174,96,.18);color:#5dbb7e}
.ms-badge.type-custom{background:rgba(245,230,200,.08);color:rgba(245,230,200,.55)}
.ms-question{font-size:.73rem;color:rgba(245,230,200,.5);font-style:italic;line-height:1.35;flex:1;min-width:120px}
.ms-auto-date{font-size:.7rem;font-weight:700;padding:.18rem .5rem;border-radius:7px;background:rgba(245,230,200,.06);border:1px solid rgba(245,230,200,.12);color:rgba(245,230,200,.45);white-space:nowrap;flex-shrink:0}
.ms-auto-date.computed{color:var(--amber);background:rgba(232,160,32,.08);border-color:rgba(232,160,32,.2)}
.ms-body{padding:.35rem .7rem .6rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-start}
.ms-goal-inp{flex:1;min-width:140px;font-size:.88rem!important;padding:.52rem .7rem!important;font-weight:600}
.ms-date-inp{width:136px!important;font-size:.82rem!important;padding:.48rem .55rem!important;flex-shrink:0}
.ms-add-sub-btn{display:none} /* removed */
.ms-del-btn{background:none;border:none;color:rgba(245,230,200,.2);font-size:.8rem;cursor:pointer;padding:.1rem .3rem;border-radius:5px;transition:all .12s;flex-shrink:0}
.ms-del-btn:hover{color:#ff5555;background:rgba(192,57,43,.15)}
.ms-section-title{font-size:.72rem;color:rgba(245,230,200,.38);text-transform:uppercase;letter-spacing:.07em;font-weight:800;margin:.35rem 0 .4rem;display:flex;align-items:center;gap:.5rem}
.ms-section-title::after{content:'';flex:1;height:1px;background:rgba(245,230,200,.07)}
/* card display — milestone type badge */
.stage-type-badge{font-size:.6rem;font-weight:800;padding:.1rem .38rem;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;white-space:nowrap}
.stb-deadline{background:rgba(232,160,32,.15);color:var(--amber);border:1px solid rgba(232,160,32,.25)}
.stb-two_days{background:rgba(212,90,26,.15);color:#ff8c42;border:1px solid rgba(255,140,66,.2)}
.stb-one_week{background:rgba(211,84,0,.12);color:#ff9955;border:1px solid rgba(255,153,85,.18)}
.stb-midpoint{background:rgba(39,174,96,.12);color:#5dbb7e;border:1px solid rgba(93,187,126,.2)}



/* DAY LOAD MODAL */
.dl-overlay{position:fixed;inset:0;background:rgba(8,5,2,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:1.5rem;backdrop-filter:blur(5px);animation:fadeOv .15s ease}
.dl-card{background:#1a1005;border:1px solid var(--border-bright);border-radius:22px;padding:1.6rem 1.8rem;max-width:520px;width:100%;animation:popUp .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.75);max-height:85vh;overflow-y:auto}
.dl-card h3{font-family:'Playfair Display',serif;color:var(--amber);margin-bottom:.3rem;font-size:1.15rem}
.dl-subtitle{font-size:.78rem;color:rgba(245,230,200,.35);margin-bottom:1.2rem;line-height:1.5}
.dl-rows{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.3rem}
.dl-row{border-radius:12px;overflow:hidden;border:1px solid rgba(245,230,200,.07)}
.dl-row-head{display:flex;align-items:center;justify-content:space-between;padding:.55rem .85rem;gap:.5rem}
.dl-row-head-free{background:rgba(39,174,96,.08);border-bottom:1px solid rgba(93,187,126,.1)}
.dl-row-head-part{background:rgba(232,160,32,.08);border-bottom:1px solid rgba(232,160,32,.12)}
.dl-row-head-full{background:rgba(192,57,43,.1);border-bottom:1px solid rgba(192,57,43,.2)}
.dl-row-date{font-size:.82rem;font-weight:800;color:var(--dust)}
.dl-row-type{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;opacity:.55;flex:1;padding-left:.4rem}
.dl-row-badge{font-size:.72rem;font-weight:800;padding:.18rem .55rem;border-radius:7px;white-space:nowrap}
.dl-badge-free{background:rgba(93,187,126,.15);color:#5dbb7e}
.dl-badge-part{background:rgba(232,160,32,.13);color:var(--amber)}
.dl-badge-full{background:rgba(192,57,43,.18);color:#ff5555}
.dl-row-body{padding:.5rem .85rem .65rem;background:rgba(0,0,0,.15)}
.dl-task{font-size:.76rem;color:rgba(245,230,200,.55);padding:.18rem 0;display:flex;align-items:center;gap:.4rem;border-bottom:1px solid rgba(245,230,200,.04)}

.dl-bar-wrap{margin-top:.5rem;background:rgba(245,230,200,.06);border-radius:4px;height:7px;overflow:hidden}
.dl-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.dl-bar-free{background:linear-gradient(90deg,#5dbb7e,#27ae60)}
.dl-bar-part{background:linear-gradient(90deg,var(--amber),var(--flame))}
.dl-bar-full{background:linear-gradient(90deg,#ff5555,#c0392b)}
.dl-bar-label{font-size:.68rem;margin-top:.3rem;color:rgba(245,230,200,.38)}
.dl-empty-date{font-size:.76rem;color:rgba(93,187,126,.6);padding:.3rem 0;font-style:italic}
.dl-footer{display:flex;justify-content:flex-end;gap:.7rem;padding-top:.8rem;border-top:1px solid rgba(232,160,32,.1)}
/* CONFLICT SUMMARY */
.conflict-summary{background:rgba(232,160,32,.07);border:1px solid rgba(232,160,32,.3);border-radius:14px;padding:.85rem 1.1rem;margin-bottom:1rem}
.conflict-summary-title{font-size:.72rem;font-weight:800;color:rgba(232,160,32,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.55rem;display:flex;align-items:center;gap:.4rem}
.conflict-summary-row{display:flex;flex-direction:column;gap:.18rem;margin-bottom:.45rem;padding:.45rem .65rem;background:rgba(0,0,0,.18);border-radius:9px;border-left:3px solid rgba(232,160,32,.35)}

.conflict-summary-date{font-size:.8rem;font-weight:800;color:var(--amber);margin-bottom:.12rem}
.conflict-summary-item{font-size:.74rem;color:rgba(245,230,200,.55);padding-left:.3rem}
.conflict-summary-total{font-size:.76rem;font-weight:800;margin-top:.2rem;padding:.18rem .4rem;border-radius:5px;display:inline-block}
.cst-ok{color:#5dbb7e;background:rgba(93,187,126,.1)}
.cst-warn{color:var(--amber);background:rgba(232,160,32,.1)}
.cst-over{color:#ff5555;background:rgba(192,57,43,.15)}
/* PRACTICE CARD */
.practice-card{background:linear-gradient(135deg,rgba(93,187,126,.06) 0%,rgba(39,174,96,.04) 100%);border:1px solid rgba(93,187,126,.22);border-radius:18px;padding:1rem 1.3rem;margin-bottom:1.3rem;position:relative;overflow:hidden;transition:border-color .2s}
.practice-card:hover{border-color:rgba(93,187,126,.38)}
.practice-card-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.practice-card-label{font-size:.62rem;font-weight:800;color:rgba(93,187,126,.55);text-transform:uppercase;letter-spacing:.1em}
.practice-card-toggle{background:none;border:1px solid rgba(93,187,126,.22);border-radius:7px;color:rgba(93,187,126,.55);cursor:pointer;font-size:.75rem;padding:.18rem .55rem;font-family:'Nunito',sans-serif;margin-left:auto;transition:all .15s;line-height:1.4}
.practice-card-toggle:hover{background:rgba(93,187,126,.1);color:#5dbb7e;border-color:rgba(93,187,126,.4)}
.practice-card-head{display:flex;align-items:flex-start;gap:.85rem;cursor:pointer}
.practice-card-emoji{font-size:1.6rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 10px rgba(93,187,126,.25))}
.practice-card-title{font-size:.92rem;font-weight:800;color:#5dbb7e;line-height:1.3}
.practice-card-sub{font-size:.77rem;color:rgba(245,230,200,.45);margin-top:.15rem;line-height:1.4}
.practice-card-triggers{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.55rem}
.practice-trigger{font-size:.68rem;background:rgba(93,187,126,.08);border:1px solid rgba(93,187,126,.18);border-radius:6px;padding:.15rem .5rem;color:rgba(93,187,126,.7)}

function togglAuth(token){return 'Basic '+btoa(token+':api_token');}

async function togglProxy(token, endpoint){
  const url='/api/toggl?endpoint='+encodeURIComponent(endpoint);
  const r=await fetch(url,{headers:{'x-toggl-token':token.trim()}});
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error('Toggl '+r.status+(data.error?': '+data.error:''));
  return data;
}

async function togglFetchMe(token){
  return togglProxy(token,'me');
}

async function togglFetchProjects(token, workspaceId){
  return togglProxy(token,'workspaces/'+workspaceId+'/projects?per_page=200');
}

async function togglFetchEntries(token, startIso, endIso){
  const ep='me/time_entries?start_date='+encodeURIComponent(startIso)+'&end_date='+encodeURIComponent(endIso);
  return togglProxy(token,ep);
}

function fmtTogglH(h){
  if(!h||h<=0)return'0';
  const hh=Math.floor(h);const mm=Math.round((h-hh)*60);
  if(mm===0)return hh+'г';return hh+'г '+mm+'хв';
}
function fmtInputPreview(val){
  const h=parseFloat(val);
  if(!val||isNaN(h)||h<=0)return null;
  return fmtTogglH(h);
}

function matchTogglProject(projName, togglProjects){
  const n=projName.trim().toLowerCase();
  return togglProjects.find(p=>p.name.trim().toLowerCase()===n)||null;
}

function stageKeywords(stageName){
  return (stageName||'').trim().toLowerCase().split(/\s+/).filter(w=>w.length>2);
}

function entryMatchesStage(entry, stageName, togglProjectId){
  if(entry.project_id!==togglProjectId)return false;
  if(entry.duration<=0)return false;
  const words=stageKeywords(stageName);
  if(!words.length)return false;
  const desc=(entry.description||'').toLowerCase();
  return words.some(w=>desc.includes(w));
}

async function runTogglSync(projects, token){
  const me=await togglFetchMe(token);
  const workspaceId=me.default_workspace_id;
  const tProjects=await togglFetchProjects(token, workspaceId);
  const allDates=projects.flatMap(p=>[p.startDate,p.finalDate]).filter(Boolean).sort();
  const minDate=allDates.length?allDates[0]:new Date(Date.now()-180*86400000).toISOString().slice(0,10);
  const maxDate=new Date(Date.now()+60*86400000).toISOString().slice(0,10);
  const entries=await togglFetchEntries(token, minDate+'T00:00:00+00:00', maxDate+'T23:59:59+00:00');

  const result={syncedAt:new Date().toISOString(),projects:{}};
  for(const p of projects){
    const tp=matchTogglProject(p.name,tProjects);
    if(!tp)continue;
    const pEntries=entries.filter(e=>e.project_id===tp.id&&e.duration>0);
    const totalSec=pEntries.reduce((s,e)=>s+e.duration,0);
    const stages={};
    for(const s of p.stages){
      if(!s.name||!s.name.trim())continue;
      const sec=pEntries.reduce((s2,e)=>s2+(entryMatchesStage(e,s.name,tp.id)?e.duration:0),0);
      if(sec>0)stages[s.id]=Math.round(sec/36)/100;
    }
    result.projects[p.id]={togglProjectId:tp.id,togglName:tp.name,totalH:Math.round(totalSec/36)/100,stages};
  }
  return result;
}

// ─── IndexedDB for images (localStorage is too small for photos) ───
const IDB_NAME='znaydi_leva_idb', IDB_VER=1, IDB_STORE='bank_images';
function openIDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,IDB_VER);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE,{keyPath:'id'});
    };
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
async function idbGetAll(){
  try{const db=await openIDB();return new Promise((res)=>{const tx=db.transaction(IDB_STORE,'readonly');const req=tx.objectStore(IDB_STORE).getAll();req.onsuccess=()=>res(req.result||[]);req.onerror=()=>res([]);});}catch{return[];}
}
async function idbPut(img){
  try{const db=await openIDB();return new Promise((res)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(img);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}catch{return false;}
}
async function idbDelete(id){
  try{const db=await openIDB();return new Promise((res)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(id);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}catch{return false;}
}
async function idbClear(){
  try{const db=await openIDB();return new Promise((res)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).clear();tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}catch{return false;}
}
// Proper UUID v4 (no crypto.randomUUID needed)
function uuidv4(){
  return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

// ─── BACKUP: export all data to JSON file ─────────────────────
async function exportBackup(projects, archive, miniProjs, miniArch){
  const images = await idbGetAll();
  const payload = { version:2, exportedAt:new Date().toISOString(), projects, archive, images, miniProjects:miniProjs||[], miniArchive:miniArch||[] };
  const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href=url; a.download=`znaydi-leva-backup-${date}.json`; a.click();
  URL.revokeObjectURL(url);
}

async function importBackup(file, onDone){
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    if(!payload.projects) throw new Error('Невірний формат файлу');
    // restore projects
    save(payload.projects||[]);
    saveArchive(payload.archive||[]);
    // restore mini projects
    saveMini(payload.miniProjects||[]);
    saveMiniArchive(payload.miniArchive||[]);
    // restore images to IndexedDB
    await idbClear();
    for(const img of (payload.images||[])) await idbPut(img);
    onDone(true);
  } catch(e){
    alert('Помилка відновлення: '+e.message);
    onDone(false);
  }
}

function csvEsc(v){return'"'+String(v).replace(/"/g,'""')+'"';}
function toTodoistLabel(name){
  return name.trim()
    .replace(/\s+/g,'_')
    .replace(/[^\wа-яА-ЯіїєґІЇЄҐa-zA-Z0-9_\-]/g,'')
    .slice(0,50)||'проект';
}
function exportProjectCSV(project, leaves, priority, labelName){
  const sectionName=project.name.trim();
  // For @mention in CSV: spaces → underscores (Todoist stops at first space)
  const tag='@'+labelName.replace(/\s+/g,'_');
  const today=new Date().toISOString().slice(0,10);
  const header='TYPE,CONTENT,DESCRIPTION,PRIORITY,INDENT,AUTHOR,RESPONSIBLE,DATE,DATE_LANG,TIMEZONE';
  const sectionRow=`section,${csvEsc(sectionName)},,,,,,,,`;
  const rows=leaves
    .filter(l=>!l.done)
    .map(l=>{
      const name=(l.name||'').trim()||(l.type&&MS_TYPES[l.type]?.label)||'(без назви)';
      const content=csvEsc(`${name} ${tag}`);
      return`task,${content},,${priority},1,,,${l.date||''},,`;
    });
  if(!rows.length){alert('Немає активних вех для експорту — всі виконані або без назви.');return;}
  const csv=[header,sectionRow,...rows].join('\r\n');
  const fn=`${sectionName.replace(/[^\wа-яА-ЯіїєґІЇЄҐ\s]/g,'').trim()}_${today}.csv`;
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fn;a.click();
  URL.revokeObjectURL(url);
}

// ─── helpers ────────────────────────────────────────────────
function daysUntil(ds){
  if(!ds)return null;
  const t=new Date();t.setHours(0,0,0,0);
  const u=new Date(ds);u.setHours(0,0,0,0);
  return Math.round((u-t)/86400000);
}
function lionLevel(d){
  if(d===null)return'safe';
  if(d<0||d<=2)return'danger';if(d<=5)return'close';if(d<=10)return'watch';return'safe';
}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('uk-UA',{day:'numeric',month:'short'});}
function cdLabel(days,done){
  if(done)return{text:'Готово ✓',cls:'countdown-done'};
  if(days===null)return{text:'—',cls:'countdown-done'};
  if(days<0)return{text:`${Math.abs(days)}д просроч.`,cls:'countdown-overdue'};
  if(days===0)return{text:'СЬОГОДНІ 🔥',cls:'countdown-overdue'};
  if(days===1)return{text:'Завтра 😤',cls:'countdown-close'};
  if(days<=5)return{text:`${days}д`,cls:'countdown-close'};
  if(days<=10)return{text:`${days}д`,cls:'countdown-watch'};
  return{text:`${days}д`,cls:'countdown-safe'};
}
function fmtH(h){
  if(h==null||isNaN(h)||h===0)return null;
  const hh=Math.floor(h),mm=Math.round((h-hh)*60);
  if(mm===0)return`${hh}г`;return`${hh}г ${mm}м`;
}
function realH(est){const e=parseFloat(est);return isNaN(e)||e<=0?null:e*2;}

function getLeaves(stages){return stages;}
function projLevel(stages){
  if(!stages.length)return'safe';
  const lv=getLeaves(stages);
  if(lv.every(l=>l.done))return'done';
  const days=lv.filter(l=>!l.done&&l.date).map(l=>daysUntil(l.date)).filter(d=>d!==null);
  if(!days.length)return'safe';
  return lionLevel(Math.min(...days));
}
function projProgress(stages){const l=getLeaves(stages);if(!l.length)return 0;return Math.round(l.filter(x=>x.done).length/l.length*100);}
function projUrgency(p){return({danger:0,close:1,watch:2,safe:3,done:4}[projLevel(p.stages)]??5)*10000+(daysUntil(p.finalDate)??9999);}

// Day-load: group real hours (est*2) per date, warn if >5h
// finalDate is NEVER affected
const DAY_LIMIT=5;
function dayWarnings(stages, finalDate){
  const map={};
  for(const s of stages){
    if(!s.date||s.done)continue;
    if(s.date===finalDate)continue;
    const rh=realH(s.estHours);
    if(!rh)continue;
    map[s.date]=(map[s.date]||0)+rh;
  }
  return Object.entries(map)
    .filter(([,h])=>h>DAY_LIMIT)
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([date,total])=>({date,total}));
}

function spawnConfetti(){
  const cols=['#e8a020','#d45a1a','#7fc47a','#f5e6c8','#ff8c42','#ffd700'];
  for(let i=0;i<45;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    const sz=6+Math.random()*9;
    el.style.cssText=`left:${10+Math.random()*80}vw;top:0;background:${cols[~~(Math.random()*cols.length)]};animation-delay:${Math.random()*.7}s;animation-duration:${1.2+Math.random()*.9}s;width:${sz}px;height:${sz}px`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2600);
  }
}

// 4 fixed types + free custom
const MS_TYPES = {
  deadline:  { label:'Дедлайн 🔒',    icon:'📅', q:'Коли дедлайн? Що здаєш клієнту?',                            noTime:true,  color:'type-deadline' },
  two_days:  { label:'−2 дні',         icon:'😤', q:'Що готово за 2 дні до дедлайну?\nЦіль — процесна!',        noTime:false, color:'type-two_days' },
  one_week:  { label:'−1 тиждень',     icon:'👁', q:'Що готово за тиждень до дедлайну?\nЦіль — процесна!',      noTime:false, color:'type-one_week' },
  midpoint:  { label:'Точка неповернення', icon:'🛡️', q:'Що готово до середини строку?\nЦіль — процесна!',     noTime:false, color:'type-midpoint' },
  custom:    { label:'Своя веха',      icon:'🏁', q:'',                                                           noTime:false, color:'type-custom'  },
};

// Auto-compute date from finalDate for structured types
function msAutoDate(type, finalDate, createdAt) {
  if (!finalDate) return '';
  const fd = new Date(finalDate + 'T00:00:00');
  const startD = createdAt ? new Date(createdAt.slice(0,10)+'T00:00:00') : new Date();
  const clamp = (iso) => {
    // never go before startDate, never go after finalDate
    if (!iso) return iso;
    if (iso < createdAt.slice(0,10)) return createdAt.slice(0,10);
    if (iso > finalDate) return finalDate;
    return iso;
  };
  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r.toISOString().slice(0,10); };
  if (type === 'deadline') return finalDate;
  if (type === 'two_days') return clamp(addDays(fd, -2));
  if (type === 'one_week') return clamp(addDays(fd, -7));
  if (type === 'midpoint') {
    const mid = new Date((startD.getTime() + fd.getTime()) / 2);
    return clamp(mid.toISOString().slice(0,10));
  }
  return '';
}

function isStructured(type) { return type && type !== 'custom'; }

// ─── DAY LOAD: find all planned (not done) stages on a date from other projects ───
function getDayLoad(date, allProjects, excludeId) {
  if (!date || !allProjects) return [];
  const items = [];
  for (const proj of allProjects) {
    if (proj.id === excludeId) continue;
    for (const s of (proj.stages || [])) {
      if (s.done) continue;
      const d = isStructured(s.type)
        ? (s.dateOverride || msAutoDate(s.type, proj.finalDate, proj.startDate||proj.createdAt) || s.date)
        : s.date;
      if (d === date && s.name && s.name.trim()) {
        items.push({ projectName: proj.name, stageName: s.name.trim(), hours: s.estHours || null });
      }
    }
  }
  return items;
}

// Build default stage list for new project
function makeDefaultStages() {
  const base = Date.now();
  return [
    { id:base+1, type:'deadline',  name:'', date:'', estHours:'', done:false },
    { id:base+2, type:'two_days',  name:'', date:'', estHours:'', done:false },
    { id:base+3, type:'one_week',  name:'', date:'', estHours:'', done:false },
    { id:base+4, type:'midpoint',  name:'', date:'', estHours:'', done:false },
  ];
}

// Migrate old stages without type field
function migrateStages(stages) {
  return stages.map(s => ({ type:'custom', ...s }));
}

  const autoDate = structured ? msAutoDate(s.type, finalDate, createdAt) : null;

}




function DayLoadModal({finalDate, createdAt, allProjects, currentProjectId, onClose}){
  const CAP = 5;
  const dates = React.useMemo(()=>{
    if(!finalDate) return [];
    const types = ['midpoint','one_week','two_days','deadline'];
    const result = [];
    for(const t of types){
      const d = msAutoDate(t, finalDate, createdAt);
      if(d) result.push({date:d, label:MS_TYPES[t].label, icon:MS_TYPES[t].icon});
    }
    // deduplicate
    const seen=new Set();
    return result.filter(r=>{ if(seen.has(r.date)) return false; seen.add(r.date); return true; })
      .sort((a,b)=>a.date.localeCompare(b.date));
  },[finalDate, createdAt]);

  // For each date: sum hours from all other projects
  function getLoad(date){
    const items = getDayLoad(date, allProjects, currentProjectId);
    const bookedH = items.reduce((s,c)=>s+(c.hours?parseFloat(c.hours):0),0);
    const freeH = Math.max(0, CAP - bookedH);
    const pct = Math.min(100, (bookedH/CAP)*100);
    const status = bookedH===0?'free':bookedH>=CAP?'full':'part';
    return {items, bookedH, freeH, pct, status};
  }

  return(

function ConflictSummaryBlock({stages, finalDate, createdAt, allProjects, currentProjectId}){
  const rows = React.useMemo(()=>{
    // collect all effective dates + hours from current form stages
    const byDate={};
    for(const s of stages){
      if(s.done) continue;
      const d = isStructured(s.type)
        ? (msAutoDate(s.type, finalDate, createdAt) || s.date)
        : s.date;
      if(!d) continue;
      const myH = s.estHours ? parseFloat(s.estHours) : 0;
      const conflicts = getDayLoad(d, allProjects, currentProjectId);
      if(!conflicts.length) continue;
      if(!byDate[d]) byDate[d]={myH:0, conflicts:[], stageName: s.name||(MS_TYPES[s.type]?.label)||''};
      byDate[d].myH += myH;
      // merge conflicts (avoid duplicate project+stage)
      for(const c of conflicts){
        const key = c.projectName+'|'+c.stageName;
        if(!byDate[d].conflicts.find(x=>x.projectName+'|'+x.stageName===key))
          byDate[d].conflicts.push(c);
      }
    }
    return Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b));
  },[stages, finalDate, createdAt, allProjects, currentProjectId]);

  if(!rows.length) return null;

  return(
    <div className="conflict-summary">
      <div className="conflict-summary-title">⚠️ Накладення дат — {rows.length} {rows.length===1?'день':'дні'}</div>
      {rows.map(([date, info])=>{
        const othersH = info.conflicts.reduce((s,c)=>s+(c.hours?parseFloat(c.hours):0),0);
        const totalH = info.myH + othersH;
        const cls = totalH===0?'cst-ok':totalH<=5?'cst-warn':'cst-over';
        return(
          <div key={date} className="conflict-summary-row">
            <div className="conflict-summary-date">📅 {fmtDate(date)}</div>
            {info.conflicts.map((c,i)=>(
              <div key={i} className="conflict-summary-item">
                📁 {c.projectName} · {c.stageName}{c.hours?` · ${c.hours}г`:''}
              </div>
            ))}
            {(info.myH>0||othersH>0)&&(
              <span className={`conflict-summary-total ${cls}`}>
                Разом у цей день: ~{totalH.toFixed(1).replace('.0','')}г
                {totalH>5?' — забагато для одного дня ⚠️':totalH>0?' — ок':''}
              </span>
            )}
          </div>
        );
      })}
    </div>
  );
}

  function sDragOver(e,id){
    e.preventDefault(); e.stopPropagation();
    if(dragSrcRef.current===id)return;
    setStages(p=>{
      const fr=p.findIndex(s=>s.id===dragSrcRef.current),to=p.findIndex(s=>s.id===id);
      if(fr<0||to<0||fr===to)return p;
      const n=[...p];n.splice(to,0,n.splice(fr,1)[0]);return n;

  function sDragEnd(){ dragSrcRef.current=null; }

      if (isStructured(s.type)) {

      }
      return {
        ...s,
        estHours: s.estHours!==''&&s.estHours!=null ? parseFloat(s.estHours) : null,
      };
    });
    const filtered = synced.filter(s=>s.name.trim()||isStructured(s.type));
    // Sort by date ascending; stages without date go to the end
    const sorted = [...filtered].sort((a,b)=>{
      if(!a.date&&!b.date)return 0;

function computeGrid(n){
  if(n<=1)return{cols:1,rows:1};if(n<=2)return{cols:2,rows:1};if(n<=4)return{cols:2,rows:2};
  if(n<=6)return{cols:3,rows:2};if(n<=9)return{cols:3,rows:3};if(n<=12)return{cols:4,rows:3};
  if(n<=16)return{cols:4,rows:4};const c=Math.ceil(Math.sqrt(n*1.3));return{cols:c,rows:Math.ceil(n/c)};
}

// ── Seeded RNG ──
function mkRng(seed){
  let s=(seed^0xdeadbeef)>>>0;
  return()=>{s=Math.imul(s^(s>>>17),0x45d9f3b);s=Math.imul(s^(s>>>13),0xac4d3d0b);s=(s^(s>>>16))>>>0;return s/0xffffffff;};
}
// ── Fisher-Yates shuffle with seeded RNG ──
function generateShuffleMap(n, seed){
  const rng=mkRng(seed^0xc0ffee);
  const arr=Array.from({length:n},(_,i)=>i);
  for(let i=n-1;i>0;i--){
    const j=Math.floor(rng()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function hashStr(str){let h=0x811c9dc5;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193);}return h>>>0;}
