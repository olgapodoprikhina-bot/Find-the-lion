// ── Wimmelbilderbuch scene elements ──
function sceneEl(rng,c,x,y,w,h){
  const el=Math.floor(rng()*10);
  const f=(n)=>n.toFixed(1);
  const px=x+w*.1+rng()*w*.8, py=y+h*.1+rng()*h*.8;
  const s=Math.min(w,h)*(0.06+rng()*0.1);
  if(el===0){ // house
    return `<rect x="${f(px-s)}" y="${f(py-s*.6)}" width="${f(s*2)}" height="${f(s*1.2)}" fill="${c}" rx="1"/><polygon points="${f(px-s*.8)},${f(py-s*.6)} ${f(px)},${f(py-s*1.5)} ${f(px+s*.8)},${f(py-s*.6)}" fill="${c}" opacity=".85"/><rect x="${f(px-s*.25)}" y="${f(py)}" width="${f(s*.5)}" height="${f(s*.6)}" fill="rgba(0,0,0,.25)" rx="1"/>`;
  }else if(el===1){ // tree
    return `<rect x="${f(px-s*.18)}" y="${f(py-s*.3)}" width="${f(s*.36)}" height="${f(s*.9)}" fill="#795548"/><circle cx="${f(px)}" cy="${f(py-s*.6)}" r="${f(s*.65)}" fill="${c}"/><circle cx="${f(px-s*.35)}" cy="${f(py-s*.3)}" r="${f(s*.4)}" fill="${c}" opacity=".8"/>`;
  }else if(el===2){ // flower
    return [0,60,120,180,240,300].map(a=>`<circle cx="${f(px+Math.cos(a*Math.PI/180)*s*.55)}" cy="${f(py+Math.sin(a*Math.PI/180)*s*.55)}" r="${f(s*.35)}" fill="${c}" opacity=".85"/>`).join('')+`<circle cx="${f(px)}" cy="${f(py)}" r="${f(s*.3)}" fill="#FFD700"/>`;
  }else if(el===3){ // person
    return `<circle cx="${f(px)}" cy="${f(py-s*.9)}" r="${f(s*.38)}" fill="${c}"/><rect x="${f(px-s*.3)}" y="${f(py-s*.55)}" width="${f(s*.6)}" height="${f(s*.9)}" fill="${c}" rx="3"/><line x1="${f(px-s*.55)}" y1="${f(py-s*.4)}" x2="${f(px+s*.55)}" y2="${f(py-s*.4)}" stroke="${c}" stroke-width="${f(s*.18)}" stroke-linecap="round"/>`;
  }else if(el===4){ // star
    return `<polygon points="${[0,72,144,216,288].map(a=>`${f(px+Math.cos((a-90)*Math.PI/180)*s)},${f(py+Math.sin((a-90)*Math.PI/180)*s)}`).join(' ')}" fill="${c}"/>`;
  }else if(el===5){ // bird
    return `<path d="M ${f(px-s)} ${f(py)} Q ${f(px-s*.5)} ${f(py-s*.5)} ${f(px)} ${f(py)} Q ${f(px+s*.5)} ${f(py-s*.5)} ${f(px+s)} ${f(py)}" fill="none" stroke="${c}" stroke-width="${f(s*.25)}" stroke-linecap="round"/>`;
  }else if(el===6){ // balloon
    return `<circle cx="${f(px)}" cy="${f(py-s*.3)}" r="${f(s*.7)}" fill="${c}" opacity=".85"/><line x1="${f(px)}" y1="${f(py+s*.4)}" x2="${f(px+rng()*s*.4-s*.2)}" y2="${f(py+s)}" stroke="${c}" stroke-width="${f(s*.1)}" stroke-linecap="round"/>`;
  }else if(el===7){ // cloud
    return `<ellipse cx="${f(px)}" cy="${f(py)}" rx="${f(s*.9)}" ry="${f(s*.5)}" fill="${c}" opacity=".7"/><circle cx="${f(px-s*.5)}" cy="${f(py-s*.1)}" r="${f(s*.4)}" fill="${c}" opacity=".7"/><circle cx="${f(px+s*.4)}" cy="${f(py-s*.15)}" r="${f(s*.45)}" fill="${c}" opacity=".7"/>`;
  }else if(el===8){ // mushroom
    return `<ellipse cx="${f(px)}" cy="${f(py-s*.4)}" rx="${f(s*.75)}" ry="${f(s*.6)}" fill="${c}"/><rect x="${f(px-s*.2)}" y="${f(py-s*.4)}" width="${f(s*.4)}" height="${f(s*.8)}" fill="#FFFDE7" rx="2"/><circle cx="${f(px-s*.25)}" cy="${f(py-s*.55)}" r="${f(s*.15)}" fill="white" opacity=".6"/><circle cx="${f(px+s*.2)}" cy="${f(py-s*.7)}" r="${f(s*.12)}" fill="white" opacity=".6"/>`;
  }else{ // butterfly
    return `<ellipse cx="${f(px-s*.4)}" cy="${f(py)}" rx="${f(s*.45)}" ry="${f(s*.6)}" fill="${c}" opacity=".8" transform="rotate(-25,${f(px-s*.4)},${f(py)})"/><ellipse cx="${f(px+s*.4)}" cy="${f(py)}" rx="${f(s*.45)}" ry="${f(s*.6)}" fill="${c}" opacity=".8" transform="rotate(25,${f(px+s*.4)},${f(py)})"/><ellipse cx="${f(px)}" cy="${f(py)}" rx="${f(s*.1)}" ry="${f(s*.35)}" fill="#333"/>`;
  }
}

// ── Main generator: produces SVG string, deterministic per seed ──
function makeWimmelbild(seed,cols,rows,n){
  const rng=mkRng(seed);
  const pal=PALETTES[Math.floor(rng()*PALETTES.length)];
  const W=240,H=240,pw=W/cols,ph=H/rows;
  const f=(v)=>v.toFixed(1);
  const parts=[];

  // Background
  parts.push(`<rect width="240" height="240" fill="${pal.bg}"/>`);
  // Sky stripe
  parts.push(`<rect width="240" height="${f(H*.35)}" fill="${pal.sky}" opacity=".45"/>`);

  // Dense scene elements per cell
  for(let i=0;i<n;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const cx=col*pw,cy=row*ph;
    // 5-8 elements per cell
    const cnt=5+Math.floor(rng()*4);
    for(let j=0;j<cnt;j++){
      const c=pal.colors[Math.floor(rng()*pal.colors.length)];
      parts.push(sceneEl(rng,c,cx,cy,pw,ph));
    }
  }

  // Extra scatter over whole canvas for density
  for(let i=0;i<40;i++){
    const c=pal.colors[Math.floor(rng()*pal.colors.length)];
    const x=rng()*W,y=rng()*H,r=2+rng()*5;
    parts.push(`<circle cx="${f(x)}" cy="${f(y)}" r="${f(r)}" fill="${c}" opacity="${(0.3+rng()*.5).toFixed(2)}"/>`);
  }

  // Cell dividers (subtle dotted)
  for(let c=1;c<cols;c++) parts.push(`<line x1="${f(c*pw)}" y1="0" x2="${f(c*pw)}" y2="${H}" stroke="rgba(255,255,255,0.35)" stroke-width="0.8" stroke-dasharray="2,3"/>`);
  for(let r=1;r<rows;r++) parts.push(`<line x1="0" y1="${f(r*ph)}" x2="${W}" y2="${f(r*ph)}" stroke="rgba(255,255,255,0.35)" stroke-width="0.8" stroke-dasharray="2,3"/>`);

  // Hidden lion in each cell — random but consistent position
  for(let i=0;i<n;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const cellX=col*pw,cellY=row*ph;
    const lr=Math.min(pw,ph)*0.11;
    const margin=lr*2.2;
    const lx=cellX+margin+rng()*(pw-margin*2);
    const ly=cellY+margin+rng()*(ph-margin*2);
    parts.push(lionFace(lx,ly,lr));
  }

  return `<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">${parts.join('')}</svg>`;
}

// Card-back: decorative face-down tile with faint lion silhouette
function PieceBack({x,y,pw,ph}){
  const cx=x+pw/2,cy=y+ph/2,r=Math.min(pw,ph)*0.27;
  const f=v=>v.toFixed(2);
  return(<>
    {[-0.35,0,0.35].map(d=>(<line key={'h'+d} x1={x} y1={cy+d*ph*0.32} x2={x+pw} y2={cy+d*ph*0.32} stroke="rgba(232,160,32,0.06)" strokeWidth={0.8}/>))}
    {[-0.35,0,0.35].map(d=>(<line key={'v'+d} x1={cx+d*pw*0.32} y1={y} x2={cx+d*pw*0.32} y2={y+ph} stroke="rgba(232,160,32,0.06)" strokeWidth={0.8}/>))}
    <circle cx={cx} cy={cy} r={r*1.4} fill="rgba(232,160,32,0.05)"/>
    <polygon points={`${f(cx-r*.6)},${f(cy-r*.95)} ${f(cx-r*.38)},${f(cy-r*.6)} ${f(cx-r*.8)},${f(cy-r*.52)}`} fill="rgba(139,69,19,0.18)"/>
    <polygon points={`${f(cx+r*.6)},${f(cy-r*.95)} ${f(cx+r*.38)},${f(cy-r*.6)} ${f(cx+r*.8)},${f(cy-r*.52)}`} fill="rgba(139,69,19,0.18)"/>
    <circle cx={cx} cy={cy} r={r} fill="rgba(100,50,10,0.22)"/>
    <circle cx={cx-r*.33} cy={cy-r*.1} r={r*.2} fill="rgba(232,160,32,0.3)"/>
    <circle cx={cx+r*.33} cy={cy-r*.1} r={r*.2} fill="rgba(232,160,32,0.3)"/>
    <circle cx={cx-r*.33} cy={cy-r*.1} r={r*.09} fill="rgba(212,90,26,0.5)"/>
    <circle cx={cx+r*.33} cy={cy-r*.1} r={r*.09} fill="rgba(212,90,26,0.5)"/>
    <ellipse cx={cx} cy={cy+r*.16} rx={r*.13} ry={r*.1} fill="rgba(160,70,20,0.38)"/>
    <path d={`M ${f(cx-r*.24)} ${f(cy+r*.32)} Q ${f(cx)} ${f(cy+r*.48)} ${f(cx+r*.24)} ${f(cy+r*.32)}`} fill="none" stroke="rgba(139,69,19,0.42)" strokeWidth={r*.12} strokeLinecap="round"/>
    <line x1={cx-r*1.45} y1={cy+r*.1} x2={cx-r*.5} y2={cy+r*.16} stroke="rgba(245,230,200,0.1)" strokeWidth={0.6}/>
    <line x1={cx+r*.5} y1={cy+r*.16} x2={cx+r*1.45} y2={cy+r*.1} stroke="rgba(245,230,200,0.1)" strokeWidth={0.6}/>
  </>);
}

// ─── MINI CALENDAR ───────────────────────────────────────────
const MONTH_UK=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DOW_UK=['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

function MiniCalendar({leaves,finalDate,preview,allProjects,currentProjectId}){
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const [tip,setTip]=useState(null); // {ds, x, y}

  const getInitialYM=()=>{
    const withDate=leaves.filter(l=>l.date).map(l=>new Date(l.date+'T00:00:00')).filter(d=>!isNaN(d.getTime()));
    const upcoming=withDate.filter(d=>d>=today).sort((a,b)=>a-b);
    const first=upcoming[0]||withDate.sort((a,b)=>a-b).pop()||today;
    return{y:first.getFullYear(),m:first.getMonth()};
  };
  const [{y,m},setYM]=useState(getInitialYM);

  const dateMap=useMemo(()=>{
    const map={};
    for(const l of leaves){
      if(!l.date)continue;
      (map[l.date]=map[l.date]||[]).push(l);
    }
    return map;
  },[leaves]);

  const firstDow=(new Date(y,m,1).getDay()+6)%7;
  const totalDays=new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=totalDays;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const hasAnyDate=leaves.some(l=>l.date);
  if(!hasAnyDate)return null;

  // Build tooltip content for a date
  function buildTip(ds){
    const mine = (dateMap[ds]||[]);
    const others = getDayLoad(ds, allProjects||[], currentProjectId||null);
    // hours: estHours from leaves (mine), estHours from others
    const mineH = mine.reduce((s,l)=>s+(l.estHours?parseFloat(l.estHours):0),0);
    const othersH = others.reduce((s,c)=>s+(c.hours?parseFloat(c.hours):0),0);
    const totalEst = mineH + othersH;
    const totalReal = totalEst * 2; // ×2 rule
    const CAP = 5;
    const freeH = Math.max(0, CAP - totalReal);
    return {mine, others, mineH, othersH, totalEst, totalReal, freeH};
  }

  function handleEnter(e, ds){
    const rect=e.currentTarget.getBoundingClientRect();
    // position tooltip to the left of cell if near right edge, else right
    const tipW=265;
    let tx = rect.right+6;
    if(tx+tipW > window.innerWidth-10) tx = rect.left-tipW-6;
    let ty = rect.top;
    if(ty+220 > window.innerHeight-10) ty = window.innerHeight-230;
    setTip({ds, x:tx, y:ty});
  }

  const tipData = tip ? buildTip(tip.ds) : null;
  const isFinalTip = tip && tip.ds === finalDate;

  return(<div className="mini-cal" onMouseLeave={()=>setTip(null)}>
    <div className="mini-cal-header">
      <button className="mini-cal-nav" onClick={()=>setYM(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})}>‹</button>
      <span className="mini-cal-title">{MONTH_UK[m]} {y}</span>
      <button className="mini-cal-nav" onClick={()=>setYM(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})}>›</button>
    </div>
    <div className="mini-cal-grid">
      {DOW_UK.map(d=><div key={d} className="mini-cal-dow">{d}</div>)}
      {cells.map((day,i)=>{
        if(!day)return<div key={'e'+i} className="mini-cal-cell empty"/>;
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const items=dateMap[ds]||[];
        const others=getDayLoad(ds,allProjects||[],currentProjectId||null);
        const cellDate=new Date(y,m,day);
        const isToday=!preview&&cellDate.getTime()===today.getTime();
        const isFinal=ds===finalDate;
        const isOver=!preview&&cellDate<today;
        const hasAnything=items.length||isFinal||others.length;

        const dots=[];
        if(isFinal&&!items.length)dots.push('dot-dead');
        for(const l of items){
          if(preview)dots.push('dot-plan');
          else if(l.done)dots.push('dot-done');
          else if(isOver)dots.push('dot-over');
          else dots.push('dot-plan');
        }

        return(<div key={ds}
          className={`mini-cal-cell${isToday?' today':''}${isFinal?' final-date':''}${hasAnything?' has-item':''}`}
          onMouseEnter={e=>hasAnything&&handleEnter(e,ds)}
          style={hasAnything?{cursor:'default'}:{}}>
          <span className="mini-cal-day">{day}</span>
          {dots.length>0&&<div className="mini-cal-dots">{dots.map((cls,di)=><span key={di} className={`mini-cal-dot ${cls}`}/>)}</div>}
        </div>);
      })}
    </div>
    <div className="mini-cal-legend">
      {!preview&&<span className="mini-cal-leg-item"><span className="mini-cal-leg-dot" style={{background:'rgba(93,187,126,.9)'}}/>виконано</span>}
      <span className="mini-cal-leg-item"><span className="mini-cal-leg-dot" style={{background:'rgba(232,160,32,.9)'}}/>заплановано</span>
      {!preview&&<span className="mini-cal-leg-item"><span className="mini-cal-leg-dot" style={{background:'rgba(255,85,85,.85)'}}/>прострочено</span>}
      <span className="mini-cal-leg-item"><span className="mini-cal-leg-dot" style={{background:'rgba(212,90,26,.75)'}}/>дедлайн</span>
    </div>

    {tip&&tipData&&(
      <div className="cal-tip" style={{left:tip.x,top:tip.y}}>
        <div className="cal-tip-date">📅 {fmtDate(tip.ds)}{isFinalTip?' 🔒 Дедлайн':''}</div>

        {tipData.mine.length>0&&<>
          <div className="cal-tip-section">Цей проект</div>
          {tipData.mine.map((l,i)=>(
            <div key={i} className="cal-tip-item">
              {l.name||'(без назви)'}
              {l.estHours?<span> · {l.estHours}г → ×2: {fmtH(realH(l.estHours))}</span>:''}
            </div>
          ))}
        </>}

        {tipData.others.length>0&&<>
          <div className="cal-tip-section">Інші проекти</div>
          {tipData.others.map((c,i)=>(
            <div key={i} className="cal-tip-item">
              {c.projectName} · {c.stageName}
              {c.hours?<span> · {c.hours}г → ×2: {fmtH(realH(c.hours))}</span>:''}
            </div>
          ))}
        </>}

        {(tipData.mine.length>0||tipData.others.length>0)&&<>
          <hr className="cal-tip-divider"/>
          <div className="cal-tip-total">
            Всього (×2): <strong>{fmtH(tipData.totalReal)}</strong>
          </div>
          <div className={`cal-tip-free ${tipData.freeH<=0?'cal-tip-free-over':tipData.freeH<2?'cal-tip-free-warn':'cal-tip-free-ok'}`}>
            {tipData.freeH<=0?'🔴 День перевантажений':tipData.freeH<2?`🟡 Вільно ~${fmtH(tipData.freeH)}`:`🟢 Вільно ~${fmtH(tipData.freeH)}`}
          </div>
        </>}

        {tipData.mine.length===0&&tipData.others.length===0&&isFinalTip&&(
          <div className="cal-tip-empty">Дедлайн проекту</div>
        )}
      </div>
    )}
  </div>);
}

function PuzzleBoard({leaves,calendarLeaves,projectId,size=195,preview=false,wimmelSeed,
                      onNewImage,customImage,onPickImage,finalDate,shuffleMap,puzzlePlaced,onPlace,onPlaceAll,allProjects,currentProjectId}){
  const total=leaves.length;
  const [draggingTrayIdx,setDraggingTrayIdx]=useState(null);
  const [dropTarget,setDropTarget]=useState(null);
  const [wrongSlot,setWrongSlot]=useState(null);

  if(total===0)return(
    <div className="puzzle-panel">
      <div className="puzzle-empty">🦁<br/>Додай вехи —<br/>лев розіб'ється<br/>на частини</div>
      <MiniCalendar leaves={calendarLeaves||[]} finalDate={finalDate} preview={preview} allProjects={allProjects} currentProjectId={currentProjectId}/>
      {!preview&&<PracticeCard compact/>}
    </div>
  );

  const {cols}=computeGrid(total);
  const rows=Math.ceil(total/cols);
  const W=240,H=240,gap=2.5,pw=W/cols,ph=H/rows;
  const uid=`pz${String(projectId).replace(/\W/g,'x')}`;
  const plural=(n)=>n===1?'фрагмент':n<5?'фрагменти':'фрагментів';
  const seed=hashStr(String(projectId)+(wimmelSeed||0));
  const wsvg=makeWimmelbild(seed,cols,rows,total);
  const imgUrl=customImage||`data:image/svg+xml;charset=utf-8,${encodeURIComponent(wsvg)}`;

  // Shuffle map: effectiveMap[trayIdx] = gridSlot (piece i belongs in slot effectiveMap[i])
  const effectiveMap=((!preview)&&shuffleMap&&shuffleMap.length===total)
    ?shuffleMap
    :Array.from({length:total},(_,i)=>i);

  // inverseMap[gridSlot] = trayIdx (which piece belongs in this slot)
  const inverseMap={};
  for(let i=0;i<total;i++) inverseMap[effectiveMap[i]]=i;

  const placedSet=new Set(!preview?(puzzlePlaced||[]):[]);
  const doneSet=new Set(leaves.map((l,i)=>l.done?i:-1).filter(x=>x>=0));

  const placedCount=placedSet.size;
  const doneCount=doneSet.size;
  const allDone=!preview&&doneCount===total;
  const allPlaced=!preview&&placedCount===total;

  // Tray: unlocked (done) but not yet placed
  const trayItems=!preview
    ?Array.from({length:total},(_,i)=>i).filter(i=>doneSet.has(i)&&!placedSet.has(i))
    :[];

  // Show all when: all done OR all placed
  const showAll=allDone||allPlaced;

  // Tray piece display size
  const traySize=trayItems.length<=4?44:trayItems.length<=9?36:30;

  function handleDrop(gridSlot){
    setDropTarget(null);
    if(draggingTrayIdx===null)return;
    if(effectiveMap[draggingTrayIdx]===gridSlot){
      onPlace&&onPlace(draggingTrayIdx);
      if(trayItems.length===1)spawnConfetti(); // last piece → image reveals
    }else{
      setWrongSlot(gridSlot);
      setTimeout(()=>setWrongSlot(null),500);
    }
    setDraggingTrayIdx(null);
  }

  return(
    <div className="puzzle-panel">
      <div className="puzzle-label">{preview?'Попередній перегляд':'Твій лев'}</div>

      <svg viewBox="0 0 240 240" width={size} height={size}
        style={{display:'block',borderRadius:10,overflow:'hidden',
          boxShadow:'0 4px 28px rgba(0,0,0,0.6)',flexShrink:0}}>
        <defs>
          {Array.from({length:total},(_,j)=>{
            const col=j%cols,row=Math.floor(j/cols);
            return(<clipPath key={j} id={`${uid}c${j}`}>
              <rect x={col*pw+gap/2} y={row*ph+gap/2} width={pw-gap} height={ph-gap} rx="3"/>
            </clipPath>);
          })}
        </defs>

        {Array.from({length:total},(_,j)=>{
          const col=j%cols,row=Math.floor(j/cols);
          const x=col*pw,y=row*ph;
          const trayIdx=inverseMap[j];
          const isPlaced=placedSet.has(trayIdx);
          const isUnlocked=doneSet.has(trayIdx)&&!isPlaced;
          const isTarget=dropTarget===j&&!isPlaced;
          const isWrong=wrongSlot===j;
          const previewDone=preview&&leaves[j]&&leaves[j].done;
          // Image shows when piece is correctly placed (or preview done)
          const revealed=isPlaced||previewDone||showAll;

          return(
            <g key={j} clipPath={`url(#${uid}c${j})`}
              className={isWrong?'puzzle-slot-wrong':''}
              onDragOver={!preview&&!isPlaced?(e)=>{e.preventDefault();setDropTarget(j);}:undefined}
              onDragLeave={!preview?()=>{if(dropTarget===j)setDropTarget(null);}:undefined}
              onDrop={!preview&&!isPlaced?(e)=>{e.preventDefault();handleDrop(j);}:undefined}>

              {/* Image — shows when placed */}
              <image href={imgUrl} x={0} y={0} width={W} height={H}
                preserveAspectRatio="xMidYMid slice"
                style={{opacity:revealed?1:0,transition:'opacity .8s cubic-bezier(.4,0,.2,1)'}}/>

              {/* Back / slot state */}
              <g style={{opacity:revealed?0:1,transition:'opacity .8s cubic-bezier(.4,0,.2,1)'}}>
                <rect x={x} y={y} width={pw} height={ph}
                  fill={isTarget?'rgba(232,160,32,.1)':'#0d0802'}/>
                {!isTarget&&<PieceBack x={x} y={y} pw={pw} ph={ph}/>}
                {isUnlocked&&!isTarget&&<>
                  <rect x={x+2} y={y+2} width={pw-4} height={ph-4} rx="2"
                    fill="none" stroke="rgba(232,160,32,.3)" strokeWidth="1" strokeDasharray="3,2"/>
                  <text x={x+pw/2} y={y+ph/2+3} fontSize={Math.min(pw,ph)*.35} textAnchor="middle"
                    fill="rgba(232,160,32,.45)" fontFamily="sans-serif">↓</text>
                </>}
                {isTarget&&<>
                  <rect x={x+2} y={y+2} width={pw-4} height={ph-4} rx="2"
                    fill="rgba(232,160,32,.08)" stroke="rgba(232,160,32,.75)" strokeWidth="1.5"/>
                  <text x={x+pw/2} y={y+ph/2+3} fontSize={Math.min(pw,ph)*.35} textAnchor="middle"
                    fill="rgba(232,160,32,.8)" fontFamily="sans-serif">✦</text>
                </>}
              </g>

              {/* Border */}
              <rect x={x+gap/2} y={y+gap/2} width={pw-gap} height={ph-gap} rx="3" fill="none"
                stroke={isPlaced?'rgba(232,160,32,.65)':isWrong?'rgba(255,85,85,.85)':
                        isTarget?'rgba(232,160,32,.8)':isUnlocked?'rgba(232,160,32,.25)':'rgba(232,160,32,.08)'}
                strokeWidth={isPlaced?1.4:isWrong||isTarget?2:.5}
                style={{transition:'stroke .25s'}}/>
              {isPlaced&&<text x={x+pw-3} y={y+9} fontSize="7" textAnchor="end"
                fill="rgba(232,160,32,.9)" fontFamily="sans-serif">✓</text>}
              {leaves[trayIdx]&&<title>{leaves[trayIdx].name||''}
                {isPlaced?' ✓':isUnlocked?' — перетягни':' 🔒'}</title>}
            </g>
          );
        })}

        {showAll&&<rect width="240" height="240" fill="rgba(232,160,32,.1)"
          style={{animation:'glowp 2s ease-in-out infinite'}}/>}
      </svg>

      {/* Status */}
      {preview?(
        <div className="puzzle-count">{total} {plural(total)}</div>
      ):showAll?(
        <div className="puzzle-done-msg">🦁 Лева знайдено!</div>
      ):(
        <div className="puzzle-count" style={{fontSize:'.67rem',lineHeight:1.5}}>
          {!preview&&doneCount>0&&<>🔓 {doneCount}/{total} відкрито<br/></>}
          🧩 {placedCount}/{total} складено
        </div>
      )}

      {!preview&&(
        <div className="puzzle-btns">
          {onPickImage&&<button className="puzzle-regen-btn"
            style={{color:customImage?'var(--amber)':'rgba(232,160,32,.75)',
                    borderColor:customImage?'rgba(232,160,32,.5)':'rgba(232,160,32,.28)'}}
            onClick={onPickImage}>🖼 {customImage?'змінити фото':'з банку'}</button>}
          {onNewImage&&!customImage&&<button className="puzzle-regen-btn" onClick={onNewImage}>🎨 нова картина</button>}
          {trayItems.length>0&&(onPlaceAll||onPlace)&&(
            <button className="puzzle-regen-btn"
              style={{color:'rgba(93,187,126,.8)',borderColor:'rgba(93,187,126,.35)'}}
              onClick={()=>{
                if(onPlaceAll) onPlaceAll();
                else trayItems.forEach(ti=>onPlace(ti));
              }}>
              🧩 розставити всі
            </button>
          )}
        </div>
      )}
      {!preview&&customImage&&placedCount<total&&<div className="puzzle-mystery">🔒 картинка прихована</div>}

      {/* Tray */}
      {!preview&&trayItems.length>0&&(
        <div className="puzzle-tray">
          <div className="puzzle-tray-label">↓ Перетягни на місце ↓</div>
          <div className="puzzle-tray-pieces">
            {trayItems.map(ti=>{
              return(
                <div key={ti}
                  className={`puzzle-tray-piece${draggingTrayIdx===ti?' is-dragging':''}`}
                  draggable
                  title={leaves[ti]?.name||''}
                  onDragStart={e=>{
                    setDraggingTrayIdx(ti);
                    e.dataTransfer.effectAllowed='move';
                    e.dataTransfer.setData('text/plain',String(ti));
                  }}
                  onDragEnd={()=>{setDraggingTrayIdx(null);setDropTarget(null);}}>
                  <svg viewBox={`0 0 ${pw} ${ph}`}
                    width={traySize} height={traySize} style={{display:'block'}}>
                    <rect width={pw} height={ph} fill="#0d0802"/>
                    <PieceBack x={0} y={0} pw={pw} ph={ph}/>
                    <rect width={pw} height={ph} fill="none"
                      stroke="rgba(232,160,32,.18)" strokeWidth="0.8"/>
                  </svg>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {!preview&&trayItems.length===0&&doneCount>0&&placedCount<total&&(
        <div className="puzzle-tray-empty">Виконай вехи,<br/>щоб отримати шматочки</div>
      )}

      <MiniCalendar leaves={calendarLeaves||leaves} finalDate={finalDate} preview={preview} allProjects={allProjects} currentProjectId={currentProjectId}/>
      {!preview&&<PracticeCard compact/>}
    </div>
  );
}

// ─── TIME FIELDS ─────────────────────────────────────────────
function TimeFields({est,onEst}){
  const rh=realH(est);
  return(<div className="time-col">
    <input type="number" min="0.25" max="24" step="0.25" placeholder="год"
      className="time-inp" value={est||''} onChange={e=>onEst(e.target.value)}
      title="Плановий час у годинах"/>
    <div className="time-lbl">план</div>
    {est&&rh&&<div className="time-real-lbl">×2: {fmtH(rh)}</div>}
  </div>);
}

// ─── DAY WARNING BLOCK ───────────────────────────────────────
function DayWarnBlock({warns}){
  if(!warns.length)return null;
  return(<div className="day-warnings">
    {warns.map(w=>(
      <div className="day-warn" key={w.date}>
        <span style={{flexShrink:0}}>⚠️</span>
        <span>
          <strong>{fmtDate(w.date)}</strong> — не состыковка, пересмотри даты!{' '}
          Реальний час: <strong>{fmtH(w.total)}</strong> (більше {DAY_LIMIT}г)
        </span>
      </div>
    ))}
  </div>);
}

// ─── PROJECT CARD ─────────────────────────────────────────────
const LEMOJIS={safe:'🦁',watch:'🦁',close:'😤',danger:'🔥',done:'✅'};
const LLABELS={safe:'Спокійний',watch:'Прокидається',close:'Бачить тебе',danger:'БІЖИ!',done:'Приборканий'};
const LCLS={safe:'lion-safe',watch:'lion-watch',close:'lion-close',danger:'lion-danger',done:'lion-done'};

// ─── IMAGE BANK MODAL ─────────────────────────────────────────
function ImageBankModal({bankImages,onClose,onAddImage,onDeleteImage,pickMode,currentImageId,onPick}){
  function handleUpload(e){
    Array.from(e.target.files).forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>onAddImage({id:String(Date.now()+Math.random()),name:file.name.replace(/\.[^.]+$/,''),data:ev.target.result});
      reader.readAsDataURL(file);
    });e.target.value='';
  }
  return(<div className="bank-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="bank-card">
      <h2>🖼 Банк картинок</h2>
      <div className="bank-subtitle">{pickMode?'Клікни на картинку — стане таємним фоном пазла.':'Завантажуй картинки. При створенні проекту рандомна призначається автоматично.'}</div>
      {bankImages.length===0?<div className="bank-empty">🖼<br/>Банк порожній.<br/>Завантаж картинки — референси, фото готових робіт, натхнення.</div>
        :<div className="bank-grid">{bankImages.map(img=>(
          <div key={img.id} className={`bank-thumb${currentImageId===img.id?' selected':''}`} onClick={()=>pickMode&&onPick(img.id)}>
            <img src={img.data} alt={img.name}/>
            <div className="bank-thumb-name">{img.name}</div>
            {currentImageId===img.id&&<div className="bank-thumb-check">✓</div>}
            {!pickMode&&<button className="bank-thumb-del" onClick={e=>{e.stopPropagation();onDeleteImage(img.id);}}>✕</button>}
          </div>))}</div>}
      <div className="bank-footer">
        <label className="bank-upload-label">📷 Додати картинки<input type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleUpload}/></label>
        {pickMode&&currentImageId&&<button className="puzzle-regen-btn" style={{fontSize:'.8rem',padding:'.38rem 1rem'}} onClick={()=>onPick(null)}>✕ прибрати фото</button>}
        <button className="btn-secondary" onClick={onClose}>Закрити</button>
      </div>
      {pickMode&&<div className="bank-pick-hint">Картинка прихована до відкриття шматочків пазла</div>}
    </div>
  </div>);
}

// ─── ARCHIVE MODAL ─────────────────────────────────────────────
function ArchiveModal({archive,onClose,onRestore,onDeletePermanently,projects,bankImages,onExport,onImportFile}){
  const fileRef=React.useRef();
  const [importing,setImporting]=React.useState(false);
  function handleImport(e){
    const f=e.target.files[0];if(!f)return;
    setImporting(true);
    importBackup(f,ok=>{setImporting(false);if(ok){alert('Резервну копію відновлено! Перезавантажте сторінку.');location.reload();}});
    e.target.value='';
  }
  return(<div className="arch-modal" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="arch-card">
      <h2>📦 Архів проектів</h2>
      <div className="arch-subtitle">Завершені або відкладені проекти. Їх можна відновити або видалити назавжди.</div>

      <div className="backup-bar">
        <strong>💾 Резервна копія</strong>
        <button className="btn-ghost" style={{fontSize:'.78rem'}} onClick={()=>onExport()}>⬇ Зберегти .json</button>
        <label className="btn-ghost" style={{fontSize:'.78rem',cursor:'pointer'}}>
          {importing?'⏳ Завантаження...':'⬆ Відновити з файлу'}
          <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
        </label>
        <span style={{fontSize:'.7rem',color:'rgba(245,230,200,.3)'}}>Зберігає всі проекти + картинки</span>
      </div>

      {archive.length===0
        ?<div className="arch-empty">📦<br/>Архів порожній.<br/>Відправ завершений проект в архів — він збережеться тут.</div>
        :<div className="arch-list">
          {archive.map(p=>{
            const lv=getLeaves(p.stages);
            const done=lv.filter(l=>l.done).length;
            const archivedAt=p.archivedAt?new Date(p.archivedAt).toLocaleDateString('uk-UA',{day:'numeric',month:'short',year:'numeric'}):'';
            return(<div key={p.id} className="arch-item">
              <div className="arch-item-info">
                <div className="arch-item-name">{p.name}</div>
                <div className="arch-item-meta">
                  {p.finalDate&&<span>📅 {fmtDate(p.finalDate)}</span>}
                  {lv.length>0&&<span>{done}/{lv.length} кроків</span>}
                  {archivedAt&&<span>В архіві з {archivedAt}</span>}
                </div>
              </div>
              <div className="arch-item-actions">
                <button className="btn-ghost" style={{fontSize:'.75rem'}} onClick={()=>onRestore(p.id)}>↩ Відновити</button>
                <button className="btn-icon" style={{color:'rgba(255,85,85,.5)',borderColor:'rgba(255,85,85,.2)'}}
                  onClick={()=>{if(confirm(`Видалити «${p.name}» назавжди?`))onDeletePermanently(p.id);}}>🗑</button>
              </div>
            </div>);
          })}
        </div>
      }
      <div className="arch-footer">
        <span style={{fontSize:'.74rem',color:'rgba(245,230,200,.3)'}}>В архіві: {archive.length} · Активних: {projects.length}</span>
        <button className="btn-secondary" onClick={onClose}>Закрити</button>
      </div>
    </div>
  </div>);
}

// ─── PROJECT CARD ─────────────────────────────────────────────
function ProjectCard({project,onToggle,onDelete,onArchive,onEdit,onUpdateStage,tags,onAddTag,onProjDragStart,onProjDragOver,onProjDragEnd,isDragging,isDragOver,onNewImage,onPickImage,customImage,onPuzzlePlace,onPuzzlePlaceAll,allProjects,togglProjData}){
  const [collapsed,setCollapsed]=useState(true);
  const [showCsvModal,setShowCsvModal]=useState(false);
  const [editingTimeId,setEditingTimeId]=useState(null);
  const [timeInputVal,setTimeInputVal]=useState('');
  const [editingTagId,setEditingTagId]=useState(null);
  const [innerTab,setInnerTab]=useState('stages'); // 'stages' | 'analytics'
  const level=projLevel(project.stages);
  const progress=projProgress(project.stages);
  const daysLeft=project.finalDate?daysUntil(project.finalDate):null;
  const leaves=getLeaves(project.stages);
  const warns=useMemo(()=>dayWarnings(project.stages,project.finalDate),[project.stages,project.finalDate]);

  const daysLabel=daysLeft===null?'':daysLeft<0?`${Math.abs(daysLeft)}д прострочено`:daysLeft===0?'Сьогодні!':`${daysLeft}д до здачі`;
  const daysColor=daysLeft!==null&&daysLeft<=3?'#ff5555':daysLeft!==null&&daysLeft<=7?'#ff8c42':'rgba(245,230,200,0.4)';

  const stageDragSrc=useRef(null);
  function sDragStart(e,id){e.stopPropagation();stageDragSrc.current=id;e.dataTransfer.effectAllowed='move';}
  function sDragOver(e,id,pid){
    e.preventDefault();e.stopPropagation();
    if(stageDragSrc.current===id)return;
    onToggle(pid,'__reorder__',stageDragSrc.current,id);
  }
  function sDragEnd(e){e.stopPropagation();stageDragSrc.current=null;}

  let cls=`project-card${collapsed?' collapsed':''}${isDragging?' dragging':''}${isDragOver?' drag-over':''}`;

  return(<><div className={cls}
    draggable
    onDragStart={e=>onProjDragStart(e,project.id)}
    onDragOver={e=>{e.preventDefault();onProjDragOver(e,project.id);}}
    onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOverId&&onProjDragEnd();}}
    onDragEnd={onProjDragEnd}>

    <div className="project-header">
      <span className="drag-handle" onMouseDown={e=>e.stopPropagation()} title="Перетягни проект">⠿</span>
      <div className="project-header-click" onClick={()=>setCollapsed(c=>!c)}>
        <div className="project-info">
          <h2>{project.name}</h2>
          <div className="project-meta">
            {project.finalDate&&<span style={{color:daysColor}}>📅 {fmtDate(project.finalDate)}{daysLabel?` · ${daysLabel}`:''}</span>}
            {leaves.length>0&&<span className="project-meta-tag">{leaves.filter(l=>l.done).length}/{leaves.length} кроків</span>}
            {warns.length>0&&<span style={{color:'#ff8a80',fontSize:'.7rem'}}>⚠️ {warns.length} несост.</span>}
          </div>
        </div>
      </div>
      <div className="project-lion-zone">
        {project.finalDate&&project.startDate&&level!=='done'&&(()=>{
          const today=new Date();today.setHours(0,0,0,0);
          const start=new Date(project.startDate+'T00:00:00');
          const end=new Date(project.finalDate+'T00:00:00');
          const totalDays=Math.max(1,Math.round((end-start)/86400000));
          const elapsed=Math.max(0,Math.round((today-start)/86400000));
          const left=Math.max(0,Math.round((end-today)/86400000));
          const pct=Math.min(100,Math.round(elapsed/totalDays*100));
          const color=left===0?'#ff5555':left<=2?'#ff8c42':left<=7?'var(--amber)':'#5dbb7e';
          const trackColor=left===0?'linear-gradient(90deg,#ff5555,#c0392b)':
            left<=2?'linear-gradient(90deg,#ff8c42,#d45a1a)':
            left<=7?'linear-gradient(90deg,var(--amber),var(--flame))':
            'linear-gradient(90deg,#5dbb7e,#27ae60)';
          return(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'.18rem',padding:'.35rem .6rem',
              borderRadius:12,background:`${color}12`,border:`1px solid ${color}35`,minWidth:58,flexShrink:0}}>
              <span style={{fontSize:'1.3rem',fontWeight:900,color,lineHeight:1,fontFamily:'Nunito,sans-serif'}}>{left}</span>
              <span style={{fontSize:'.52rem',fontWeight:800,color,textTransform:'uppercase',letterSpacing:'.05em',opacity:.8}}>
                {left===1?'день':left<5&&left>1?'дні':'днів'}
              </span>
              <div style={{width:'100%',height:3,background:'rgba(245,230,200,.08)',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',width:pct+'%',background:trackColor,borderRadius:2,transition:'width .5s'}}/>
              </div>
            </div>
          );
        })()}
        <div className={`lion-badge ${LCLS[level]}`}>
          <span className="lion-emoji">{LEMOJIS[level]}</span>
          {LLABELS[level]}
        </div>
        <div className="project-actions">
          <button className="btn-icon" onClick={e=>{e.stopPropagation();setShowCsvModal(true);}}
            title="Експорт у CSV для імпорту в Todoist"
            style={{color:'rgba(93,187,126,.65)',borderColor:'rgba(93,187,126,.2)'}}>📋</button>
          <button className="btn-icon" onClick={e=>{e.stopPropagation();onArchive(project.id);}} title="В архів"
            style={{color:'rgba(200,160,80,.65)',borderColor:'rgba(200,160,80,.2)'}}>📦</button>
          <button className="btn-icon" onClick={e=>{e.stopPropagation();onEdit(project);}} title="Редагувати"
            style={{color:'rgba(232,160,32,.5)',borderColor:'rgba(232,160,32,.2)'}}>✏️</button>
          <button className="btn-icon" onClick={e=>{e.stopPropagation();onDelete(project.id);}} title="Видалити назавжди"
            style={{color:'rgba(245,230,200,.25)',borderColor:'rgba(245,230,200,.1)'}}>🗑</button>
        </div>
        <span style={{fontSize:'.8rem',color:'rgba(245,230,200,.3)',cursor:'pointer',userSelect:'none'}}
          onClick={()=>setCollapsed(c=>!c)}>{collapsed?'▶':'▼'}</span>
      </div>
    </div>

    <div className="project-body">
      <div className="proj-tabs">
        <button className={`proj-tab-btn${innerTab==='stages'?' active':''}`} onClick={()=>setInnerTab('stages')}>📋 Вехи</button>
        <button className={`proj-tab-btn${innerTab==='analytics'?' active':''}`} onClick={()=>setInnerTab('analytics')}>📊 Аналітика</button>
      </div>

      {innerTab==='analytics'&&(()=>{
        const today=new Date();today.setHours(0,0,0,0);
        const start=project.startDate?new Date(project.startDate+'T00:00:00'):null;
        const end=project.finalDate?new Date(project.finalDate+'T00:00:00'):null;
        const totalDays=start&&end?Math.round((end-start)/86400000):null;
        const elapsed=start?Math.max(0,Math.round((today-start)/86400000)):null;
        const left=end?Math.max(0,Math.round((end-today)/86400000)):null;

        const stages=project.stages.filter(s=>s.type!=='deadline');
        const totalPlan=stages.reduce((a,s)=>a+parseFloat(s.estHours||0),0);
        const totalFact=stages.reduce((a,s)=>a+parseFloat(s.manualRealHours||0),0);
        const togglH=togglProjData?.totalH||0;
        const factH=togglH||totalFact;
        const delta=totalPlan>0&&factH>0?factH-totalPlan:null;

        const doneStages=stages.filter(s=>s.done);
        const maxPlan=Math.max(...stages.map(s=>parseFloat(s.estHours||0)),1);
        const maxFact=Math.max(...stages.map(s=>parseFloat(s.manualRealHours||0)),1);
        const maxH=Math.max(maxPlan,maxFact,1);

        return(
          <div className="proj-analytics">
            {/* Час */}
            <div className="pa-row">
              {start&&<div className="pa-chip">
                <div className="pa-chip-val">{start.toLocaleDateString('uk-UA',{day:'numeric',month:'short'})}</div>
                <div className="pa-chip-lbl">Початок</div>
              </div>}
              {end&&<div className="pa-chip">
                <div className="pa-chip-val" style={{color:left===0?'#ff5555':left<=3?'#ff8c42':'var(--amber)'}}>{end.toLocaleDateString('uk-UA',{day:'numeric',month:'short'})}</div>
                <div className="pa-chip-lbl">Дедлайн</div>
              </div>}
              {totalDays!==null&&<div className="pa-chip">
                <div className="pa-chip-val">{totalDays}</div>
                <div className="pa-chip-lbl">Всього днів</div>
              </div>}
              {elapsed!==null&&<div className="pa-chip">
                <div className="pa-chip-val">{elapsed}</div>
                <div className="pa-chip-lbl">Минуло</div>
              </div>}
              {left!==null&&<div className="pa-chip" style={{borderColor:left<=3?'rgba(255,85,85,.25)':'rgba(245,230,200,.08)'}}>
                <div className="pa-chip-val" style={{color:left===0?'#ff5555':left<=3?'#ff8c42':left<=7?'var(--amber)':'#5dbb7e'}}>{left}</div>
                <div className="pa-chip-lbl">Залишилось</div>
              </div>}
            </div>

            {/* Прогрес */}
            <div className="pa-row">
              <div className="pa-chip">
                <div className="pa-chip-val">{progress}%</div>
                <div className="pa-chip-lbl">Прогрес</div>
              </div>
              <div className="pa-chip">
                <div className="pa-chip-val">{doneStages.length}/{stages.length}</div>
                <div className="pa-chip-lbl">Вех виконано</div>
              </div>
              {totalPlan>0&&<div className="pa-chip">
                <div className="pa-chip-val">{fmtTogglH(totalPlan)}</div>
                <div className="pa-chip-lbl">Планований час</div>
              </div>}
              {factH>0&&<div className="pa-chip" style={{borderColor:'rgba(93,187,126,.2)'}}>
                <div className="pa-chip-val" style={{color:'#5dbb7e'}}>{fmtTogglH(factH)}</div>
                <div className="pa-chip-lbl">{togglH?'Toggl факт':'Ручний факт'}</div>
              </div>}
              {delta!==null&&<div className="pa-chip" style={{borderColor:delta>0?'rgba(255,85,85,.2)':'rgba(93,187,126,.2)'}}>
                <div className="pa-chip-val" style={{color:delta>0?'#ff8a80':'#5dbb7e'}}>
                  {delta>0?'+':'-'}{fmtTogglH(Math.abs(delta))}
                </div>
                <div className="pa-chip-lbl">{delta>0?'Понад план':'Зекономлено'}</div>
              </div>}
            </div>

            {/* По вехах */}
            {stages.some(s=>s.estHours||s.manualRealHours)&&(
              <div>
                <div className="pa-section-title">Час по вехах</div>
                {stages.filter(s=>s.estHours||s.manualRealHours).map(s=>{
                  const pH=parseFloat(s.estHours||0);
                  const fH=parseFloat(s.manualRealHours||0);
                  return(
                    <div key={s.id} className="pa-stage-row">
                      <span style={{fontSize:'.7rem',color:s.done?'#5dbb7e':'rgba(245,230,200,.3)',flexShrink:0}}>{s.done?'✓':'○'}</span>
                      <span className="pa-stage-name">{s.name}</span>
                      {pH>0&&<span style={{fontSize:'.68rem',color:'rgba(232,160,32,.6)',flexShrink:0}}>{fmtTogglH(pH)}</span>}
                      {fH>0&&<>
                        <div className="pa-bar-wrap">
                          <div className="pa-bar-fill" style={{
                            width:(Math.min(fH,pH>0?pH:fH)/maxH*100)+'%',
                            background:fH>pH&&pH>0?'linear-gradient(90deg,#ff5555,#c0392b)':'linear-gradient(90deg,#5dbb7e,#27ae60)'
                          }}/>
                        </div>
                        <span style={{fontSize:'.68rem',color:fH>pH&&pH>0?'#ff8a80':'#5dbb7e',flexShrink:0,minWidth:36,textAlign:'right'}}>{fmtTogglH(fH)}</span>
                      </>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

      {innerTab==='stages'&&<div className="project-body-inner">
        <div className="stages-col">
          {project.stages.length>0&&(
            <div className="project-progress">
              <div className="progress-label"><span>Прогрес</span><span>{progress}%</span></div>
              <div className="progress-track"><div className="progress-fill" style={{width:progress+'%'}}/></div>
            </div>
          )}
          {togglProjData&&togglProjData.totalH>0&&(()=>{
            const totalEst=project.stages.filter(s=>s.type!=='deadline'&&s.estHours).reduce((a,s)=>a+parseFloat(s.estHours||0),0);
            const pct=totalEst>0?Math.min(100,(togglProjData.totalH/totalEst)*100):100;
            const over=totalEst>0&&togglProjData.totalH>totalEst;
            return(
              <div className="toggl-bar">
                <span className="toggl-bar-label">⏱ Toggl</span>
                <span className="toggl-bar-total">{fmtTogglH(togglProjData.totalH)}</span>
                {totalEst>0&&<>
                  <div className="toggl-bar-track"><div className={`toggl-bar-fill${over?' over':''}`} style={{width:pct+'%'}}/></div>
                  <span className="toggl-bar-est">{over?'перевищено':'з ~'+fmtH(totalEst)+' план.'}</span>
                </>}
              </div>
            );
          })()}
          {(()=>{
            // Manual time summary
            const stages=project.stages.filter(s=>s.type!=='deadline');
            const totalPlan=stages.reduce((a,s)=>a+parseFloat(s.estHours||0),0);
            const totalFact=stages.reduce((a,s)=>a+parseFloat(s.manualRealHours||0),0);
            if(!totalFact)return null;
            const delta=totalFact-totalPlan;
            return(
              <div className="toggl-bar" style={{borderColor:'rgba(93,187,126,.12)'}}>
                <span className="toggl-bar-label" style={{color:'rgba(93,187,126,.55)'}}>✍️ Факт</span>
                <span className="toggl-bar-total" style={{color:'#5dbb7e'}}>{fmtTogglH(totalFact)}</span>
                {totalPlan>0&&<>
                  <div className="toggl-bar-track">
                    <div className="toggl-bar-fill" style={{width:Math.min(100,(totalFact/totalPlan)*100)+'%',background:'linear-gradient(90deg,#5dbb7e,#27ae60)'}}/>
                  </div>
                  <span className="toggl-bar-est" style={{color:delta>0?'#ff8a80':'#5dbb7e'}}>
                    {delta>0?`+${fmtH(delta)} понад план`:`−${fmtH(Math.abs(delta))} зекономлено`}
                  </span>
                </>}
              </div>
            );
          })()}
          {project.notes&&(
            <div className="project-notes"><div className="project-notes-label">Нотатки</div>{project.notes}</div>
          )}
          {warns.length>0&&(
            <div className="card-warnings">
              {warns.map(w=>(
                <div className="card-warn-item" key={w.date}>
                  ⚠️ <span><strong>{fmtDate(w.date)}</strong> — не состыковка, пересмотри даты!{' '}
                  Реальний час у цей день: <strong>{fmtH(w.total)}</strong> (більше {DAY_LIMIT}г)</span>
                </div>
              ))}
            </div>
          )}
          {(()=>{
            const todayStr=new Date().toISOString().slice(0,10);
            const todayStages=project.stages.filter(s=>{
              if(s.done||s.type==='deadline')return false;
              const d=isStructured(s.type)
                ?(s.dateOverride||msAutoDate(s.type,project.finalDate,project.startDate||project.createdAt)||s.date)
                :s.date;
              return d&&d<=todayStr;
            });
            if(!todayStages.length||!onUpdateStage)return null;
            function postponeOne(stageId){
              const[y,m,d]=todayStr.split('-').map(Number);
              const next=new Date(y,m-1,d+1);
              const newDate=`${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
              onUpdateStage(project.id,stageId,{date:newDate,dateOverride:newDate});
            }
            function postponeAll(){
              todayStages.forEach(s=>postponeOne(s.id));
            }
            return(
              <div style={{padding:'.4rem 1.4rem .5rem',display:'flex',alignItems:'center',gap:'.6rem',flexWrap:'wrap'}}>
                <span style={{fontSize:'.72rem',color:'rgba(255,200,80,.6)',fontWeight:700}}>
                  📅 {todayStages.length} вех на сьогодні/прострочено:
                </span>
                <button onClick={postponeAll}
                  style={{background:'rgba(74,144,217,.15)',border:'1px solid rgba(74,144,217,.3)',borderRadius:8,
                    color:'#64b5f6',fontSize:'.75rem',fontWeight:800,padding:'.28rem .75rem',cursor:'pointer',
                    fontFamily:'Nunito,sans-serif',transition:'all .15s'}}
                  onMouseOver={e=>e.target.style.background='rgba(74,144,217,.25)'}
                  onMouseOut={e=>e.target.style.background='rgba(74,144,217,.15)'}>
                  📅+1 Всі на завтра
                </button>
              </div>
            );
          })()}
          <div className="stages-list">
            {[...project.stages].sort((a,b)=>a.done===b.done?0:a.done?1:-1).map(stage=>{
              const stageDate = isStructured(stage.type)
                ? (stage.dateOverride || stage.date || msAutoDate(stage.type, project.finalDate, project.startDate||project.createdAt))
                : stage.date;
              const days=stage.done?null:daysUntil(stageDate);
              const cd=cdLabel(days,stage.done);
              const isOver=!stage.done&&days!==null&&days<0;
              const rh=stage.type==='deadline'?null:realH(stage.estHours);
              const mt=MS_TYPES[stage.type]||MS_TYPES.custom;

              return(
                <div key={stage.id}
                  className={`stage-item${stage.done?' done':''}${isOver?' overdue':''}`}
                  draggable
                  onDragStart={e=>{e.stopPropagation();sDragStart(e,stage.id);}}
                  onDragOver={e=>{e.preventDefault();e.stopPropagation();sDragOver(e,stage.id,project.id);}}
                  onDragEnd={e=>{e.stopPropagation();sDragEnd(e);}}
                  onClick={()=>onToggle(project.id,stage.id)}>
                  <span className="stage-drag-handle" onClick={e=>e.stopPropagation()}>☰</span>
                  <div className="stage-check">{stage.done&&<span className="stage-check-inner">✓</span>}</div>
                  <div className="stage-content">
                    <div className="stage-name">{stage.name||<em style={{opacity:.4}}>{mt.q?.split('\n')[0]||mt.label}</em>}</div>
                    <div className="stage-meta">
                      {stageDate&&<span>{fmtDate(stageDate)}</span>}
                      {stage.estHours!=null&&stage.type!=='deadline'&&<span className="tbadge tbadge-est">план: {fmtH(stage.estHours)}</span>}
                      {(() => {
                        // Факт: Toggl має пріоритет, потім ручний
                        const togglH = togglProjData?.stages?.[stage.id]||0;
                        const manualH = parseFloat(stage.manualRealHours)||0;
                        const factH = togglH || manualH;
                        const planH = parseFloat(stage.estHours)||0;
                        if(!factH || stage.type==='deadline') return null;
                        const delta = planH>0 ? factH - planH : null;
                        const deltaCls = delta===null?'':delta>0?'tbadge-delta-neg':'tbadge-delta-pos';
                        const deltaStr = delta===null?'':delta>0?`+${fmtH(delta)}`:`−${fmtH(Math.abs(delta))}`;
                        const src = togglH?'toggl':'manual';
                        return(<>
                          <span className={`tbadge ${src==='toggl'?'tbadge-toggl':'tbadge-manual'}`}>
                            {src==='toggl'?'⏱':'✍️'} факт: {fmtTogglH(factH)}
                          </span>
                          {delta!==null&&<span className={`tbadge ${deltaCls}`}>{deltaStr}</span>}
                        </>);
                      })()}
                      {/* Тег */}
                      {stage.type!=='deadline'&&onUpdateStage&&tags&&(()=>{
                        const t=tags.find(x=>x.id===stage.tagId);
                        return(
                          <span className={`tag-chip${!t?' tag-empty':''}`}
                            onClick={e=>{e.stopPropagation();setEditingTagId(stage.id);}}>
                            {t?`${t.emoji} ${t.label}`:'🏷 тег'}
                          </span>
                        );
                      })()}
                      {/* Кнопка ручного введення */}
                      {stage.type!=='deadline'&&onUpdateStage&&(
                        editingTimeId===stage.id ? (
                          <div onClick={e=>e.stopPropagation()}
                            style={{position:'fixed',inset:0,background:'rgba(8,5,2,.75)',display:'flex',
                              alignItems:'center',justifyContent:'center',zIndex:300,backdropFilter:'blur(3px)'}}>
                            <div style={{background:'#1a1005',border:'1px solid rgba(93,187,126,.4)',borderRadius:18,
                              padding:'1.4rem 1.6rem',minWidth:260,boxShadow:'0 20px 60px rgba(0,0,0,.7)',animation:'popUp .2s ease'}}>
                              <div style={{fontFamily:'Playfair Display,serif',color:'#5dbb7e',fontSize:'1rem',fontWeight:700,marginBottom:'.35rem'}}>
                                ✍️ Реальний час
                              </div>
                              <div style={{fontSize:'.78rem',color:'rgba(245,230,200,.4)',marginBottom:'.9rem',lineHeight:1.5}}>
                                {stage.name}
                                {stage.estHours&&<span style={{color:'rgba(93,187,126,.5)',marginLeft:'.4rem'}}>· план: {fmtH(parseFloat(stage.estHours))}</span>}
                              </div>
                              <input type="number" min="0" step="0.25" autoFocus
                                placeholder="Введи години (напр. 1.5)"
                                value={timeInputVal}
                                onChange={e=>setTimeInputVal(e.target.value)}
                                onKeyDown={e=>{
                                  if(e.key==='Enter'){onUpdateStage(project.id,stage.id,{manualRealHours:timeInputVal||null});setEditingTimeId(null);}
                                  if(e.key==='Escape'){setEditingTimeId(null);}
                                }}
                                style={{width:'100%',background:'rgba(93,187,126,.08)',border:'1px solid rgba(93,187,126,.4)',
                                  borderRadius:10,color:'#5dbb7e',padding:'.7rem 1rem',fontSize:'1.1rem',
                                  fontFamily:'Nunito,sans-serif',outline:'none',boxSizing:'border-box',marginBottom:'.4rem'}}/>
                              {fmtInputPreview(timeInputVal)&&(
                                <div style={{fontSize:'.82rem',color:'rgba(93,187,126,.7)',marginBottom:'.7rem',paddingLeft:'.3rem'}}>
                                  = <strong>{fmtInputPreview(timeInputVal)}</strong>
                                  {stage.estHours&&parseFloat(timeInputVal)>0&&(()=>{
                                    const d=parseFloat(timeInputVal)-parseFloat(stage.estHours);
                                    return <span style={{marginLeft:'.5rem',color:d>0?'#ff8a80':'#5dbb7e',fontWeight:800}}>
                                      {d>0?`+${fmtTogglH(d)}`:`−${fmtTogglH(Math.abs(d))}`} від плану
                                    </span>;
                                  })()}
                                </div>
                              )}
                              <div style={{display:'flex',gap:'.6rem',justifyContent:'flex-end'}}>
                                <button className="btn-secondary" style={{fontSize:'.85rem'}}
                                  onClick={()=>setEditingTimeId(null)}>Скасувати</button>
                                <button className="btn-primary"
                                  style={{padding:'.55rem 1.2rem',fontSize:'.9rem',background:'linear-gradient(135deg,#5dbb7e,#27ae60)',boxShadow:'0 4px 14px rgba(39,174,96,.35)'}}
                                  onClick={()=>{onUpdateStage(project.id,stage.id,{manualRealHours:timeInputVal||null});setEditingTimeId(null);}}>
                                  Зберегти
                                </button>
                              </div>
                            </div>
                          </div>
                        ) : (
                          <button onClick={e=>{e.stopPropagation();setTimeInputVal(stage.manualRealHours||'');setEditingTimeId(stage.id);}}
                            style={{background:stage.manualRealHours?'rgba(93,187,126,.15)':'none',
                              border:'1px solid rgba(93,187,126,.2)',borderRadius:6,
                              color:'rgba(93,187,126,.55)',fontSize:'.65rem',padding:'.1rem .4rem',
                              cursor:'pointer',fontFamily:'Nunito,sans-serif',lineHeight:1.4,flexShrink:0,
                              whiteSpace:'nowrap'}}
                            title="Ввести реальний час">
                            {stage.manualRealHours?`✍️${fmtTogglH(parseFloat(stage.manualRealHours))}`:'✍️'}
                          </button>
                        )
                      )}
                    </div>
                  </div>
                  {isStructured(stage.type)&&(
                    <span className={`stage-type-badge stb-${stage.type}`}>{mt.icon}</span>
                  )}
                  {!stage.done&&days!==null&&days<=0&&stage.type!=='deadline'&&onUpdateStage&&(
                    <button onClick={e=>{
                      e.stopPropagation();
                      const todayStr=new Date().toISOString().slice(0,10);
                      const[y,m,d]=todayStr.split('-').map(Number);
                      const next=new Date(y,m-1,d+1);
                      const newDate=`${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
                      onUpdateStage(project.id,stage.id,{date:newDate,dateOverride:newDate});
                    }}
                      title="Перенести на завтра"
                      style={{background:'rgba(74,144,217,.12)',border:'1px solid rgba(74,144,217,.25)',borderRadius:6,
                        color:'#64b5f6',fontSize:'.62rem',fontWeight:800,padding:'.1rem .38rem',cursor:'pointer',
                        fontFamily:'Nunito,sans-serif',flexShrink:0,whiteSpace:'nowrap'}}>
                      +1д
                    </button>
                  )}
                  {stageDate&&<span className={`stage-countdown ${cd.cls}`}>{cd.text}</span>}
                </div>
              );
            })}
            {!project.stages.length&&<div style={{fontSize:'.82rem',color:'rgba(245,230,200,.25)',padding:'.5rem 0'}}>Немає етапів</div>}
          </div>
        </div>
        <PuzzleBoard leaves={leaves} projectId={project.id} size={195}
          wimmelSeed={project.wimmelSeed||0}
          customImage={customImage}
          finalDate={project.finalDate}
          shuffleMap={project.shuffleMap}
          puzzlePlaced={project.puzzlePlaced||[]}
          onPlace={trayIdx=>onPuzzlePlace&&onPuzzlePlace(project.id,trayIdx)}
          onPlaceAll={onPuzzlePlaceAll?()=>onPuzzlePlaceAll(project.id):null}
          onNewImage={()=>onNewImage(project.id)}
          onPickImage={onPickImage?()=>onPickImage(project.id):null}
          allProjects={allProjects||[]}
          currentProjectId={project.id}/>
      </div>{/* end project-body-inner */}
      </div>}{/* end stages tab */}
    </div>{/* end project-body */}
  </div>{/* end project-card */}
  {showCsvModal&&<PriorityModal project={project} leaves={leaves} onClose={()=>setShowCsvModal(false)}/>}
  {editingTagId&&tags&&<TagPicker
    currentTagId={project.stages.find(s=>s.id===editingTagId)?.tagId||null}
    tags={tags}
    onAddTag={onAddTag}
    onSelect={tagId=>{onUpdateStage(project.id,editingTagId,{tagId});setEditingTagId(null);}}
    onClose={()=>setEditingTagId(null)}
  />}
  </>);
}

// ─── MINI PROJECTS ────────────────────────────────────────────
function miniDayLabel(startDate, durationDays){
  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);
  if(!startDate)return{label:'📋 План',cls:'mdb-future'};
  if(startDate===today&&durationDays<=1)return{label:'Сьогодні',cls:'mdb-today'};
  if(startDate===today)return{label:`Сьогодні + ${durationDays-1}д`,cls:'mdb-today'};
  if(startDate===tomorrow)return{label:'Завтра',cls:'mdb-tomorrow'};
  if(startDate<today)return{label:'Минуло',cls:'mdb-past'};
  return{label:fmtDate(startDate),cls:'mdb-future'};
}

function MiniProjectForm({existing, onSave, onCancel}){
  const todayStr=new Date().toISOString().slice(0,10);
  const [name,setName]=useState(existing?.name||'');
  // dateMode: 'none' | 'today' | 'custom'
  const [dateMode,setDateMode]=useState(()=>{
    if(!existing?.startDate)return'none';
    if(existing.startDate===todayStr)return'today';
    return'custom';
  });
  const [startDate,setStartDate]=useState(existing?.startDate||todayStr);
  const [duration,setDuration]=useState(existing?.durationDays||1);
  const [tasks,setTasks]=useState(existing?.tasks||[{id:Date.now(),name:'',estHours:'',done:false}]);

  const effectiveStart=dateMode==='none'?null:dateMode==='today'?todayStr:startDate;

  function addTask(){setTasks(t=>[...t,{id:Date.now(),name:'',estHours:'',done:false}]);}
  function updateTask(id,upd){setTasks(t=>t.map(x=>x.id===id?{...x,...upd}:x));}
  function removeTask(id){setTasks(t=>t.filter(x=>x.id!==id));}

  function handleSave(){
    if(!name.trim()){alert('Введи назву');return;}
    const validTasks=tasks.filter(t=>t.name.trim());
    if(!validTasks.length){alert('Додай хоча б одну задачу');return;}
    onSave({
      id:existing?.id||Date.now(),
      name:name.trim(),
      startDate:effectiveStart||null,
      durationDays:Number(duration),
      tasks:validTasks,
      createdAt:existing?.createdAt||new Date().toISOString(),
    });
  }

  const totalH=tasks.reduce((s,t)=>s+(parseFloat(t.estHours)||0),0);
  const perDay=duration>0?totalH/duration:totalH;

  return(
    <div className="mini-form-card">
      <h3>{existing?'✏️ Редагувати міні-проект':'⚡ Новий міні-проект'}</h3>

      <div className="form-row">
        <div className="form-group" style={{flex:2}}>
          <label>Назва</label>
          <input type="text" placeholder="Що треба зробити?" value={name} onChange={e=>setName(e.target.value)}/>
        </div>
        <div className="form-group" style={{minWidth:100,maxWidth:130}}>
          <label>Тривалість</label>
          <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
            <input type="number" min="1" max="14" value={duration}
              onChange={e=>setDuration(Math.max(1,parseInt(e.target.value)||1))}
              style={{width:55}}/>
            <span style={{fontSize:'.8rem',color:'rgba(245,230,200,.4)',whiteSpace:'nowrap'}}>дн.</span>
          </div>
        </div>
      </div>

      <div className="form-group" style={{marginBottom:'1rem'}}>
        <label>Дата</label>
        <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap',alignItems:'center'}}>
          {[['none','📋 Без дати'],['today','📅 Сьогодні'],['custom','🗓 Своя']].map(([mode,lbl])=>(
            <button key={mode} onClick={()=>setDateMode(mode)}
              style={{background:dateMode===mode?'rgba(232,160,32,.15)':'rgba(245,230,200,.04)',
                border:`1px solid ${dateMode===mode?'rgba(232,160,32,.4)':'rgba(245,230,200,.12)'}`,
                borderRadius:9,color:dateMode===mode?'var(--amber)':'rgba(245,230,200,.5)',
                padding:'.38rem .85rem',fontSize:'.82rem',fontWeight:700,fontFamily:'Nunito,sans-serif',
                cursor:'pointer',transition:'all .15s'}}>
              {lbl}
            </button>
          ))}
          {dateMode==='custom'&&(
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
              style={{width:'auto'}}/>
          )}
        </div>
      </div>

      {totalH>0&&(
        <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap',marginBottom:'1rem',padding:'.6rem .9rem',background:'rgba(93,187,126,.05)',border:'1px solid rgba(93,187,126,.15)',borderRadius:10}}>
          <span style={{fontSize:'.68rem',fontWeight:800,color:'rgba(93,187,126,.5)',textTransform:'uppercase',letterSpacing:'.06em',width:'100%',marginBottom:'.2rem'}}>⏱ Оцінка часу</span>
          <span style={{fontSize:'.82rem',fontWeight:900,color:'#5dbb7e'}}>Всього: {fmtH(totalH)}</span>
          {duration>1&&<span style={{fontSize:'.8rem',color:'rgba(245,230,200,.4)'}}>≈ {fmtH(perDay)} / день</span>}
          <span className={`mini-hour-chip${perDay>5?' over':perDay>3?' warn':''}`}>
            {perDay>5?'⚠️ більше 5г/день':perDay>3?'🟡 щільний день':'🟢 норм'}
          </span>
        </div>
      )}

      <div style={{marginBottom:'.6rem'}}>
        <div className="stages-title">Задачі</div>
        {tasks.map((t,i)=>(
          <div key={t.id} style={{display:'flex',gap:'.45rem',alignItems:'center',marginBottom:'.45rem'}}>
            <input type="text" placeholder={`Задача ${i+1}`} value={t.name}
              onChange={e=>updateTask(t.id,{name:e.target.value})}
              style={{flex:1,fontSize:'.88rem'}}/>
            <div className="time-col" title="Оціночний час">
              <input className="time-inp" type="number" min="0.25" max="24" step="0.25"
                placeholder="год" value={t.estHours||''}
                onChange={e=>updateTask(t.id,{estHours:e.target.value})}/>
              <div className="time-lbl">год</div>
            </div>
            {tasks.length>1&&(
              <button className="ms-del-btn" onClick={()=>removeTask(t.id)}>✕</button>
            )}
          </div>
        ))}
        <button className="btn-add-stage" onClick={addTask}>+ Додати задачу</button>
      </div>

      <div className="form-actions">
        <button className="btn-secondary" onClick={onCancel}>Скасувати</button>
        <button className="btn-primary" onClick={handleSave}
          style={{padding:'.6rem 1.5rem',fontSize:'.92rem',background:'linear-gradient(135deg,#5dbb7e,#27ae60)',boxShadow:'0 4px 18px rgba(39,174,96,.35)'}}>
          {existing?'Зберегти':'⚡ Запустити'}
        </button>
      </div>
    </div>
  );
}

function MiniProjectCard({mp, onToggle, onEdit, onDelete, onArchive, onPostpone, onPuzzlePlace, onNewImage, onPickImage, customImage, onUpdateTask, tags, onAddTag}){
  const [collapsed,setCollapsed]=useState(true);
  const [editingTimeId,setEditingTimeId]=useState(null);
  const [timeInputVal,setTimeInputVal]=useState('');
  const [editingTagId,setEditingTagId]=useState(null);

      {!collapsed&&<>

function MiniProjectsTab({miniProjects,miniArchive,bankImages,tags,onAddTag,onSave,onToggle,onArchive,onRestore,onArchiveDelete,onDelete,onPostpone,onPuzzlePlace,onNewImage,onPickImage,onAddBankImage,onUpdateTask}){
  const [showForm,setShowForm]=useState(false);
  const [editMp,setEditMp]=useState(null);
  const [pickMpId,setPickMpId]=useState(null);
  const [showBank,setShowBank]=useState(false);
  const [showArchive,setShowArchive]=useState(false);

  function handleSave(mp){
    onSave(mp, bankImages);
    setShowForm(false);setEditMp(null);
  }
  function handlePickImage(imgId){
    if(!pickMpId)return;
    onPickImage(pickMpId,imgId);
    setShowBank(false);setPickMpId(null);
  }
  function openPickMode(mpId){setPickMpId(mpId);setShowBank(true);}
  function handleEdit(mp){setEditMp(mp);setShowForm(true);}

  const today=new Date().toISOString().slice(0,10);
  const sorted=[...miniProjects].sort((a,b)=>{
    const da=a.startDate||'';const db=b.startDate||'';
    const scoreA=da===today?0:da>today?1:2;
    const scoreB=db===today?0:db>today?1:2;
    if(scoreA!==scoreB)return scoreA-scoreB;
    return da.localeCompare(db);
  });

  return(
    <div>
      {!showForm&&(
        <div style={{display:'flex',gap:'.6rem',marginBottom:'1.2rem'}}>
          <button className="btn-primary" onClick={()=>{setEditMp(null);setShowForm(true);}}
            style={{flex:1,borderRadius:14,fontSize:'1rem',
              background:'linear-gradient(135deg,#5dbb7e,#27ae60)',boxShadow:'0 4px 20px rgba(39,174,96,.3)'}}>
            ⚡ Новий міні-проект
          </button>
          {miniArchive.length>0&&(
            <button className="btn-ghost" onClick={()=>setShowArchive(true)}
              style={{fontSize:'.82rem',color:'rgba(200,160,80,.8)',borderColor:'rgba(200,160,80,.25)'}}>
              📦 Архів ({miniArchive.length})
            </button>
          )}
        </div>
      )}
      {showForm&&(
        <MiniProjectForm existing={editMp} onSave={handleSave} onCancel={()=>{setShowForm(false);setEditMp(null);}}/>
      )}
      {!miniProjects.length&&!showForm&&(
        <div className="mini-empty">
          <div className="e-lion">⚡</div>
          <p style={{fontSize:'.9rem',lineHeight:1.7}}>Міні-проектів ще немає.<br/>
            <span style={{fontSize:'.8rem'}}>Для задач на 1–2 дні — без зайвого планування.</span>
          </p>
        </div>
      )}
      {sorted.map(mp=>(
        <MiniProjectCard key={mp.id} mp={mp}
          onToggle={onToggle}
          onEdit={handleEdit}
          onDelete={onDelete}
          onArchive={onArchive}
          onPostpone={onPostpone}
          onPuzzlePlace={onPuzzlePlace}
          onNewImage={onNewImage}
          onPickImage={openPickMode}
          onUpdateTask={onUpdateTask}
          tags={tags}
          onAddTag={onAddTag}
          customImage={mp.imageId?bankImages.find(i=>i.id===mp.imageId)?.data||null:null}
        />
      ))}
      {showBank&&(
        <ImageBankModal
          bankImages={bankImages}
          onClose={()=>{setShowBank(false);setPickMpId(null);}}
          onAddImage={onAddBankImage}
          onDeleteImage={()=>{}}
          pickMode={true}
          currentImageId={pickMpId?miniProjects.find(m=>m.id===pickMpId)?.imageId||null:null}
          onPick={handlePickImage}
        />
      )}
      {showArchive&&(
        <div className="arch-modal" onClick={e=>e.target===e.currentTarget&&setShowArchive(false)}>
          <div className="arch-card">
            <h2>📦 Архів міні-проектів</h2>
            <div className="arch-subtitle">Завершені або відкладені міні-проекти.</div>
            {miniArchive.length===0
              ?<div className="arch-empty">Архів порожній.</div>
              :<div className="arch-list">
                {miniArchive.map(mp=>{
                  const done=mp.tasks.filter(t=>t.done).length;
                  const archivedAt=mp.archivedAt?new Date(mp.archivedAt).toLocaleDateString('uk-UA',{day:'numeric',month:'short',year:'numeric'}):'';
                  return(<div key={mp.id} className="arch-item">
                    <div className="arch-item-info">
                      <div className="arch-item-name">{mp.name}</div>
                      <div className="arch-item-meta">
                        {mp.startDate&&<span>📅 {fmtDate(mp.startDate)}</span>}
                        <span>{done}/{mp.tasks.length} задач</span>
                        {archivedAt&&<span>В архіві з {archivedAt}</span>}
                      </div>
                    </div>
                    <div className="arch-item-actions">
                      <button className="btn-ghost" style={{fontSize:'.75rem'}} onClick={()=>onRestore(mp.id)}>↩ Відновити</button>
                      <button className="btn-icon" style={{color:'rgba(255,85,85,.5)',borderColor:'rgba(255,85,85,.2)'}}
                        onClick={()=>{if(confirm(`Видалити «${mp.name}» назавжди?`))onArchiveDelete(mp.id);}}>🗑</button>
                    </div>
                  </div>);
                })}
              </div>
            }
            <div className="arch-footer">
              <span style={{fontSize:'.74rem',color:'rgba(245,230,200,.3)'}}>В архіві: {miniArchive.length}</span>
              <button className="btn-secondary" onClick={()=>setShowArchive(false)}>Закрити</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TAG PICKER ───────────────────────────────────────────────
function TagPicker({currentTagId, onSelect, onClose, tags, onAddTag}){
  const [newLabel,setNewLabel]=useState('');
  const [newEmoji,setNewEmoji]=useState('🏷');

  function doAdd(){
    if(!newLabel.trim())return;
    const tag={id:'u'+Date.now(),label:newLabel.trim(),emoji:newEmoji};
    onAddTag(tag);
    onSelect(tag.id); // одразу вибираємо і закриваємо
  }

  return(
    <div className="tag-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="tag-modal-card">
        <h3>🏷 Категорія / тег</h3>
        <div className="tag-list">
          <div className={`tag-option${!currentTagId?' selected':''}`} onClick={()=>onSelect(null)}>
            <span className="tag-option-emoji">✕</span>
            <span className="tag-option-label" style={{color:'rgba(245,230,200,.4)'}}>Без тегу</span>
            {!currentTagId&&<span className="tag-option-check">✓</span>}
          </div>
          {tags.map(t=>(
            <div key={t.id} className={`tag-option${currentTagId===t.id?' selected':''}`}
              onClick={()=>onSelect(t.id)}>
              <span className="tag-option-emoji">{t.emoji}</span>
              <span className="tag-option-label">{t.label}</span>
              {currentTagId===t.id&&<span className="tag-option-check">✓</span>}
            </div>
          ))}
        </div>
        <div style={{borderTop:'1px solid rgba(245,230,200,.07)',paddingTop:'.8rem',marginBottom:'.7rem'}}>
          <div style={{fontSize:'.65rem',fontWeight:800,color:'rgba(245,230,200,.3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>Додати свій тег</div>
          <div className="tag-new-row">
            <input type="text" value={newEmoji} onChange={e=>setNewEmoji(e.target.value)}
              style={{width:44,textAlign:'center',fontSize:'1.1rem',padding:'.4rem .3rem',background:'rgba(245,230,200,.05)',border:'1px solid rgba(245,230,200,.12)',borderRadius:8,color:'var(--dust)',fontFamily:'Nunito,sans-serif',outline:'none'}}/>
            <input type="text" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
              placeholder="Назва тегу..."
              onKeyDown={e=>e.key==='Enter'&&doAdd()}

            <button onClick={doAdd}
              style={{background:'rgba(147,108,230,.2)',border:'1px solid rgba(147,108,230,.35)',borderRadius:8,color:'#b39ddb',padding:'.42rem .8rem',cursor:'pointer',fontWeight:800,fontFamily:'Nunito,sans-serif',fontSize:'.82rem'}}>
              +
            </button>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end'}}>
          <button className="btn-secondary" onClick={onClose}>Закрити</button>
        </div>
      </div>
    </div>
  );
}

// ─── ANALYTICS TAB ────────────────────────────────────────────
function AnalyticsTab({projects, miniProjects, tags}){
  // Collect all stages with tags
  const byTag={};
  const allStages=[];

  // From main projects
  for(const p of projects){
    for(const s of p.stages){
      if(!s.tagId||s.type==='deadline')continue;
      const planH=parseFloat(s.estHours)||0;
      const factH=parseFloat(s.manualRealHours)||0;
      allStages.push({tagId:s.tagId,planH,factH,projectName:p.name,stageName:s.name,done:s.done});
    }
  }
  // From mini projects
  for(const mp of miniProjects){
    for(const t of mp.tasks){
      if(!t.tagId)continue;
      const planH=parseFloat(t.estHours)||0;
      const factH=parseFloat(t.manualRealHours)||0;
      allStages.push({tagId:t.tagId,planH,factH,projectName:mp.name,stageName:t.name,done:t.done});
    }
  }

  if(!allStages.length) return(
    <div className="analytics-empty">
      <div style={{fontSize:'3rem',marginBottom:'1rem',opacity:.3}}>📊</div>
      <p style={{fontSize:'.9rem',lineHeight:1.8}}>
        Тут зʼявиться аналітика по категоріях.<br/>
        <span style={{fontSize:'.8rem'}}>Додай теги до вех і введи реальний час — і побачиш, скільки часу йде на кожен тип роботи.</span>
      </p>
    </div>
  );

  // Group by tag
  for(const s of allStages){
    if(!byTag[s.tagId]) byTag[s.tagId]={planH:0,factH:0,count:0,doneCount:0,projects:new Set()};
    byTag[s.tagId].planH+=s.planH;
    byTag[s.tagId].factH+=s.factH;
    byTag[s.tagId].count++;
    if(s.done)byTag[s.tagId].doneCount++;
    byTag[s.tagId].projects.add(s.projectName);
  }

  const tagStats=Object.entries(byTag)
    .map(([tagId,stat])=>{
      const tag=tags.find(t=>t.id===tagId)||{emoji:'🏷',label:tagId};
      return{tag,stat:{...stat,projects:[...stat.projects]}};
    })
    .sort((a,b)=>b.stat.factH-a.stat.factH||b.stat.planH-a.stat.planH);

  const totalPlan=allStages.reduce((s,x)=>s+x.planH,0);
  const totalFact=allStages.reduce((s,x)=>s+x.factH,0);
  const maxH=Math.max(...tagStats.map(x=>Math.max(x.stat.planH,x.stat.factH)),1);

  return(
    <div>
      {/* Totals */}
      <div className="analytics-total-row">
        <div className="analytics-total-chip">
          <div className="analytics-total-val">{fmtTogglH(totalPlan)||'—'}</div>
          <div className="analytics-total-lbl">Всього план</div>
        </div>
        <div className="analytics-total-chip">
          <div className="analytics-total-val" style={{color:'#5dbb7e'}}>{fmtTogglH(totalFact)||'—'}</div>
          <div className="analytics-total-lbl">Всього факт</div>
        </div>
        <div className="analytics-total-chip">
          <div className="analytics-total-val" style={{color:'#b39ddb'}}>{allStages.length}</div>
          <div className="analytics-total-lbl">Вех з тегами</div>
        </div>
        {totalPlan>0&&totalFact>0&&(
          <div className="analytics-total-chip">
            <div className="analytics-total-val"
              style={{color:totalFact>totalPlan?'#ff8a80':'#5dbb7e'}}>
              {totalFact>totalPlan?`+${fmtTogglH(totalFact-totalPlan)}`:`−${fmtTogglH(totalPlan-totalFact)}`}
            </div>
            <div className="analytics-total-lbl">{totalFact>totalPlan?'Понад план':'Зекономлено'}</div>
          </div>
        )}
      </div>

      <div className="analytics-section">
        <div className="analytics-section-title">По категоріях</div>
        {tagStats.map(({tag,stat})=>(
          <div key={tag.id} className="tag-stat-card">
            <div className="tag-stat-head">
              <span className="tag-stat-emoji">{tag.emoji}</span>
              <span className="tag-stat-name">{tag.label}</span>
              <span className="tag-stat-count">{stat.count} вех · {stat.doneCount} виконано</span>
            </div>
            <div className="tag-stat-bars">
              {stat.planH>0&&(
                <div className="tag-bar-row">
                  <span className="tag-bar-label" style={{color:'rgba(232,160,32,.6)'}}>план</span>
                  <div className="tag-bar-track"><div className="tag-bar-fill-plan" style={{width:(stat.planH/maxH*100)+'%'}}/></div>
                  <span className="tag-bar-val" style={{color:'rgba(232,160,32,.8)'}}>{fmtTogglH(stat.planH)}</span>
                </div>
              )}
              {stat.factH>0&&(
                <div className="tag-bar-row">
                  <span className="tag-bar-label" style={{color:'rgba(93,187,126,.6)'}}>факт</span>
                  <div className="tag-bar-track"><div className="tag-bar-fill-fact" style={{width:(stat.factH/maxH*100)+'%'}}/></div>
                  <span className="tag-bar-val" style={{color:'#5dbb7e'}}>
                    {fmtTogglH(stat.factH)}
                    {stat.planH>0&&<span style={{fontSize:'.6rem',marginLeft:'.25rem',color:stat.factH>stat.planH?'#ff8a80':'#5dbb7e'}}>
                      {stat.factH>stat.planH?`+${fmtTogglH(stat.factH-stat.planH)}`:`−${fmtTogglH(stat.planH-stat.factH)}`}
                    </span>}
                  </span>
                </div>
              )}
            </div>
            <div className="tag-projects">
              {stat.projects.map((pn,i)=><span key={i} className="tag-proj-chip">{pn}</span>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
