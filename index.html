<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Знайди Лева 🦁</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --savanna: #1a1208;
    --dust: #f5e6c8;
    --amber: #e8a020;
    --flame: #d45a1a;
    --mane: #8b4513;
    --grass: #2d3a1a;
    --sky: #1e2d3d;
    --ghost: rgba(245,230,200,0.06);
    --card: rgba(245,230,200,0.08);
    --border: rgba(232,160,32,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--savanna);
    color: var(--dust);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Savanna texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(45,58,26,0.6) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 20% 80%, rgba(139,69,19,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 20% at 80% 90%, rgba(232,160,32,0.08) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  /* Stars */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(245,230,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 8%, rgba(245,230,200,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 12%, rgba(245,230,200,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 5%, rgba(245,230,200,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 18%, rgba(245,230,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 25%, rgba(245,230,200,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 62% 20%, rgba(245,230,200,0.3) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  /* ── ONBOARDING ── */
  .onboard {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .onboard-lion {
    font-size: 5rem;
    animation: breathe 3s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(232,160,32,0.5));
    margin-bottom: 1.5rem;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .onboard h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 900;
    color: var(--amber);
    line-height: 1.1;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 40px rgba(232,160,32,0.3);
  }
  .onboard-subtitle {
    font-size: 1rem;
    color: rgba(245,230,200,0.55);
    margin-bottom: 2.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .theory-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
    max-width: 860px;
    width: 100%;
    margin-bottom: 2.5rem;
  }
  .theory-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.4rem 1.2rem;
    text-align: left;
    backdrop-filter: blur(8px);
  }
  .theory-card .icon { font-size: 1.8rem; margin-bottom: 0.6rem; }
  .theory-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--amber);
    margin-bottom: 0.4rem;
  }
  .theory-card p { font-size: 0.875rem; line-height: 1.6; color: rgba(245,230,200,0.75); }
  .btn-primary {
    background: linear-gradient(135deg, var(--amber), var(--flame));
    color: var(--savanna);
    border: none; border-radius: 50px;
    padding: 0.9rem 2.5rem;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(212,90,26,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,90,26,0.5); }
  .btn-primary:active { transform: translateY(0); }

  /* ── MAIN APP ── */
  .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1.2rem 3rem; }
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .app-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--amber); font-weight: 900;
  }
  .btn-ghost {
    background: var(--ghost);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--dust);
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-ghost:hover { background: rgba(245,230,200,0.12); }

  /* ── NEW PROJECT FORM ── */
  .new-project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.8rem;
    margin-bottom: 2rem;
    backdrop-filter: blur(8px);
  }
  .new-project-card h2 {
    font-family: 'Playfair Display', serif;
    color: var(--amber); margin-bottom: 1.2rem; font-size: 1.2rem;
  }
  .form-row { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 180px; }
  label { font-size: 0.78rem; color: rgba(245,230,200,0.55); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  input[type="text"], input[type="date"], input[type="number"] {
    background: rgba(245,230,200,0.06);
    border: 1px solid rgba(232,160,32,0.2);
    border-radius: 10px;
    color: var(--dust);
    padding: 0.6rem 0.9rem;
    font-size: 0.95rem;
    font-family: 'Nunito', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus {
    border-color: var(--amber);
  }
  input[type="date"] { color-scheme: dark; }
  .stages-title {
    font-size: 0.78rem; color: rgba(245,230,200,0.55);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;
    margin-bottom: 0.6rem;
  }
  .stage-row {
    display: flex; gap: 0.6rem; align-items: center;
    margin-bottom: 0.5rem; flex-wrap: wrap;
  }
  .stage-row input[type="text"] { flex: 2; min-width: 120px; }
  .stage-row input[type="date"] { flex: 1; min-width: 140px; }
  .btn-icon {
    background: transparent;
    border: 1px solid rgba(212,90,26,0.4);
    border-radius: 8px;
    color: var(--flame);
    width: 34px; height: 34px;
    cursor: pointer; font-size: 1rem;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { background: rgba(212,90,26,0.15); }
  .btn-add-stage {
    background: transparent;
    border: 1px dashed rgba(232,160,32,0.3);
    border-radius: 10px;
    color: rgba(232,160,32,0.6);
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-family: 'Nunito', sans-serif;
    cursor: pointer; width: 100%;
    margin-bottom: 1rem;
    transition: all 0.15s;
  }
  .btn-add-stage:hover { border-color: var(--amber); color: var(--amber); }
  .form-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: rgba(245,230,200,0.6);
    padding: 0.6rem 1.3rem;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }

  /* ── PROJECT CARDS ── */
  .projects-grid { display: flex; flex-direction: column; gap: 1.5rem; }
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(8px);
    transition: box-shadow 0.2s;
  }
  .project-card:hover { box-shadow: 0 8px 40px rgba(232,160,32,0.1); }
  .project-header {
    padding: 1.3rem 1.5rem;
    display: flex; align-items: flex-start; justify-content: space-between;
    border-bottom: 1px solid rgba(232,160,32,0.1);
    gap: 1rem;
  }
  .project-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; color: var(--dust); font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .project-meta {
    font-size: 0.8rem; color: rgba(245,230,200,0.45);
  }
  .project-lion-zone {
    display: flex; align-items: center; gap: 0.8rem;
  }
  .project-actions { display: flex; gap: 0.4rem; }
  .lion-badge {
    display: flex; flex-direction: column; align-items: center;
    padding: 0.4rem 0.8rem;
    border-radius: 12px;
    font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .lion-badge .lion-emoji { font-size: 1.6rem; line-height: 1; margin-bottom: 0.15rem; }
  .lion-safe { background: rgba(45,100,30,0.25); color: #7fc47a; border: 1px solid rgba(127,196,122,0.25); }
  .lion-watch { background: rgba(180,130,20,0.2); color: var(--amber); border: 1px solid rgba(232,160,32,0.3); }
  .lion-close { background: rgba(200,80,20,0.2); color: #ff8c42; border: 1px solid rgba(255,140,66,0.35); }
  .lion-danger { background: rgba(200,20,20,0.25); color: #ff5555; border: 1px solid rgba(255,85,85,0.35); }
  .lion-done { background: rgba(232,160,32,0.15); color: var(--amber); border: 1px solid var(--border); }

  /* Progress bar */
  .project-progress { padding: 0.8rem 1.5rem; border-bottom: 1px solid rgba(232,160,32,0.08); }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; color: rgba(245,230,200,0.45);
    margin-bottom: 0.4rem;
  }
  .progress-track {
    height: 6px; background: rgba(245,230,200,0.08); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--amber), var(--flame));
    transition: width 0.4s ease;
  }

  /* Stages */
  .stages-list { padding: 0.8rem 1.5rem 1.2rem; }
  .stage-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid rgba(245,230,200,0.06);
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 8px;
    padding: 0.65rem 0.6rem;
  }
  .stage-item:hover { background: rgba(245,230,200,0.04); }
  .stage-item:last-child { border-bottom: none; }
  .stage-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(232,160,32,0.35);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .stage-item.done .stage-check {
    background: var(--amber); border-color: var(--amber);
  }
  .stage-check-inner { font-size: 0.65rem; color: var(--savanna); font-weight: 900; }
  .stage-content { flex: 1; }
  .stage-name {
    font-size: 0.9rem; font-weight: 600;
    color: var(--dust);
    transition: color 0.2s;
  }
  .stage-item.done .stage-name {
    color: rgba(245,230,200,0.4);
    text-decoration: line-through;
  }
  .stage-date { font-size: 0.75rem; color: rgba(245,230,200,0.4); margin-top: 0.1rem; }
  .stage-countdown {
    font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.55rem;
    border-radius: 8px; white-space: nowrap;
  }
  .countdown-safe { background: rgba(45,100,30,0.2); color: #7fc47a; }
  .countdown-watch { background: rgba(180,130,20,0.2); color: var(--amber); }
  .countdown-close { background: rgba(200,80,20,0.25); color: #ff8c42; }
  .countdown-overdue { background: rgba(200,20,20,0.25); color: #ff5555; }
  .countdown-done { background: rgba(245,230,200,0.06); color: rgba(245,230,200,0.3); }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 4rem 1.5rem;
    color: rgba(245,230,200,0.35);
  }
  .empty-state .e-lion { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-state p { font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }

  /* Tip bar */
  .tip-bar {
    background: rgba(232,160,32,0.08);
    border: 1px solid rgba(232,160,32,0.2);
    border-radius: 12px;
    padding: 0.8rem 1.1rem;
    font-size: 0.82rem; line-height: 1.5;
    color: rgba(245,230,200,0.7);
    margin-bottom: 1.5rem;
    display: flex; gap: 0.7rem; align-items: flex-start;
  }
  .tip-bar .tip-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.05rem; }

  /* delete confirm overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,7,3,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1.5rem;
  }
  .overlay-card {
    background: #211808;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    max-width: 380px; width: 100%;
    text-align: center;
  }
  .overlay-card h3 {
    font-family: 'Playfair Display', serif;
    color: var(--amber); margin-bottom: 0.7rem; font-size: 1.1rem;
  }
  .overlay-card p { font-size: 0.9rem; color: rgba(245,230,200,0.65); margin-bottom: 1.5rem; line-height: 1.5; }
  .overlay-actions { display: flex; gap: 0.8rem; justify-content: center; }
  .btn-danger {
    background: rgba(200,30,30,0.8); border: none; border-radius: 10px;
    color: #fff; padding: 0.6rem 1.4rem;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    cursor: pointer;
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall 1.5s ease-out forwards;
    pointer-events: none;
    z-index: 200;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(90vh) rotate(720deg); opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 540px) {
    .theory-cards { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; }
    .project-header { flex-direction: column; }
    .project-lion-zone { justify-content: space-between; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── HELPERS ───────────────────────────────────────────────────
const LS_KEY = 'znaydi_leva_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}
function save(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function lionLevel(days) {
  if (days === null) return 'done';
  if (days < 0) return 'danger';
  if (days <= 2) return 'danger';
  if (days <= 5) return 'close';
  if (days <= 10) return 'watch';
  return 'safe';
}

const LION_EMOJIS = { safe: '🦁', watch: '🦁', close: '😤', danger: '🔥', done: '✅' };
const LION_LABELS = {
  safe: 'Спокійний',
  watch: 'Прокидається',
  close: 'Бачить тебе',
  danger: 'БІЖИ!',
  done: 'Приборканий'
};

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('uk-UA', { day: 'numeric', month: 'short' });
}

function countdownLabel(days, done) {
  if (done) return { text: 'Готово ✓', cls: 'countdown-done' };
  if (days === null) return { text: '—', cls: 'countdown-done' };
  if (days < 0) return { text: `${Math.abs(days)}д прострочено`, cls: 'countdown-overdue' };
  if (days === 0) return { text: 'СЬОГОДНІ 🔥', cls: 'countdown-overdue' };
  if (days === 1) return { text: 'Завтра 😤', cls: 'countdown-close' };
  if (days <= 5) return { text: `${days}д`, cls: 'countdown-close' };
  if (days <= 10) return { text: `${days}д`, cls: 'countdown-watch' };
  return { text: `${days}д`, cls: 'countdown-safe' };
}

function projectLionLevel(stages) {
  if (stages.length === 0) return 'safe';
  const incomplete = stages.filter(s => !s.done);
  if (incomplete.length === 0) return 'done';
  const days = incomplete.map(s => daysUntil(s.date)).filter(d => d !== null);
  if (days.length === 0) return 'safe';
  const minDays = Math.min(...days);
  return lionLevel(minDays);
}

function projectProgress(stages) {
  if (stages.length === 0) return 0;
  return Math.round((stages.filter(s => s.done).length / stages.length) * 100);
}

// ─── CONFETTI ─────────────────────────────────────────────────
function spawnConfetti() {
  const colors = ['#e8a020','#d45a1a','#7fc47a','#f5e6c8','#ff8c42'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
}

// ─── DEFAULT STAGES ───────────────────────────────────────────
const DEFAULT_STAGES = [
  'Узгодження референсу з клієнтом',
  'Виготовлення викрійки',
  'Розкрій тканини',
  'Чорнова збірка / примірка',
  'Оздоблення (декор, стрази тощо)',
  'Фото + відправка'
];

// ─── ONBOARDING ───────────────────────────────────────────────
function Onboarding({ onStart }) {
  return (
    <div className="onboard">
      <div className="onboard-lion">🦁</div>
      <h1>Знайди Лева</h1>
      <p className="onboard-subtitle">Система роботи для мозку з СДВГ</p>
      <div className="theory-cards">
        <div className="theory-card">
          <div className="icon">🧠</div>
          <h3>Тимчасова сліпота</h3>
          <p>Твій мозок не відчуває дедлайн, поки він не «видно». За 3 тижні — лев далеко. За 18 годин — лев прямо перед тобою.</p>
        </div>
        <div className="theory-card">
          <div className="icon">⚡</div>
          <h3>Дофамін і адреналін</h3>
          <p>Пік продуктивності в останній момент — це адреналін, а не лінь. Але ціна — виснаження після, «яма» та відраза до роботи.</p>
        </div>
        <div className="theory-card">
          <div className="icon">🎯</div>
          <h3>Мікро-лев на кожен етап</h3>
          <p>Розбиваємо проект на етапи і даємо кожному свій дедлайн. Кожен стає справжнім левом — видимим і відчутним прямо зараз.</p>
        </div>
        <div className="theory-card">
          <div className="icon">🛡️</div>
          <h3>Точка неповернення</h3>
          <p>Є критичний момент у будь-якому проекті (наприклад, розкрій). Він має бути готовий до середини терміну — це головний страховий дедлайн.</p>
        </div>
      </div>
      <button className="btn-primary" onClick={onStart}>Знайти свого лева →</button>
    </div>
  );
}

// ─── NEW PROJECT FORM ─────────────────────────────────────────
function NewProjectForm({ onSave, onCancel }) {
  const [name, setName] = useState('');
  const [finalDate, setFinalDate] = useState('');
  const [stages, setStages] = useState(
    DEFAULT_STAGES.map((s, i) => ({ id: Date.now() + i, name: s, date: '' }))
  );

  function addStage() {
    setStages(prev => [...prev, { id: Date.now(), name: '', date: '' }]);
  }
  function removeStage(id) {
    setStages(prev => prev.filter(s => s.id !== id));
  }
  function updateStage(id, field, val) {
    setStages(prev => prev.map(s => s.id === id ? { ...s, [field]: val } : s));
  }

  function handleSave() {
    if (!name.trim()) return;
    const project = {
      id: Date.now(),
      name: name.trim(),
      finalDate,
      createdAt: new Date().toISOString(),
      stages: stages.filter(s => s.name.trim()).map(s => ({ ...s, done: false }))
    };
    onSave(project);
  }

  return (
    <div className="new-project-card">
      <h2>🦁 Новий проект</h2>
      <div className="form-row">
        <div className="form-group" style={{flex: 2}}>
          <label>Назва проекту</label>
          <input type="text" placeholder="напр. Купальник для Олени" value={name} onChange={e => setName(e.target.value)} />
        </div>
        <div className="form-group">
          <label>Фінальний дедлайн</label>
          <input type="date" value={finalDate} onChange={e => setFinalDate(e.target.value)} />
        </div>
      </div>

      <div className="stages-title">Етапи</div>
      {stages.map((s, i) => (
        <div className="stage-row" key={s.id}>
          <input type="text" placeholder={`Етап ${i+1}`} value={s.name}
            onChange={e => updateStage(s.id, 'name', e.target.value)} />
          <input type="date" value={s.date}
            onChange={e => updateStage(s.id, 'date', e.target.value)} />
          <button className="btn-icon" onClick={() => removeStage(s.id)} title="Видалити">✕</button>
        </div>
      ))}
      <button className="btn-add-stage" onClick={addStage}>+ Додати етап</button>

      <div className="form-actions">
        <button className="btn-secondary" onClick={onCancel}>Скасувати</button>
        <button className="btn-primary" onClick={handleSave} style={{padding: '0.6rem 1.5rem', fontSize:'0.95rem'}}>
          Запустити лева
        </button>
      </div>
    </div>
  );
}

// ─── PROJECT CARD ─────────────────────────────────────────────
function ProjectCard({ project, onToggleStage, onDelete }) {
  const level = projectLionLevel(project.stages);
  const progress = projectProgress(project.stages);
  const daysLeft = project.finalDate ? daysUntil(project.finalDate) : null;

  const levelClass = {
    safe: 'lion-safe', watch: 'lion-watch',
    close: 'lion-close', danger: 'lion-danger', done: 'lion-done'
  }[level];

  const daysLabel = daysLeft === null ? '' :
    daysLeft < 0 ? `${Math.abs(daysLeft)}д прострочено` :
    daysLeft === 0 ? 'Сьогодні!' :
    `${daysLeft}д до здачі`;

  return (
    <div className="project-card">
      <div className="project-header">
        <div className="project-info">
          <h2>{project.name}</h2>
          {project.finalDate && <div className="project-meta">Здача: {formatDate(project.finalDate)} {daysLabel && `· ${daysLabel}`}</div>}
        </div>
        <div className="project-lion-zone">
          <div className={`lion-badge ${levelClass}`}>
            <span className="lion-emoji">{LION_EMOJIS[level]}</span>
            {LION_LABELS[level]}
          </div>
          <div className="project-actions">
            <button className="btn-icon" onClick={() => onDelete(project.id)} title="Видалити проект" style={{color: 'rgba(245,230,200,0.3)', borderColor: 'rgba(245,230,200,0.1)'}}>🗑</button>
          </div>
        </div>
      </div>

      {project.stages.length > 0 && (
        <div className="project-progress">
          <div className="progress-label">
            <span>Прогрес</span>
            <span>{progress}%</span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{width: progress + '%'}} />
          </div>
        </div>
      )}

      <div className="stages-list">
        {project.stages.map(stage => {
          const days = stage.done ? null : daysUntil(stage.date);
          const cd = countdownLabel(days, stage.done);
          return (
            <div
              key={stage.id}
              className={`stage-item${stage.done ? ' done' : ''}`}
              onClick={() => onToggleStage(project.id, stage.id)}
            >
              <div className="stage-check">
                {stage.done && <span className="stage-check-inner">✓</span>}
              </div>
              <div className="stage-content">
                <div className="stage-name">{stage.name}</div>
                {stage.date && <div className="stage-date">{formatDate(stage.date)}</div>}
              </div>
              {stage.date && <span className={`stage-countdown ${cd.cls}`}>{cd.text}</span>}
            </div>
          );
        })}
        {project.stages.length === 0 && (
          <div style={{fontSize:'0.85rem', color:'rgba(245,230,200,0.3)', padding:'0.5rem 0'}}>Немає етапів</div>
        )}
      </div>
    </div>
  );
}

// ─── DELETE CONFIRM ───────────────────────────────────────────
function DeleteConfirm({ name, onConfirm, onCancel }) {
  return (
    <div className="overlay">
      <div className="overlay-card">
        <h3>Відпустити лева? 🦁</h3>
        <p>Видалити проект <strong style={{color:'var(--amber)'}}>{name}</strong>? Це незворотно.</p>
        <div className="overlay-actions">
          <button className="btn-secondary" onClick={onCancel}>Залишити</button>
          <button className="btn-danger" onClick={onConfirm}>Видалити</button>
        </div>
      </div>
    </div>
  );
}

// ─── DAILY TIP ────────────────────────────────────────────────
const TIPS = [
  '🧠 Стид — це «криптоніт продуктивності». Не гризи себе за вчора — дивись на наступного міні-лева.',
  '⏰ Підказка: множ час на 1.5. Думаєш, що займе 4 год — закладай 6.',
  '👥 Body doubling: якщо не можеш почати — подзвони подрузі або увімкни «work with me» відео.',
  '🎯 Точка неповернення — розкрій. Він має бути готовий до середини терміну.',
  '🔥 Відчуваєш лева? Чудово — це твій дофамін. Використай цей момент прямо зараз.',
  '📅 Запиши зовнішнє зобов\'язання: «У п\'ятницю покажу Лені викрійку». Обіцянка — живий лев.',
];

function getTip() {
  const day = new Date().getDate();
  return TIPS[day % TIPS.length];
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [seen, setSeen] = useState(() => !!localStorage.getItem('znaydi_leva_seen'));
  const [projects, setProjects] = useState(load);
  const [showForm, setShowForm] = useState(false);
  const [deleteId, setDeleteId] = useState(null);

  function handleStart() {
    localStorage.setItem('znaydi_leva_seen', '1');
    setSeen(true);
  }

  function handleSave(project) {
    const updated = [project, ...projects];
    setProjects(updated); save(updated);
    setShowForm(false);
  }

  function handleToggleStage(projectId, stageId) {
    const updated = projects.map(p => {
      if (p.id !== projectId) return p;
      const stages = p.stages.map(s => s.id === stageId ? { ...s, done: !s.done } : s);
      const wasAllDone = p.stages.every(s => s.done);
      const isAllDone = stages.every(s => s.done);
      if (!wasAllDone && isAllDone) spawnConfetti();
      return { ...p, stages };
    });
    setProjects(updated); save(updated);
  }

  function handleDelete(id) { setDeleteId(id); }
  function confirmDelete() {
    const updated = projects.filter(p => p.id !== deleteId);
    setProjects(updated); save(updated); setDeleteId(null);
  }

  const projectToDelete = projects.find(p => p.id === deleteId);

  if (!seen) return <Onboarding onStart={handleStart} />;

  return (
    <div className="app">
      <div className="app-header">
        <h1>🦁 Знайди Лева</h1>
        <button className="btn-ghost" onClick={() => { localStorage.removeItem('znaydi_leva_seen'); setSeen(false); }}>
          Як це працює?
        </button>
      </div>

      <div className="tip-bar">
        <span className="tip-icon">💡</span>
        <span>{getTip()}</span>
      </div>

      {!showForm && (
        <button className="btn-primary" onClick={() => setShowForm(true)}
          style={{width:'100%', marginBottom:'1.5rem', borderRadius:'14px'}}>
          + Новий проект
        </button>
      )}

      {showForm && (
        <NewProjectForm onSave={handleSave} onCancel={() => setShowForm(false)} />
      )}

      {projects.length === 0 && !showForm && (
        <div className="empty-state">
          <div className="e-lion">🦁</div>
          <p>Левів ще немає.<br />Додай перший проект — і знайди свого лева.</p>
        </div>
      )}

      <div className="projects-grid">
        {projects.map(p => (
          <ProjectCard
            key={p.id}
            project={p}
            onToggleStage={handleToggleStage}
            onDelete={handleDelete}
          />
        ))}
      </div>

      {deleteId && projectToDelete && (
        <DeleteConfirm
          name={projectToDelete.name}
          onConfirm={confirmDelete}
          onCancel={() => setDeleteId(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
